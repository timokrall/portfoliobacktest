name: Weekly data update

on:
  schedule:
    # Mondays 06:00 UTC. NOTE: GitHub pauses scheduled workflows after 60 days
    # of repo inactivity — re-enable from the Actions tab or push any commit.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install --quiet requests

      - name: Fetch data
        env:
          STOOQ_COOKIE: ${{ secrets.STOOQ_COOKIE }}
          STOOQ_APIKEY: ${{ secrets.STOOQ_APIKEY }}
        run: python scripts/fetch_data.py

      - name: Commit & push if changed
        run: |
          git add data/*.csv data/manifest.json
          if git diff --staged --quiet; then
            echo "no data changes"
          else
            git -c user.name="data-bot" \
                -c user.email="bot@users.noreply.github.com" \
                commit -m "weekly data update"
            git push
          fi
