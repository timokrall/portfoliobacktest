                  <span className="lbl"><span>Cookie header value</span><small>stays in your browser only</small></span>
                  <textarea rows={2} placeholder="PHPSESSID=…; other=…" value={stooqCookie} onChange={e => setStooqCookie(e.target.value)} />
                </label>
                <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <button className="btn btn-xs" disabled={!stooqCookie.trim()} onClick={() => copyToClipboard(stooqCookie.trim(), "cookie")}>Copy cookie</button>
                  {repoBase
                    ? <a className={"btn btn-xs" + (!stooqCookie.trim() ? " disabled" : "")} href={`${repoBase}/settings/secrets/actions/new`} target="_blank" rel="noreferrer" onClick={(e) => { if (!stooqCookie.trim()) e.preventDefault(); }}>Open GitHub → New secret →</a>
                    : <span className="tag idle">enter repo URL above</span>}
                  <span className="footnote">Name = <code>STOOQ_COOKIE</code>, paste as Value.</span>
                </div>
              </div>
            </details>
          </div>

          {/* Step 4 — Ariva IDs */}
          <div style={{ marginBottom: 4, padding: 14, border: "1px solid var(--line)", borderRadius: 8, background: "oklch(0.985 0.003 240)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600 }}>Step 4 · CoIQ ariva IDs (required for the coIQ NAV)</div>
              {arivaOk
                ? <span className="tag ok">coIQ NAV loaded</span>
                : <span className="tag bad">not configured — coIQ won't update until you do this</span>}
            </div>
            <div className="footnote" style={{ marginBottom: 8 }}>
              Open the <a href="https://www.ariva.de/coiq_collective_intelligence_fund_r-fonds/historische_kurse" target="_blank" rel="noreferrer">ariva CoIQ historic-prices page</a>, change "Börsenplatz" to <strong>"Fondsgesellschaft"</strong>, open DevTools → Network, click "Download" (CSV export). The request URL contains both numbers, e.g.<br/>
              <code>…historic.csv?secu=<strong>19392834</strong>&boerse_id=<strong>143</strong>&…</code>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <label className="field" style={{ flex: 1 }}>
                <span className="lbl"><span>ARIVA_SECU</span></span>
                <input type="text" placeholder="e.g. 19392834" value={arivaSecu} onChange={e => setArivaSecu(e.target.value.trim())} />
              </label>
              <label className="field" style={{ flex: 1 }}>
                <span className="lbl"><span>ARIVA_BOERSE_ID</span></span>
                <input type="text" placeholder="e.g. 143" value={arivaBoerse} onChange={e => setArivaBoerse(e.target.value.trim())} />
              </label>
            </div>

            {arivaSecu && arivaBoerse && (
              <div style={{ marginTop: 12 }}>
                <div className="lbl" style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 4 }}>File content (data/ariva.json)</div>
                <pre className="mono" style={{ margin: 0, padding: "8px 10px", background: "var(--bg)", border: "1px solid var(--line)", borderRadius: 6, fontSize: 11, whiteSpace: "pre-wrap", overflowX: "auto" }}>{arivaJsonContent}</pre>
              </div>
            )}

            <div style={{ display: "flex", gap: 8, marginTop: 10, alignItems: "center", flexWrap: "wrap" }}>
              <button className="btn btn-xs" disabled={!arivaSecu || !arivaBoerse} onClick={() => copyToClipboard(arivaJsonContent, "JSON")}>1 · Copy JSON</button>
              <button className="btn btn-xs" disabled={!arivaSecu || !arivaBoerse} onClick={downloadArivaJson}>Download as file</button>
              {arivaNewFileUrl
                ? <a className={"btn btn-xs btn-accent" + ((!arivaSecu || !arivaBoerse) ? " disabled" : "")}
                     href={arivaNewFileUrl} target="_blank" rel="noreferrer"
                     onClick={(e) => { if (!arivaSecu || !arivaBoerse) e.preventDefault(); }}>2 · Open new file on GitHub →</a>
                : <span className="tag idle">{!repoBase ? "enter repo URL above" : "fill in both IDs"}</span>}
            </div>
            <div className="footnote" style={{ marginTop: 8 }}>
              On the GitHub page: filename is pre-filled to <code>data/ariva.json</code>. Click into the editor area, <strong>paste</strong> (Cmd/Ctrl+V), scroll down, <strong>"Commit changes"</strong>. (GitHub no longer accepts pre-filled file content via URL, so the paste step is required.)
            </div>

            {/* Step 4b — Ariva cookie */}
            <div style={{ marginTop: 14, paddingLeft: 10, borderLeft: "2px solid var(--accent)" }}>
              <div style={{ fontSize: 11.5, fontWeight: 600, marginBottom: 4 }}>4b · Ariva session cookie (required as of May 2026)</div>
              <div className="footnote" style={{ marginBottom: 6 }}>
                Ariva now blocks anonymous CSV downloads. Create a <a href="https://www.ariva.de/registrierung" target="_blank" rel="noreferrer">free ariva.de account</a>, log in, then:
                <br/><strong>Best method (avoids truncation):</strong> DevTools (F12) → <strong>Application / Storage</strong> tab → <strong>Cookies → https://www.ariva.de</strong> → you'll see a table of cookies. Copy each Name=Value pair from there and join with <code>; </code>.
                <br/><strong>Network method:</strong> DevTools → Network → click any ariva.de request → <strong>right-click</strong> the Cookie row in Request Headers → "Copy value" (NOT the visible text — DevTools shows it truncated with <code>…</code> ellipsis).
              </div>
              <label className="field">
                <span className="lbl"><span>Ariva cookie header value</span><small>stays in your browser only</small></span>
                <textarea rows={2} placeholder="AWSALB=…; PHPSESSID=…; …" value={arivaCookie} onChange={e => setArivaCookie(e.target.value)} />
              </label>
              {arivaCookie.includes("\u2026") && (
                <div className="meta" style={{ color: "var(--neg)", marginTop: 6 }}>
                  ⚠ Your cookie contains a <code>…</code> (ellipsis) — DevTools truncated some values when you copied. The secret won't authenticate. Re-copy from <strong>Application → Storage → Cookies → ariva.de</strong> instead.
                </div>
              )}
              <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center", flexWrap: "wrap" }}>
                <button className="btn btn-xs" disabled={!arivaCookie.trim()} onClick={() => copyToClipboard(arivaCookie.trim(), "ariva cookie")}>Copy cookie</button>
                {repoBase
                  ? <a className={"btn btn-xs btn-accent" + (!arivaCookie.trim() ? " disabled" : "")} href={`${repoBase}/settings/secrets/actions/new`} target="_blank" rel="noreferrer" onClick={(e) => { if (!arivaCookie.trim()) e.preventDefault(); }}>Open GitHub → New secret →</a>
                  : <span className="tag idle">enter repo URL above</span>}
                <span className="footnote">Name = <code>ARIVA_COOKIE</code>, paste as Value.</span>
              </div>
            </div>

            {/* Step 4c — Xetra-Gold ariva IDs (full history) */}
            <div style={{ marginTop: 14, paddingLeft: 10, borderLeft: "2px solid var(--accent)" }}>
              <div style={{ fontSize: 11.5, fontWeight: 600, marginBottom: 4 }}>4c · Xetra-Gold ariva IDs (optional — for full history)</div>
              <div className="footnote" style={{ marginBottom: 6 }}>
                Stooq only returns ~1 year of Xetra-Gold data. To get the full 2007-onwards history, point gold to ariva too (same flow as coIQ).
                <br/>1. Open the <a href="https://www.ariva.de/search/search.m?searchname=DE000A0S9GB0" target="_blank" rel="noreferrer">ariva search for ISIN DE000A0S9GB0</a> → click the Xetra-Gold result → "Historische Kurse".
                <br/>2. Change "Börsenplatz" to <strong>Xetra</strong> (or another venue with deep history) and click <strong>Download</strong>.
                <br/>3. The CSV URL in DevTools contains <code>secu=</code> and <code>boerse_id=</code>. Paste below.
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <label className="field" style={{ flex: 1 }}>
                  <span className="lbl"><span>ARIVA_GOLD_SECU</span></span>
                  <input type="text" placeholder="e.g. 1100166" value={arivaGoldSecu} onChange={e => setArivaGoldSecu(e.target.value.trim())} />
                </label>
                <label className="field" style={{ flex: 1 }}>
                  <span className="lbl"><span>ARIVA_GOLD_BOERSE_ID</span></span>
                  <input type="text" placeholder="e.g. 6" value={arivaGoldBoerse} onChange={e => setArivaGoldBoerse(e.target.value.trim())} />
                </label>
              </div>
              {arivaGoldSecu && arivaGoldBoerse && (
                <div style={{ marginTop: 10 }}>
                  <div className="lbl" style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 4 }}>File content (data/ariva-gold.json)</div>
                  <pre className="mono" style={{ margin: 0, padding: "8px 10px", background: "var(--bg)", border: "1px solid var(--line)", borderRadius: 6, fontSize: 11, whiteSpace: "pre-wrap", overflowX: "auto" }}>{arivaGoldJsonContent}</pre>
                </div>
              )}
              <div style={{ display: "flex", gap: 8, marginTop: 10, alignItems: "center", flexWrap: "wrap" }}>
                <button className="btn btn-xs" disabled={!arivaGoldSecu || !arivaGoldBoerse} onClick={() => copyToClipboard(arivaGoldJsonContent, "gold JSON")}>1 · Copy JSON</button>
                <button className="btn btn-xs" disabled={!arivaGoldSecu || !arivaGoldBoerse} onClick={downloadArivaGoldJson}>Download as file</button>
                {arivaGoldNewFileUrl
                  ? <a className={"btn btn-xs btn-accent" + ((!arivaGoldSecu || !arivaGoldBoerse) ? " disabled" : "")}
                       href={arivaGoldNewFileUrl} target="_blank" rel="noreferrer"
                       onClick={(e) => { if (!arivaGoldSecu || !arivaGoldBoerse) e.preventDefault(); }}>2 · Open new file on GitHub →</a>
                  : <span className="tag idle">{!repoBase ? "enter repo URL above" : "fill in both IDs"}</span>}
              </div>
              <div className="footnote" style={{ marginTop: 8 }}>
                On the GitHub page: filename is pre-filled to <code>data/ariva-gold.json</code>. Click into the editor, paste, "Commit changes". Then re-run the workflow.
              </div>
            </div>
          </div>

          <div className="small-note" style={{ marginTop: 12 }}>
            Why this is not just a "save" button in the app: the deployed Pages site is public — anyone could read a cookie stored there. So the cookie has to live in GitHub's encrypted secret store, and the ariva IDs have to be in a committed file the Python script can read. The handoff buttons above just open the right GitHub pages with your values pre-filled.
          </div>
        </div>
      </div>

      <div className="grid grid-2">
        <div className="panel">
          <div className="panel-h">
            <h2>1 · Data — weekly auto-update</h2>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <ManifestPill manifest={manifest} />
              <button className="btn btn-accent btn-xs" onClick={reloadAll}>Reload from /data</button>
            </div>
          </div>
          <div className="panel-body">
            <div className="grid grid-2" style={{ gap: 12 }}>
              {ASSETS.map(a =>
                <CsvCard
                  key={a.id}
                  asset={a}
                  text={csvText[a.id] || ""}
                  data={series[a.id]}
                  error={seriesError[a.id]}
                  seriesType={seriesType[a.id]}
                  fetchStatus={fetchStatus[a.id]}
                  manifestEntry={manifest?.assets?.[a.manifestKey]}
                  onReload={() => reloadAsset(a)}
                  onSetType={(t) => setSeriesType(p => ({ ...p, [a.id]: t }))}
                  onText={(t) => onCsvChange(a.id, t)}
                  onFile={(f) => onFileLoad(a.id, f)}
                />
              )}
              <CsvCard
                key="cpi"
                asset={CPI_ASSET}
                text={csvText.cpi || ""}
                data={series.cpi}
                error={seriesError.cpi}
                seriesType={null}
                fetchStatus={fetchStatus.cpi}
                manifestEntry={manifest?.assets?.cpi}
                onReload={() => reloadAsset(CPI_ASSET)}
                onSetType={null}
                onText={(t) => onCsvChange("cpi", t)}
                onFile={(f) => onFileLoad("cpi", f)}
              />
            </div>
            <div className="small-note" style={{ marginTop: 10 }}>
              CSVs are committed weekly by a GitHub Action (<code>.github/workflows/update-data.yml</code>) into <code>./data/</code> and served same-origin — no CORS, no proxies, no rate limits.
              Manual upload/paste per asset overrides the committed file if you want fresher numbers.
              See <code>README.md</code> for setup (including how to add the optional <code>STOOQ_COOKIE</code> repo secret).
            </div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-h"><h2>2 · Portfolio + Cashflow</h2></div>
          <div className="panel-body">
            <div className="grid grid-2" style={{ gap: 14 }}>
              <NumField label="Starting investment (EUR)" value={starting} onChange={setStarting} step={500} />
              <NumField label="Monthly contribution (EUR)" value={monthly} onChange={setMonthly} step={50} />
            </div>
            <div style={{ marginTop: 14 }}>
              <div className="lbl"  style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 6 }}>Rebalancing frequency</div>
              <div className="seg">
                {["never", "monthly", "yearly", "biennial"].map(r =>
                  <button key={r} className={rebalance === r ? "on" : ""} onClick={() => setRebalance(r)}>
                    {r === "biennial" ? "every 2 years" : r}
                  </button>)}
              </div>
            </div>

            <hr style={{ margin: "18px 0" }} />
            <div className="lbl" style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 6 }}>Portfolios to compare (min. 2)</div>
            {PORTFOLIOS.map(pf => {
              const on = selectedPortfolios.includes(pf.id);
              return (
                <div key={pf.id} className="pf-row">
                  <span className={"chip" + (on ? " on" : "")} onClick={() => {
                    setSelectedPortfolios(s => on ? s.filter(x => x !== pf.id) : [...s, pf.id]);
                  }}>
                    <span className="dot"></span>{pf.name}
                  </span>
                  <span style={{ flex: 1 }}></span>
                  {!pf.isMarket &&
                    <label className="field pf-w">
                      <span className="lbl"><span>Gold %</span></span>
                      <input type="number" min="0" max="100" step="1" value={goldWeights[pf.id] ?? 30}
                             onChange={e => setGoldWeights(g => ({ ...g, [pf.id]: clamp(+e.target.value, 0, 100) }))} />
                    </label>
                  }
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="grid grid-2" style={{ marginTop: 18 }}>
        <div className="panel">
          <div className="panel-h"><h2>3 · Costs</h2><span className="h-meta">applied at every buy + sell</span></div>
          <div className="panel-body">
            <table className="bt">
              <thead><tr><th>Asset</th><th style={{ textAlign: "right" }}>Ongoing %/yr</th><th style={{ textAlign: "right" }}>Buy spread %</th><th style={{ textAlign: "right" }}>Sell spread %</th></tr></thead>
              <tbody>
                {ASSETS.map(a =>
                  <tr key={a.id}>
                    <td className="name">{a.label}<div className="dim" style={{ fontSize: 10.5 }}>{a.isin} · {a.note}</div></td>
                    <td><input type="number" step="0.01" value={ongoingCost[a.id] ?? 0} onChange={e => setOngoingCost(c => ({ ...c, [a.id]: +e.target.value }))} style={{ textAlign: "right" }} /></td>
                    <td><input type="number" step="0.01" value={spreads[a.id]?.buy ?? 0} onChange={e => setSpreads(s => ({ ...s, [a.id]: { ...s[a.id], buy: +e.target.value } }))} style={{ textAlign: "right" }} /></td>
                    <td><input type="number" step="0.01" value={spreads[a.id]?.sell ?? 0} onChange={e => setSpreads(s => ({ ...s, [a.id]: { ...s[a.id], sell: +e.target.value } }))} style={{ textAlign: "right" }} /></td>
                  </tr>)}
              </tbody>
            </table>
            <div className="grid grid-2" style={{ marginTop: 14 }}>
              <NumField label="Per-order fixed fee (EUR)" value={orderFee.fixed} step={0.10} onChange={v => setOrderFee(o => ({ ...o, fixed: v }))} />
              <NumField label="Per-order percent fee (%)" value={orderFee.pct} step={0.01} onChange={v => setOrderFee(o => ({ ...o, pct: v }))} />
            </div>
            <div className="small-note">Ongoing %/yr applies as a monthly drag <strong>only</strong> to assets toggled to <code>gross</code>. For <code>net</code> series (NAVs / market prices) the cost is already inside the data — no double-counting.</div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-h"><h2>4 · Taxes</h2><span className="h-meta">German CGT · Vorabpauschale (2018+)</span></div>
          <div className="panel-body">
            <div className="grid grid-3" style={{ gap: 12 }}>
              <NumField label="Capital-gains rate (%)" value={taxRate} step={0.001} onChange={setTaxRate} />
              <NumField label="Sparer-Pauschbetrag (EUR/yr)" value={allowance} step={100} onChange={setAllowance} />
              <div></div>
              {["coIQ", "momentum", "market"].map(id =>
                <NumField key={id} label={`Teilfreistellung — ${ASSETS.find(a => a.id === id).label.split(" ")[0]} (%)`}
                          value={teilfreistellung[id] ?? 30} step={1}
                          onChange={v => setTeilfreistellung(t => ({ ...t, [id]: v }))} />
              )}
            </div>
            <details className="fold" style={{ marginTop: 14 }} open>
              <summary>Basiszins table (BMF, %/yr) — used for Basisertrag</summary>
              <div className="bz-grid" style={{ marginTop: 8 }}>
                {Object.keys(basiszins).sort().map(y =>
                  <label key={y}><span>{y}</span>
                    <input type="number" step="0.01" value={basiszins[y]} onChange={e => setBasiszins(b => ({ ...b, [y]: +e.target.value }))} />
                  </label>)}
              </div>
              <div className="small-note">Basiszins values come from the BMF annual letter (Jan publication). 0 means no Vorabpauschale for that year. Gold (EUWAX Gold II) is an <em>Inhaberschuldverschreibung</em>, not a fund, and is exempt from Vorabpauschale and Teilfreistellung — taxed only on sale via §23 EStG (Spekulationsfrist 12 months). Pre-2018 fund-level taxation is not modelled.</div>
            </details>
          </div>
        </div>
      </div>

      <div className="grid grid-2" style={{ marginTop: 18 }}>
        <div className="panel">
          <div className="panel-h"><h2>5 · Monte Carlo</h2><span className="h-meta">block bootstrap on unit-price returns</span></div>
          <div className="panel-body">
            <div className="grid grid-3" style={{ gap: 12 }}>
              <NumField label="Paths" value={mc.paths} step={500} onChange={v => setMc(s => ({ ...s, paths: Math.max(100, v) }))} />
              <NumField label="Horizon (months)" value={mc.horizon} step={12} onChange={v => setMc(s => ({ ...s, horizon: Math.max(12, v) }))} />
              <NumField label="Block length (months)" value={mc.block} step={1} onChange={v => setMc(s => ({ ...s, block: Math.max(1, v) }))} />
            </div>
            <div className="small-note">Bootstrap preserves short-run autocorrelation via blocks. Caveat: stationary assumption — not a regime model.</div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-h">
            <h2>6 · Gold-share optimizer (v2)</h2>
            <button className="btn btn-accent" disabled={sweepRunning || !commonWindow?.ok} onClick={runSweep}>
              {sweepRunning && <span className="spin"></span>} Run 0–100% sweep
            </button>
          </div>
          <div className="panel-body">
            <div className="small-note">Re-runs the full simulation (costs + CGT-gated rebalance + Vorabpauschale) at each 1% step. Computes <strong>w_safe</strong> (buffer-maximizing) and <strong>w_return</strong> (least gold to stay real-admissible) at every holding horizon. Charts and tables appear below the comparison panel after running. CPI series required.</div>
            <div style={{ marginTop: 12 }}>
              {selectedPortfolios.filter(pid => PORTFOLIOS.find(p => p.id === pid) && !PORTFOLIOS.find(p => p.id === pid).isMarket).map(pid =>
                <SweepRow key={pid} pid={pid} chosen={goldWeights[pid]} sweep={sweepResults[pid]} />
              )}
            </div>
          </div>
        </div>
      </div>

      {/* --- WINDOW + RESULTS --- */}
      <div style={{ marginTop: 26 }}>
        {!commonWindow && <Empty msg="Select at least one portfolio." />}
        {commonWindow && !commonWindow.ok && commonWindow.missing &&
          <Empty msg={`Load CSV data for: ${commonWindow.missing.join(", ")}.`} kind="warn" />}
        {commonWindow && !commonWindow.ok && commonWindow.tooShort &&
          <Empty msg={`Common window has only ${commonWindow.n} months — need ≥12 to simulate.`} kind="warn" />}

        {commonWindow && commonWindow.ok && (
          <>
            <div className="panel" style={{ marginBottom: 18 }}>
              <div className="panel-h">
                <h2>Backtest window</h2>
                <span className="h-meta mono">{commonWindow.start} → {commonWindow.end} · {commonWindow.months.length} months ({(commonWindow.months.length / 12).toFixed(1)} yrs)</span>
              </div>
            </div>

            {/* V2 admissibility banner (replaces v1 Sortino winner) */}
            {(() => {
              const hp = Math.max(1, Math.min(H_MAX, Math.round(planningHorizon)));
              const rows = selectedPortfolios.map(pid => {
                const sim = simResults?.[pid]; const real = realResults?.[pid];
                if (!sim || !real || real.error) return null;
                const atHp = real.curve.find(x => x.h === hp);
                return { pid, sim, real, atHp };
              }).filter(Boolean);
              if (rows.length === 0) {
                return <div className="winner" style={{ marginBottom: 18 }}>
                  <div className="lbl">Real-preservation verdict</div>
                  <div className="sub" style={{ marginTop: 8 }}>Load a CPI series to enable the v2 banner.</div>
                </div>;
              }
              const admissible = rows.filter(r => r.atHp && r.atHp.worstRealCAGR != null && r.atHp.worstRealCAGR >= 0);
              const winner = admissible.length
                ? [...admissible].sort((a, b) => (b.sim.finalValue / b.sim.totalInvested) - (a.sim.finalValue / a.sim.totalInvested))[0]
                : null;
              return (
                <div className="winner" style={{ marginBottom: 18 }}>
                  <div className="row">
                    <div>
                      <div className="lbl">Real-admissible @ {hp}y &middot; best absolute return</div>
                      <div className="val">{winner ? PORTFOLIOS.find(p => p.id === winner.pid).name : "— none admissible —"}</div>
                      <div className="sub mono">{winner
                        ? `${fmtEUR(winner.sim.finalValue)} on ${fmtEUR(winner.sim.totalInvested)} \u00b7 worst real CAGR ${fmtPct(winner.atHp.worstRealCAGR)} \u00b7 ${winner.atHp.kind === "mc" ? "MC" : "historical"}`
                        : "no portfolio keeps real value at this horizon under worst-window or MC paths"
                      }</div>
                    </div>
                    <div>
                      <div className="lbl">Real-preservation horizon h*</div>
                      <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: "2px 10px", marginTop: 6 }}>
                        {rows.map(r => (
                          <React.Fragment key={r.pid}>
                            <div className="mono" style={{ opacity: 0.85, fontSize: 12 }}>{PORTFOLIOS.find(p => p.id === r.pid).name}</div>
                            <div className="mono" style={{ fontSize: 12 }}>{r.real.hStar != null ? `${r.real.hStar}y` : "—"}</div>
                          </React.Fragment>
                        ))}
                      </div>
                    </div>
                  </div>
                  {sweepResults && Object.keys(sweepResults).length > 0 && (
                    <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid oklch(1 0 0 / 0.12)", display: "grid", gap: 6, fontSize: 12 }}>
                      {selectedPortfolios.filter(pid => PORTFOLIOS.find(p => p.id === pid) && !PORTFOLIOS.find(p => p.id === pid).isMarket).map(pid => {
                        const sw = sweepResults[pid]; if (!sw || !sw.perH) return null;
                        const at = sw.perH[hp]; if (!at) return null;
                        const target = goldWeights[pid];
                        return (
                          <div key={pid} className="mono">
                            <strong>{PORTFOLIOS.find(p => p.id === pid).name}</strong> at {hp}y:
                            {at.w_return != null ? <> real-admissible for gold &ge; <strong>{at.w_return.w}%</strong>;</> : <> no admissible gold weight at this horizon;</>}
                            {at.w_safe != null ? <> buffer-maximizing at <strong>{at.w_safe.w}%</strong>;</> : null}
                            <> your target <strong>{target}%</strong>.</>
                            <span style={{ opacity: 0.6 }}> ({at.kind})</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  <div className="caveat">
                    Window {commonWindow.start} &rarr; {commonWindow.end} ({(commonWindow.months.length / 12).toFixed(1)} years).
                    {shortRegime && " Single-regime sample \u2014 no equity bear market in window. Beyond ~3 years all numbers are Monte Carlo."}
                  </div>
                </div>
              );
            })()}

            {/* comparison table */}
            <div className="panel" style={{ marginBottom: 18 }}>
              <div className="panel-h"><h2>Comparison</h2><span className="h-meta">money-weighted gain · unit-price risk metrics</span></div>
              <table className="bt">
                <thead><tr>
                  <th>Portfolio</th>
                  <th style={{ textAlign: "right" }}>Target gold</th>
                  <th style={{ textAlign: "right" }}>Final gold</th>
                  <th style={{ textAlign: "right" }}>Sortino</th>
                  <th style={{ textAlign: "right" }}>Max DD</th>
                  <th style={{ textAlign: "right" }}>Months &lt;−30%</th>
                  <th style={{ textAlign: "right" }}>Total invested</th>
                  <th style={{ textAlign: "right" }}>Final value</th>
                  <th style={{ textAlign: "right" }}>Gain</th>
                </tr></thead>
                <tbody>
                  {selectedPortfolios.map(pid => {
                    const r = simResults && simResults[pid];
                    const pf = PORTFOLIOS.find(p => p.id === pid);
                    if (!r) return null;
                    const tg = pf.isMarket ? null : (goldWeights[pid] ?? 0);
                    const fg = pf.isMarket ? null : r.finalGoldWeight * 100;
                    const gain = r.finalValue - r.totalInvested;
                    const gainPct = r.finalValue / r.totalInvested - 1;
                    return (
                      <tr key={pid}>
                        <td className="name">{pf.name}</td>
                        <td className="num" style={{ textAlign: "right" }}>{tg == null ? "—" : tg + "%"}</td>
                        <td className="num" style={{ textAlign: "right" }}>{fg == null ? "—" : fmtNum(fg, 1) + "%"}</td>
                        <td className="num" style={{ textAlign: "right" }}>{fmtNum(r.metrics.sortino, 3)}</td>
                        <td className="num neg" style={{ textAlign: "right" }}>{fmtPct(r.metrics.maxDD)}</td>
                        <td className="num" style={{ textAlign: "right" }}>{r.metrics.monthsBelow30}</td>
                        <td className="num" style={{ textAlign: "right" }}>{fmtEUR(r.totalInvested)}</td>
                        <td className="num" style={{ textAlign: "right" }}>{fmtEUR(r.finalValue)}</td>
                        <td className={"num " + (gain >= 0 ? "pos" : "neg")} style={{ textAlign: "right" }}>
                          {fmtEUR(gain)} · {fmtPct(gainPct)}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* chart */}
            <div className="panel" style={{ marginBottom: 18 }}>
              <div className="panel-h">
                <h2>Chart</h2>
                <div className="seg">
                  <button className={chartMode === "unit" ? "on" : ""} onClick={() => setChartMode("unit")}>Unit price</button>
                  <button className={chartMode === "dd" ? "on" : ""} onClick={() => setChartMode("dd")}>Drawdown %</button>
                </div>
              </div>
              <div className="panel-body" style={{ height: 380 }}>
                {chartData && <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={chartData} margin={{ top: 8, right: 20, bottom: 24, left: 8 }}>
                    <CartesianGrid stroke="oklch(0.93 0.005 240)" strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="label" tickMargin={10} minTickGap={40} stroke="oklch(0.7 0.008 240)" />
                    <YAxis tickFormatter={v => chartMode === "unit" ? v.toFixed(0) : v.toFixed(0) + "%"} stroke="oklch(0.7 0.008 240)" width={56} domain={chartMode === "dd" ? [-60, 5] : ["auto", "auto"]} />
                    <Tooltip
                      contentStyle={{ background: "var(--panel)", border: "1px solid var(--line-strong)", borderRadius: 8, fontSize: 11 }}
                      formatter={(v, name) => [chartMode === "unit" ? fmtNum(+v, 2) : fmtNum(+v, 2) + "%", PORTFOLIOS.find(p => p.id === name.replace("_dd", ""))?.name || name]}
                    />
                    <Legend wrapperStyle={{ paddingTop: 8 }} formatter={(v) => PORTFOLIOS.find(p => p.id === v.replace("_dd", ""))?.name || v} />
                    {selectedPortfolios.map((pid, i) => {
                      const colors = ["oklch(0.45 0.05 220)", "oklch(0.55 0.13 60)", "oklch(0.55 0.09 155)"];
                      return <Line key={pid} type="monotone" dataKey={chartMode === "unit" ? pid : pid + "_dd"}
                                   stroke={colors[i % colors.length]} dot={false} strokeWidth={1.6} isAnimationActive={false} />;
                    })}
                  </LineChart>
                </ResponsiveContainer>}
              </div>
            </div>

            {/* V2 · Real-preservation curves */}
            {realResults && Object.keys(realResults).length > 0 && (
              <div className="panel" style={{ marginBottom: 18 }}>
                <div className="panel-h">
                  <h2>Real preservation &middot; worst-window real CAGR vs holding horizon</h2>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <label className="field" style={{ flexDirection: "row", alignItems: "center", gap: 6 }}>
                      <span className="lbl" style={{ fontSize: 11 }}>Planning horizon (yrs)</span>
                      <input type="number" min="1" max={H_MAX} step="1" value={planningHorizon} onChange={e => setPlanningHorizon(Math.max(1, Math.min(H_MAX, +e.target.value || 1)))} style={{ width: 60 }} />
                    </label>
                    <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, color: "var(--ink-soft)" }}>
                      <input type="checkbox" checked={useNativeHistory} onChange={e => setUseNativeHistory(e.target.checked)} /> own native history
                    </label>
                  </div>
                </div>
                <div className="panel-body" style={{ height: 360 }}>
                  {(() => {
                    const colors = ["oklch(0.45 0.05 220)", "oklch(0.55 0.13 60)", "oklch(0.55 0.09 155)"];
                    const data = [];
                    for (let h = 1; h <= H_MAX; h++) {
                      const row = { h };
                      for (const pid of Object.keys(realResults)) {
                        const r = realResults[pid]; if (!r || r.error) continue;
                        const pt = r.curve.find(x => x.h === h);
                        if (!pt) continue;
                        if (pt.kind === "historical") row[pid + "_hist"] = pt.worstRealCAGR == null ? null : pt.worstRealCAGR * 100;
                        else if (pt.kind === "mc")    row[pid + "_mc"]   = pt.worstRealCAGR == null ? null : pt.worstRealCAGR * 100;
                      }
                      data.push(row);
                    }
                    return <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={data} margin={{ top: 8, right: 20, bottom: 24, left: 8 }}>
                        <CartesianGrid stroke="oklch(0.93 0.005 240)" strokeDasharray="3 3" vertical={false} />
                        <XAxis dataKey="h" tickFormatter={v => v + "y"} stroke="oklch(0.7 0.008 240)" />
                        <YAxis tickFormatter={v => v.toFixed(1) + "%"} stroke="oklch(0.7 0.008 240)" width={56} />
                        <Tooltip
                          contentStyle={{ background: "var(--panel)", border: "1px solid var(--line-strong)", borderRadius: 8, fontSize: 11 }}
                          formatter={(v, name) => [fmtNum(+v, 2) + "%", PORTFOLIOS.find(p => name.startsWith(p.id))?.name + (name.endsWith("_mc") ? " (MC)" : " (hist)")]}
                          labelFormatter={(h) => `horizon ${h} years`}
                        />
                        <Legend wrapperStyle={{ paddingTop: 8 }} formatter={(v) => {
                          const pid = v.replace(/_(hist|mc)$/, "");
                          const kind = v.endsWith("_mc") ? " (MC)" : " (hist)";
                          return (PORTFOLIOS.find(p => p.id === pid)?.name || pid) + kind;
                        }} />
                        <RC.ReferenceLine y={0} stroke="oklch(0.5 0.13 25)" strokeDasharray="4 2" label={{ value: "0% real — CPI break-even", position: "insideTopRight", fill: "oklch(0.5 0.13 25)", fontSize: 10 }} />
                        {selectedPortfolios.map((pid, i) => {
                          const color = colors[i % colors.length];
                          return <React.Fragment key={pid}>
                            <Line type="monotone" dataKey={pid + "_hist"} stroke={color} dot={false} strokeWidth={1.8} isAnimationActive={false} />
                            <Line type="monotone" dataKey={pid + "_mc"}   stroke={color} dot={false} strokeWidth={1.4} strokeDasharray="5 4" isAnimationActive={false} />
                          </React.Fragment>;
                        })}
                      </LineChart>
                    </ResponsiveContainer>;
                  })()}
                </div>
                <table className="bt" style={{ borderTop: "1px solid var(--line)" }}>
                  <thead><tr>
                    <th>Portfolio</th><th>h</th>
                    <th style={{ textAlign: "right" }}>Worst real CAGR</th>
                    <th style={{ textAlign: "right" }}>Worst real multiple</th>
                    <th style={{ textAlign: "right" }}>5th-pctl real CAGR</th>
                    <th style={{ textAlign: "right" }}>Windows / Paths</th>
                    <th>Source</th>
                  </tr></thead>
                  <tbody>
                    {selectedPortfolios.flatMap(pid => {
                      const r = realResults[pid]; if (!r || r.error) return [];
                      const pf = PORTFOLIOS.find(p => p.id === pid);
                      return [1, 3, 5, 10, 15, 20, 30].filter(h => h <= H_MAX).map(h => {
                        const pt = r.curve.find(x => x.h === h); if (!pt) return null;
                        return (
                          <tr key={pid + h}>
                            <td className="name">{pf.name}</td>
                            <td className="num">{h}y</td>
                            <td className="num" style={{ textAlign: "right", color: pt.worstRealCAGR < 0 ? "var(--neg)" : pt.worstRealCAGR > 0 ? "var(--pos)" : "inherit" }}>{pt.worstRealCAGR == null ? "—" : fmtPct(pt.worstRealCAGR)}</td>
                            <td className="num" style={{ textAlign: "right" }}>{pt.worstRealMultiple == null ? "—" : fmtNum(pt.worstRealMultiple, 2) + "×"}</td>
                            <td className="num" style={{ textAlign: "right" }}>{pt.p5RealCAGR == null ? "—" : fmtPct(pt.p5RealCAGR)}</td>
                            <td className="num" style={{ textAlign: "right" }}>{pt.count ?? "—"}</td>
                            <td className="dim">{pt.kind === "historical" ? <span className="tag ok">historical</span> : pt.kind === "mc" ? <span className="tag info">Monte Carlo</span> : <span className="tag idle">—</span>}</td>
                          </tr>
                        );
                      }).filter(Boolean);
                    })}
                  </tbody>
                </table>
                <div className="panel-body tight footnote">
                  Solid line = historically backed (window count &ge; 6). Dashed = Monte Carlo extension via paired block-bootstrap of (portfolio return, CPI return) together to preserve gold/inflation co-movement.
                  CPI source: {manifest?.assets?.cpi?.source || "manual paste"} &middot; last point {series.cpi ? series.cpi[series.cpi.length - 1].month : "—"}.
                </div>
              </div>
            )}

            {/* V2 · Gold-share optimizer charts (one panel per two-asset portfolio) */}
            {selectedPortfolios.filter(pid => PORTFOLIOS.find(p => p.id === pid) && !PORTFOLIOS.find(p => p.id === pid).isMarket).map(pid => {
              const sw = sweepResults[pid];
              if (!sw || !sw.perH || !sw.cpiOk) return null;
              const pf = PORTFOLIOS.find(p => p.id === pid);
              const target = goldWeights[pid];
              const data = [];
              for (let h = 1; h <= H_MAX; h++) {
                const at = sw.perH[h]; if (!at) continue;
                const row = { h, target };
                if (at.kind === "historical") {
                  row.w_safe_hist = at.w_safe ? at.w_safe.w : null;
                  row.w_return_hist = at.w_return ? at.w_return.w : null;
                } else {
                  row.w_safe_mc = at.w_safe ? at.w_safe.w : null;
                  row.w_return_mc = at.w_return ? at.w_return.w : null;
                }
                data.push(row);
              }
              return (
                <div className="panel" style={{ marginBottom: 18 }} key={"opt_" + pid}>
                  <div className="panel-h">
                    <h2>{pf.name} &middot; optimal gold share vs horizon</h2>
                    <span className="h-meta">your target {target}% &middot; w_safe = buffer-max &middot; w_return = least gold to stay real-admissible</span>
                  </div>
                  <div className="panel-body" style={{ height: 320 }}>
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={data} margin={{ top: 8, right: 20, bottom: 24, left: 8 }}>
                        <CartesianGrid stroke="oklch(0.93 0.005 240)" strokeDasharray="3 3" vertical={false} />
                        <XAxis dataKey="h" tickFormatter={v => v + "y"} stroke="oklch(0.7 0.008 240)" />
                        <YAxis tickFormatter={v => v + "%"} stroke="oklch(0.7 0.008 240)" width={56} domain={[0, 100]} />
                        <Tooltip contentStyle={{ background: "var(--panel)", border: "1px solid var(--line-strong)", borderRadius: 8, fontSize: 11 }}
                                 formatter={(v, name) => [v == null ? "—" : v + "%", name.replace(/_(hist|mc)$/, l => l === "_mc" ? " (MC)" : " (hist)")]} />
                        <Legend wrapperStyle={{ paddingTop: 8 }} />
                        <RC.ReferenceLine y={target} stroke="oklch(0.4 0.01 240)" strokeDasharray="4 2" label={{ value: `target ${target}%`, position: "insideTopRight", fontSize: 10 }} />
                        <Line type="monotone" dataKey="w_safe_hist"   stroke="oklch(0.55 0.13 60)" dot={false} strokeWidth={1.8} isAnimationActive={false} />
                        <Line type="monotone" dataKey="w_safe_mc"     stroke="oklch(0.55 0.13 60)" dot={false} strokeWidth={1.4} strokeDasharray="5 4" isAnimationActive={false} />
                        <Line type="monotone" dataKey="w_return_hist" stroke="oklch(0.55 0.09 155)" dot={false} strokeWidth={1.8} isAnimationActive={false} />
                        <Line type="monotone" dataKey="w_return_mc"   stroke="oklch(0.55 0.09 155)" dot={false} strokeWidth={1.4} strokeDasharray="5 4" isAnimationActive={false} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                  <table className="bt" style={{ borderTop: "1px solid var(--line)" }}>
                    <thead><tr>
                      <th>h</th>
                      <th style={{ textAlign: "right" }}>w_safe</th>
                      <th style={{ textAlign: "right" }}>worst CAGR @ w_safe</th>
                      <th style={{ textAlign: "right" }}>w_return</th>
                      <th style={{ textAlign: "right" }}>worst CAGR @ w_return</th>
                      <th style={{ textAlign: "right" }}>worst CAGR @ target {target}%</th>
                      <th>Source</th>
                    </tr></thead>
                    <tbody>
                      {[1, 3, 5, 10, 15, 20, 30].filter(h => h <= H_MAX).map(h => {
                        const at = sw.perH[h]; if (!at) return null;
                        const atTarget = sw.samples.find(s => s.w === target)?.realCurve?.find(x => x.h === h);
                        return (
                          <tr key={h}>
                            <td className="num">{h}y</td>
                            <td className="num" style={{ textAlign: "right" }}>{at.w_safe ? at.w_safe.w + "%" : "—"}</td>
                            <td className="num" style={{ textAlign: "right", color: at.w_safe && at.w_safe.worst < 0 ? "var(--neg)" : "inherit" }}>{at.w_safe ? fmtPct(at.w_safe.worst) : "—"}</td>
                            <td className="num" style={{ textAlign: "right" }}>{at.w_return ? at.w_return.w + "%" : <span className="tag warn">none</span>}</td>
                            <td className="num" style={{ textAlign: "right" }}>{at.w_return ? fmtPct(at.w_return.worst) : "—"}</td>
                            <td className="num" style={{ textAlign: "right", color: atTarget && atTarget.worstRealCAGR < 0 ? "var(--neg)" : "inherit" }}>{atTarget && atTarget.worstRealCAGR != null ? fmtPct(atTarget.worstRealCAGR) : "—"}</td>
                            <td className="dim">{at.kind === "historical" ? <span className="tag ok">historical</span> : <span className="tag info">MC</span>}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div className="panel-body tight footnote">
                    Treat the dashed (MC) section as the load-bearing output: this window has no equity bear market, so historical w_safe is overfit. w_return is the decision-relevant line.
                  </div>
                </div>
              );
            })}

            {/* monte carlo */}
            <div className="panel" style={{ marginBottom: 18 }}>
              <div className="panel-h"><h2>Monte Carlo · max-drawdown distribution</h2><span className="h-meta">{mc.paths} paths · horizon {mc.horizon} months · block {mc.block}</span></div>
              <table className="bt">
                <thead><tr>
                  <th>Portfolio</th>
                  <th style={{ textAlign: "right" }}>Sample length</th>
                  <th style={{ textAlign: "right" }}>Median max DD</th>
                  <th style={{ textAlign: "right" }}>Mean max DD</th>
                  <th style={{ textAlign: "right" }}>95th-pctl worst max DD</th>
                  <th>Caveat</th>
                </tr></thead>
                <tbody>
                  {selectedPortfolios.map(pid => {
                    const r = simResults && simResults[pid];
                    const mcr = mcResults && mcResults[pid];
                    const pf = PORTFOLIOS.find(p => p.id === pid);
                    if (!r || !mcr) return null;
                    const short = r.metrics.n < 120;
                    return (
                      <tr key={pid}>
                        <td className="name">{pf.name}</td>
                        <td className="num" style={{ textAlign: "right" }}>{r.metrics.n} months</td>
                        <td className="num neg" style={{ textAlign: "right" }}>{fmtPct(mcr.median)}</td>
                        <td className="num neg" style={{ textAlign: "right" }}>{fmtPct(mcr.mean)}</td>
                        <td className="num neg" style={{ textAlign: "right" }}>{fmtPct(mcr.p95)}</td>
                        <td className="dim">{short ? <span className="tag warn">&lt; 10 yrs — high uncertainty</span> : <span className="tag ok">≥ 10 yrs</span>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div className="panel-body tight footnote">Block bootstrap on each portfolio's <em>own</em> unit-price monthly returns. Preserves short autocorrelation; assumes stationarity. The reported 95th percentile is the worst end of the distribution (5% of paths are worse).</div>
            </div>

            {/* regression card */}
            {regression && series.coIQ && series.momentum && (
              <div className="panel" style={{ marginBottom: 18 }}>
                <div className="panel-h"><h2>coIQ ↔ Momentum regression</h2><span className="h-meta">overlapping months: {regression.n}</span></div>
                <div className="panel-body">
                  <div className="grid grid-3">
                    <div className="kv"><div className="k">β (slope vs Momentum)</div><div className="v">{fmtNum(regression.beta, 3)}</div></div>
                    <div className="kv"><div className="k">α (annualized)</div><div className="v">{fmtPct(regression.alphaAnnualized, 2)}</div></div>
                    <div className="kv"><div className="k">R²</div><div className="v">{fmtNum(regression.r2, 3)}</div></div>
                  </div>
                  <div className="footnote" style={{ marginTop: 10 }}>R² tells you <em>how momentum-like coIQ is</em>. Low R² = genuinely differentiated. Diagnostic only — does not feed the portfolio engine.</div>
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {/* footnotes */}
      <div className="panel" style={{ marginTop: 26 }}>
        <div className="panel-h"><h2>Definitions · Assumptions · Caveats</h2></div>
        <div className="panel-body footnote">
          <p><strong>Sortino ratio</strong> — annualized: mean monthly unit-price return ÷ monthly downside deviation × √12. MAR (minimum acceptable return) is 0. Downside deviation = √(Σ min(r,0)² / k), k = count of months in the series (using k matches Sortino's original definition; some toolkits use only downside-month count — we follow the original).</p>
          <p><strong>Maximum drawdown</strong> — max peak-to-trough decline of the <em>unit-price</em> series. Months &lt;−30% count months whose drawdown from the running peak is worse than −30%. <strong>Unit price</strong> is contribution-neutral: contributions and matured-gold rebalances issue/redeem units at NAV and do not move price; ongoing-cost drag and Vorabpauschale tax do move price.</p>
          <p><strong>Money-weighted return</strong> — final EUR value ÷ total EUR invested (starting + contributions). This is what your account number actually shows; the unit-price series is the cleanly-comparable risk surface.</p>
          <p><strong>Gold lots, Spekulationsfrist (§23 EStG)</strong> — every gold buy creates a lot. Lots become CGT-free 12 months after purchase. The month-0 starting gold lot is backdated as already-matured. At a rebalance, gold sells only matured lots, FIFO. Equity (coIQ / momentum / market) is never sold. A rebalance is therefore <em>partial</em> whenever matured gold &lt; the amount needed — the portfolio is allowed to remain overweight gold. This mirrors the real one-way constraint.</p>
          <p><strong>Vorabpauschale</strong> — for each calendar year Y ≥ 2018 and each equity lot: <code>Basisertrag = startValue × Basiszins(Y) × 0.70</code>; <code>Vorabpauschale = max(0, min(Basisertrag, endValue − startValue))</code>; intra-year lots are prorated by (12 − monthsBeforeAcq)/12; <code>taxable = VP × (1 − Teilfreistellung)</code>. Summed across equity lots, allowance is subtracted, the remainder is taxed at the CGT rate, and the cash is pulled from the generating equity holding in <em>January</em> of year Y+1. This flows through the unit price like a cost.</p>
          <p><strong>Gold tax treatment</strong> — EUWAX Gold II is an Inhaberschuldverschreibung, not a fund: no Vorabpauschale, no Teilfreistellung. Modelled here only via the §23 12-month rule on actual sales. Pre-2018 fund taxation regime is <em>not modelled</em> (legacy InvStG / equity ratios). If the window starts before 2018, the years before 2018 have no fund-level tax applied.</p>
          <p><strong>Costs</strong> — Ongoing fund cost applies as a monthly drag <code>(1 − cost)^(1/12)</code> <em>only</em> for assets toggled to <code>gross</code> (index series). For <code>net</code> series the cost is already inside the data. Buy/sell spreads and per-order fees are applied to every transaction including month-0 purchases.</p>
          <p><strong>Window</strong> — the common window is the intersection of available monthly data across <em>all assets used by all selected portfolios</em>. Selecting any portfolio with coIQ caps the window at ~Feb 2022–present. Short-window comparisons (&lt; 10 years) get a single-regime warning.</p>
          <p><strong>Beyond modelled</strong> — frictionless beyond explicit costs/taxes; no slippage beyond modelled spreads; no withholding-tax leakage at the fund layer beyond Teilfreistellung; no broker order minima; FX risk is assumed zero (series are EUR-denominated).</p>
        </div>
      </div>

      <div style={{ marginTop: 28, fontSize: 11, color: "var(--ink-mute)", textAlign: "center" }}>
        Single-file React. Hostable on GitHub Pages. {GOOGLE_CLIENT_ID ? "Drive sync enabled." : "Set GOOGLE_CLIENT_ID at the top of the file to enable Drive sync."}
      </div>
    </div>
  );
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function StatusPill({ status }) {
  const kind = status.kind === "ok" ? "ok" : status.kind === "bad" ? "bad" : status.kind === "warn" ? "warn" : status.kind === "info" ? "info" : "idle";
  return <span className={"tag " + kind} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
    {status.kind === "info" && <span className="spin"></span>}
    {status.msg}
  </span>;
}

function NumField({ label, value, onChange, step = 1 }) {
  return (
    <label className="field">
      <span className="lbl">{label}</span>
      <input type="number" step={step} value={value ?? 0} onChange={e => onChange(+e.target.value)} />
    </label>
  );
}

function Empty({ msg, kind }) {
  return <div className="panel" style={{ padding: 24, textAlign: "center", color: "var(--ink-soft)" }}>
    <span className={"tag " + (kind || "idle")} style={{ marginRight: 8 }}>info</span>{msg}
  </div>;
}

function CsvCard({ asset, text, data, error, seriesType, fetchStatus, manifestEntry, onReload, onSetType, onText, onFile }) {
  const fileRef = useRef(null);
  const n = data?.length || 0;
  const range = n > 0 ? `${data[0].month} → ${data[n - 1].month}` : "";
  const fs = fetchStatus;
  const busy = fs?.kind === "info";
  return (
    <div className={"csv-card" + (n > 0 ? " loaded" : "")}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div>
          <h3>{asset.label}</h3>
          <div className="id">{asset.isin}</div>
        </div>
        {onSetType && (
          <div className="seg">
            <button className={seriesType === "net" ? "on" : ""} onClick={() => onSetType("net")}>net</button>
            <button className={seriesType === "gross" ? "on" : ""} onClick={() => onSetType("gross")}>gross</button>
          </div>
        )}
      </div>
      <textarea rows={3} placeholder="date,value&#10;2020-01-31,100.00&#10;2020-02-29,101.34&#10;…" value={text} onChange={e => onText(e.target.value)} />
      <div className="ctrl">
        <button className="btn btn-xs btn-accent" disabled={busy} onClick={onReload}>
          {busy && <span className="spin"></span>} Reload
        </button>
        <button className="btn btn-xs" onClick={() => fileRef.current?.click()}>Upload CSV…</button>
        <input ref={fileRef} type="file" accept=".csv,text/csv" style={{ display: "none" }}
               onChange={e => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value = ""; }} />
        <button className="btn btn-xs btn-ghost" onClick={() => onText("")}>Clear</button>
        {n > 0 && <span className="tag ok">{n} months</span>}
        {!n && !error && <span className="tag idle">no data</span>}
        {error && <span className="tag bad">parse error</span>}
        {manifestEntry && <span className="tag info mono">as of {manifestEntry.lastDate}</span>}
        {fs && fs.kind !== "ok" && <span className={"tag " + (fs.kind === "bad" ? "bad" : "idle")}>{fs.msg}</span>}
      </div>
      {n > 0 && <div className="meta">{range} · last value {fmtNum(data[n - 1].value, 4)}</div>}
      {error && <div className="meta" style={{ color: "var(--neg)" }}>{error}</div>}
      {manifestEntry?.warnings?.length > 0 && (
        <div className="meta" style={{ color: "oklch(0.4 0.13 60)" }}>⚠ {manifestEntry.warnings.join(" · ")}</div>
      )}
    </div>
  );
}

function ManifestPill({ manifest }) {
  if (!manifest) return <span className="tag idle">no manifest</span>;
  const fetched = manifest.fetchedAt ? new Date(manifest.fetchedAt) : null;
  const ageDays = fetched ? Math.floor((Date.now() - fetched.getTime()) / 86400000) : null;
  const stale = ageDays != null && ageDays > 14;
  return <span className={"tag " + (stale ? "warn" : "info") + " mono"}>
    {fetched ? `fetched ${fetched.toISOString().slice(0, 10)}` : "fetched ?"} {stale && "· STALE"}
  </span>;
}

function SweepRow({ pid, chosen, sweep }) {
  const pf = PORTFOLIOS.find(p => p.id === pid);
  return (
    <div style={{ padding: "10px 0", borderTop: "1px solid var(--line)" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
        <strong style={{ fontSize: 12.5 }}>{pf.name}</strong>
        <span className="dim mono" style={{ fontSize: 11 }}>your weight {chosen}%</span>
        <span style={{ flex: 1 }}></span>
        {sweep
          ? <span className="tag info mono">optimal {sweep.w}% · Sortino {fmtNum(sweep.sortino, 3)}</span>
          : <span className="tag idle">not run</span>}
      </div>
      {sweep && <SweepBar chosen={chosen} optimal={sweep.w} samples={sweep.samples} />}
    </div>
  );
}

function SweepBar({ chosen, optimal, samples }) {
  // mini bar showing Sortino across 0..100% gold
  const max = Math.max(...samples.map(s => s.sortino || -Infinity));
  const min = Math.min(...samples.map(s => s.sortino || Infinity));
  const range = (max - min) || 1;
  return (
    <div style={{ marginTop: 8, position: "relative", height: 38 }}>
      <svg width="100%" height="38" preserveAspectRatio="none" viewBox="0 0 100 38">
        {samples.map((s, i) => {
          const h = ((s.sortino - min) / range) * 30 + 2;
          const fill = s.w === optimal ? "var(--accent)" : s.w === chosen ? "var(--ink)" : "var(--line-strong)";
          return <rect key={i} x={s.w} y={36 - h} width={0.85} height={h} fill={fill} />;
        })}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--ink-mute)", fontFamily: "JetBrains Mono, monospace", marginTop: 2 }}>
        <span>0% gold</span><span>50%</span><span>100% gold</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
