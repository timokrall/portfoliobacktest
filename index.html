<style>
  :root {
    --bg:           oklch(0.985 0.003 240);
    --panel:        oklch(1 0 0);
    --ink:          oklch(0.22 0.01 240);
    --ink-soft:     oklch(0.42 0.01 240);
    --ink-mute:     oklch(0.58 0.008 240);
    --line:         oklch(0.91 0.005 240);
    --line-strong:  oklch(0.84 0.008 240);
    --hover:        oklch(0.965 0.005 240);
    --accent:       oklch(0.55 0.09 200);
    --accent-soft:  oklch(0.94 0.03 200);
    --warn:         oklch(0.58 0.13 60);
    --warn-soft:    oklch(0.96 0.04 70);
    --pos:          oklch(0.55 0.10 155);
    --neg:          oklch(0.55 0.13 25);
    --shadow:       0 1px 0 oklch(0.92 0.005 240), 0 1px 2px oklch(0.85 0.005 240 / 0.3);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .mono, .num { font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
  h1,h2,h3,h4 { margin:0; font-weight:600; letter-spacing:-0.01em; }
  a { color: var(--accent); text-decoration: none; }
  hr { border:0; border-top:1px solid var(--line); margin: 0; }

  /* layout */
  .shell { max-width: 1320px; margin: 0 auto; padding: 28px 28px 96px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; padding-bottom:18px; border-bottom:1px solid var(--line); margin-bottom:24px; }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-mark { width:28px; height:28px; border-radius:7px; background: var(--ink); position:relative; overflow:hidden;}
  .brand-mark::after { content:""; position:absolute; inset:0; background: linear-gradient(135deg, transparent 40%, var(--accent) 40% 60%, transparent 60%); }
  .brand h1 { font-size:14px; }
  .brand .sub { font-size:11px; color: var(--ink-mute); }
  .topbar-right { display:flex; gap:10px; align-items:center; }

  .grid { display:grid; gap:18px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 980px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

  /* panel */
  .panel { background: var(--panel); border:1px solid var(--line); border-radius: 10px; }
  .panel-h { padding: 14px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; border-bottom: 1px solid var(--line); }
  .panel-h h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); }
  .panel-h .h-meta { font-size: 11px; color: var(--ink-mute); }
  .panel-body { padding: 16px; }
  .panel-body.tight { padding: 12px 16px; }

  /* form atoms */
  label.field { display:flex; flex-direction:column; gap: 6px; font-size: 11px; color: var(--ink-soft); }
  label.field > .lbl { display:flex; justify-content:space-between; align-items:baseline; }
  label.field > .lbl small { color: var(--ink-mute); font-weight:400; }
  input[type=text], input[type=number], textarea, select {
    width:100%; padding: 7px 9px; border:1px solid var(--line-strong); border-radius:6px; background: var(--panel); color: var(--ink);

  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus {

  textarea { font-size: 11px; line-height: 1.45; resize: vertical; }

  .btn { display:inline-flex; align-items:center; gap:6px; padding: 7px 12px; border-radius: 6px; border:1px solid var(--line-strong); background: var(--panel); color: var(--ink); cursor:pointer; font: inherit; font-weight:500; font-size: 12px; transition: background 120ms, border-color 120ms; }

  .btn-accent { background: var(--accent); color:white; border-color: var(--accent); }

  .btn-ghost { background: transparent; border-color: transparent; }

  .btn:disabled { opacity:0.5; cursor: not-allowed; }

  .chip { display:inline-flex; align-items:center; gap:6px; padding: 4px 9px; border-radius: 999px; border:1px solid var(--line-strong); background: var(--panel); cursor:pointer; font-size: 11.5px; color: var(--ink-soft); }

  /* table */

  .kv { display:flex; flex-direction:column; gap:2px; }
  .kv .k { font-size: 10.5px; color: var(--ink-mute); text-transform: uppercase; letter-spacing:0.06em; }
  .kv .v { font-size: 18px; font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }

  .tag { display:inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 500; }
  .tag.ok    { background: oklch(0.94 0.04 155); color: oklch(0.32 0.07 155); }
  .tag.warn  { background: var(--warn-soft); color: oklch(0.4 0.13 60); }
  .tag.idle  { background: var(--hover); color: var(--ink-mute); }

  .pos { color: var(--pos); }
  .neg { color: var(--neg); }

  .footnote { font-size: 11px; color: var(--ink-mute); line-height: 1.6; }

  /* winner banner */
  .winner { background: linear-gradient(135deg, var(--ink), oklch(0.27 0.02 220)); color:white; border-radius: 12px; padding: 20px 22px; }
  .winner .row { display:grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .winner .lbl { font-size: 10.5px; opacity: 0.65; text-transform: uppercase; letter-spacing:0.1em; }

  .winner .caveat { margin-top: 14px; font-size: 11px; opacity: 0.65; padding-top: 14px; border-top: 1px solid oklch(1 0 0 / 0.12); }

  /* CSV box */
  .csv-card { border:1px solid var(--line); border-radius: 9px; padding: 14px; background: var(--panel); }
  .csv-card.loaded { border-color: oklch(0.82 0.04 155); background: oklch(0.99 0.01 155); }
  .csv-card h3 { font-size: 12px; }
  .csv-card .id { font-size: 10.5px; color: var(--ink-mute); margin-top: 2px; font-family: "JetBrains Mono", monospace; }
  .csv-card .ctrl { display:flex; gap:6px; margin-top: 10px; flex-wrap: wrap; align-items:center;}
  .csv-card textarea { font-size: 10.5px; }
  .csv-card .meta { font-size: 10.5px; color: var(--ink-mute); margin-top: 6px; font-family: "JetBrains Mono", monospace; }

  /* portfolio multi-select */
  .pf-row { display:flex; gap: 10px; align-items: center; padding: 10px 0; border-top: 1px solid var(--line); }
  .pf-row:first-of-type { border-top:0; }
  .pf-row .pf-name { flex: 1; font-weight: 500; font-size: 12.5px;}
  .pf-row .pf-w  { width: 96px; }
  .pf-row .pf-w input { text-align: right; }

  /* iOS-style toggle */
  .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider { position: absolute; cursor: pointer; inset: 0; background: var(--line-strong); border-radius: 20px; transition: background 140ms; }
  .switch .slider::before { content: ""; position: absolute; left: 2px; top: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 140ms; box-shadow: 0 1px 2px oklch(0.6 0 0 / 0.3); }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(14px); }
  .switch input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }

  /* portfolio row: dim when excluded so the include/exclude state is obvious */
  .pf-row.off { opacity: 0.5; }
  .pf-row.off .pf-name { color: var(--ink-mute); }
  .pf-row .pf-include { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
  .pf-row .pf-include .pf-name { flex: none; }

  /* basiszins editor (removed — now auto-derived from ECB DFR) */

  .small-note { font-size: 10.5px; color: var(--ink-mute); margin-top: 8px; }

  details.fold > summary { cursor:pointer; padding: 8px 0; font-size: 12px; color: var(--ink-soft); user-select:none; }
  details.fold > summary::marker { color: var(--ink-mute);}
  details.fold[open] > summary { color: var(--ink); font-weight:500; }

  /* spinner */
  @keyframes spin { to { transform: rotate(360deg);} }
  .spin { display:inline-block; width:12px; height:12px; border:1.5px solid var(--line-strong); border-top-color: var(--accent); border-radius:50%; animation: spin 0.8s linear infinite;}

  .recharts-cartesian-axis-tick-value { font-family: "JetBrains Mono", monospace; font-size: 10.5px; fill: var(--ink-mute);}
  .recharts-legend-item-text { font-size: 11.5px !important; color: var(--ink-soft) !important; }
  .recharts-tooltip-wrapper { font-family: "JetBrains Mono", monospace !important; font-size: 11px;}

<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
// ============================================================================
// CONFIG — paste your OAuth Web-app client ID here to enable Drive sync.
// Leave blank to use browser localStorage only (app is fully functional).
// ============================================================================
const GOOGLE_CLIENT_ID = "";
// ============================================================================

const { useState, useEffect, useMemo, useRef, useCallback } = React;
const RC = window.Recharts;
const { LineChart, Line, Area, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, CartesianGrid, ReferenceArea } = RC;

// ---------- date / math helpers ----------
const fmtEUR = (n, d = 0) => {
  if (n == null || !isFinite(n)) return "—";
  return new Intl.NumberFormat("de-DE", { minimumFractionDigits: d, maximumFractionDigits: d }).format(n);
};
const fmtPct = (n, d = 2) => (n == null || !isFinite(n)) ? "—" : (n * 100).toFixed(d) + "%";
const fmtNum = (n, d = 2) => (n == null || !isFinite(n)) ? "—" : n.toFixed(d);
const ym = (y, m) => y * 12 + m;            // m: 0..11
const toMonthKey = (date) => {
  const d = new Date(date);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}`;
};
const monthKeyToYM = (k) => { const [y, m] = k.split("-").map(Number); return { y, m: m - 1 }; };
const addMonths = (key, n) => { const { y, m } = monthKeyToYM(key); const idx = y * 12 + m + n; return `${Math.floor(idx / 12)}-${String((idx % 12) + 1).padStart(2, "0")}`; };
const monthsBetween = (a, b) => { const A = monthKeyToYM(a), B = monthKeyToYM(b); return (B.y - A.y) * 12 + (B.m - A.m); };

// ---------- ECB rate parser ----------
// ECB SDW "changes-only" CSV: DATE, "TIME PERIOD", level%. Some users export
// just date,value. We accept both shapes. Output: sorted [{t: epoch_ms, rate: pct}].
// If the value column header contains "lending" (marginal lending facility), rates
// are converted to estimated deposit-facility rates by subtracting the corridor
// gap (0.75 pp — the dominant MLF−DFR spread for 2019–Sep 2024).
const MLF_DFR_GAP = 0.75;

function parseEcbRateChanges(text) {
  // Pre-process: ECB SDW sometimes exports rows wrapped in outer quotes with
  // doubled inner quotes (e.g. "DATE,""TIME PERIOD"",""value"""). Detect this
  // pattern and unwrap before parsing.
  const lines = text.trim().split(/\r?\n/);
  if (lines.length > 1 && lines[0].startsWith('"') && lines[0].endsWith('"') &&
      lines[0].includes('""')) {
    text = lines.map(l => l.replace(/^"|"$/g, '').replace(/""/g, '"')).join('\n');
  }
  const out = Papa.parse(text.trim(), { header: true, skipEmptyLines: true, dynamicTyping: false });
  // If headers are weird (no "DATE" col), fall back to header-less parse.
  let rows = out.data;
  if (!rows || rows.length === 0 || (Object.keys(rows[0]).length === 1 && !Object.keys(rows[0])[0])) {
    const out2 = Papa.parse(text.trim(), { header: false, skipEmptyLines: true });
    rows = out2.data.map((arr) => Object.fromEntries(arr.map((v, i) => [String(i), v])));
  }
  const cols = Object.keys(rows[0] || {});
  const dateCol = cols.find(c => /^date$/i.test(c)) || cols.find(c => /date/i.test(c)) || cols[0];
  // Value column: prefer one named "level" / "rate" / "value"; else the last numeric col.
  let valCol = cols.find(c => /(level|rate|value|deposit|lending)/i.test(c));
  if (!valCol) {
    // try last column
    valCol = cols[cols.length - 1];
  }
  if (!dateCol || !valCol) throw new Error("ECB CSV: need date + rate columns");
  // Detect marginal lending facility data → convert to deposit facility rate
  const isMLF = /lending/i.test(valCol);
  const pts = [];
  for (const r of rows) {
    const ds = (r[dateCol] || "").toString().trim();
    const vs = (r[valCol] || "").toString().replace(/[,"]/g, ".").trim();
    if (!ds || !vs) continue;
    const t = Date.parse(ds);
    let v = parseFloat(vs.replace(/\.\./g, "."));
    if (!isFinite(t) || !isFinite(v)) continue;
    if (isMLF) v = v - MLF_DFR_GAP;  // MLF → estimated DFR
    pts.push({ t, rate: v });
  }
  if (pts.length === 0) throw new Error("ECB CSV: no rows parsed");
  pts.sort((a, b) => a.t - b.t);
  if (isMLF) console.log(`ECB CSV: detected marginal lending facility data — subtracted ${MLF_DFR_GAP}pp to estimate deposit facility rate (${pts.length} points)`);
  return pts;
}

// Look up the active ECB rate at a given epoch_ms (last change ≤ t).
// Returns null if no change has happened yet (before-series); caller defaults to 0.
function ecbRateAt(changes, t) {
  if (!changes || changes.length === 0) return null;
  // Binary search for the last change.t ≤ t
  let lo = 0, hi = changes.length - 1, ans = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (changes[mid].t <= t) { ans = mid; lo = mid + 1; }
    else hi = mid - 1;
  }
  return ans >= 0 ? changes[ans].rate : null;
}

// Derive a yearly Basiszins table from ECB rate changes.
// For each year, takes the ECB rate in effect on Jan 1. For years 2018+,
// the hardcoded BMF-published values are kept as authoritative overrides;
// for earlier years the ECB rate is used directly as a proxy.
function deriveBasiszinsFromEcb(ecbChanges) {
  if (!ecbChanges || ecbChanges.length === 0) return {};
  const firstYear = new Date(ecbChanges[0].t).getFullYear();
  const lastYear = new Date(ecbChanges[ecbChanges.length - 1].t).getFullYear() + 1;
  const startYear = Math.min(firstYear, 1990);
  const endYear = Math.max(lastYear, new Date().getFullYear() + 1);
  const out = {};
  for (let y = startYear; y <= endYear; y++) {
    const jan1 = Date.parse(`${y}-01-01`);
    const rate = ecbRateAt(ecbChanges, jan1);
    // Use rate directly; 0 for years before first ECB change
    out[y] = rate != null ? Math.round(rate * 100) / 100 : 0;
  }
  return out;
}

// ---------- CSV parse + monthly resample ----------
function parseCsvToMonthly(text) {
  const out = Papa.parse(text.trim(), { header: true, skipEmptyLines: true, dynamicTyping: false });
  if (out.errors.length > 0 && (!out.data || out.data.length === 0)) throw new Error(out.errors[0].message);
  const rows = out.data;  // tolerate column variants
  const cols = Object.keys(rows[0] || {});
  const dateCol = cols.find(c => /^date$/i.test(c)) || cols.find(c => /date/i.test(c)) || cols[0];
  const valCol  = cols.find(c => /^(value|close|nav|price|adj.?close)$/i.test(c)) || cols.find(c => /(value|close|nav|price)/i.test(c)) || cols[1];
  if (!dateCol || !valCol) throw new Error("Need columns: date,value");
  const pts = [];
  for (const r of rows) {
    const ds = (r[dateCol] || "").trim();
    const vs = (r[valCol] || "").toString().replace(",", ".").trim();
    if (!ds || !vs) continue;
    const t = Date.parse(ds);
    const v = parseFloat(vs);
    if (!isFinite(t) || !isFinite(v) || v <= 0) continue;
    pts.push({ t, v });
  }
  if (pts.length === 0) throw new Error("No valid rows parsed");
  pts.sort((a, b) => a.t - b.t);
  // bucket: keep the LAST observation of each month → month-end
  const map = new Map();
  for (const p of pts) {
    const d = new Date(p.t);
    const key = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}`;
    map.set(key, p.v);
  }
  const keys = [...map.keys()].sort();
  return keys.map(k => ({ month: k, value: map.get(k) }));
}

// Daily parse — returns ALL trading-day points {date: "YYYY-MM-DD", t: ms, value}
// sorted ascending, deduped (last value wins per date). Used only when at
// least one portfolio has 200-SMA timing ON.
function parseCsvToDaily(text) {
  const out = Papa.parse(text.trim(), { header: true, skipEmptyLines: true, dynamicTyping: false });
  if (out.errors.length > 0 && (!out.data || out.data.length === 0)) throw new Error(out.errors[0].message);
  const rows = out.data;
  const cols = Object.keys(rows[0] || {});
  const dateCol = cols.find(c => /^date$/i.test(c)) || cols.find(c => /date/i.test(c)) || cols[0];
  const valCol  = cols.find(c => /^(value|close|nav|price|adj.?close)$/i.test(c)) || cols.find(c => /(value|close|nav|price)/i.test(c)) || cols[1];
  if (!dateCol || !valCol) return [];
  const map = new Map();
  for (const r of rows) {
    const ds = (r[dateCol] || "").trim();
    const vs = (r[valCol] || "").toString().replace(",", ".").trim();
    if (!ds || !vs) continue;
    const t = Date.parse(ds);
    const v = parseFloat(vs);
    if (!isFinite(t) || !isFinite(v) || v <= 0) continue;
    const d = new Date(t);
    const key = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")}`;
    map.set(key, { date: key, t, value: v });
  }
  const sorted = [...map.values()].sort((a, b) => a.t - b.t);
  return sorted;
}

// ---------- assets ----------
// `taxLike: "fund"` triggers Vorabpauschale + Teilfreistellung. `taxLike: "debt"`
// (gold + lev3x ETP) skips both: taxed only on actual sale via §23 EStG.
// `holdable: false` means the series is loaded as a SIGNAL ONLY — never held.

// Same-origin load of pre-fetched CSVs committed by the weekly GitHub Action.
// No CORS, no proxies, no rate-limits. If a file is missing the user can still
// paste/upload a CSV manually as an override.
async function loadCommittedCsv(asset) {
  const url = `./data/${asset.file}?v=${Date.now()}`;
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  if (!text || text.length < 20) throw new Error("empty");
  return text;
}

async function loadManifest() {
  try {
    const r = await fetch(`./data/manifest.json?v=${Date.now()}`, { cache: "no-store" });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

// ============================================================================
// STORAGE — Drive appDataFolder OR localStorage fallback
// ============================================================================
const LS_KEY = "backtester-state.json";

function useStorage() {
  const [signedIn, setSignedIn] = useState(false);
  const [token, setToken] = useState(null);
  const [tokenClient, setTokenClient] = useState(null);
  const [status, setStatus] = useState({ kind: "idle", msg: "Local storage" });
  const [userEmail, setUserEmail] = useState(null);

  useEffect(() => {
    if (!GOOGLE_CLIENT_ID) return;
    const init = () => {
      if (!window.google || !window.google.accounts) { setTimeout(init, 200); return; }
      const tc = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: "https://www.googleapis.com/auth/drive.appdata",
        callback: (resp) => {
          if (resp.error) { setStatus({ kind: "bad", msg: "Auth failed: " + resp.error }); return; }
          setToken(resp.access_token);
          setSignedIn(true);
          setStatus({ kind: "ok", msg: "Signed in" });
        },
      });
      setTokenClient(tc);
    };
    init();
  }, []);

  const signIn = () => {
    if (!tokenClient) return;
    tokenClient.requestAccessToken({ prompt: signedIn ? "" : "consent" });
  };
  const signOut = () => {
    if (token && window.google) {
      try { window.google.accounts.oauth2.revoke(token, () => {}); } catch {}
    }
    setToken(null); setSignedIn(false);
    setStatus({ kind: "idle", msg: "Local storage" });
  };

  const driveFindFile = async () => {
    const r = await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'backtester-state.json'&fields=files(id,modifiedTime)", { headers: { Authorization: "Bearer " + token } });
    if (!r.ok) throw new Error("Drive list failed " + r.status);
    const j = await r.json();
    return j.files?.[0]?.id || null;
  };

  const save = async (state) => {
    const json = JSON.stringify(state);
    if (GOOGLE_CLIENT_ID && signedIn && token) {
      try {
        setStatus({ kind: "info", msg: "Saving to Drive…" });
        const existing = await driveFindFile();
        const metadata = { name: "backtester-state.json", mimeType: "application/json", parents: existing ? undefined : ["appDataFolder"] };
        const boundary = "-------" + Math.random().toString(36).slice(2);
        const body =
          `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
          `--${boundary}\r\nContent-Type: application/json\r\n\r\n${json}\r\n--${boundary}--`;
        const url = existing
          ? `https://www.googleapis.com/upload/drive/v3/files/${existing}?uploadType=multipart`
          : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
        const resp = await fetch(url, {
          method: existing ? "PATCH" : "POST",
          headers: { Authorization: "Bearer " + token, "Content-Type": `multipart/related; boundary=${boundary}` },
          body,
        });
        if (resp.status === 401) { setSignedIn(false); setToken(null); setStatus({ kind: "warn", msg: "Token expired — sign in again" }); return false; }
        if (!resp.ok) throw new Error("Drive save " + resp.status);
        setStatus({ kind: "ok", msg: "Saved to Drive · " + new Date().toLocaleTimeString() });
        return true;
      } catch (e) {
        setStatus({ kind: "bad", msg: "Save failed: " + e.message });
        return false;
      }
    } else {
      try {
        localStorage.setItem(LS_KEY, json);
        setStatus({ kind: "ok", msg: "Saved locally · " + new Date().toLocaleTimeString() });
        return true;
      } catch (e) {
        setStatus({ kind: "bad", msg: "Local save failed: " + e.message });
        return false;
      }
    }
  };

  const load = async () => {
    if (GOOGLE_CLIENT_ID && signedIn && token) {
      try {
        setStatus({ kind: "info", msg: "Loading from Drive…" });
        const id = await driveFindFile();
        if (!id) { setStatus({ kind: "idle", msg: "No saved state in Drive" }); return null; }
        const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, { headers: { Authorization: "Bearer " + token } });
        if (resp.status === 401) { setSignedIn(false); setToken(null); setStatus({ kind: "warn", msg: "Token expired" }); return null; }
        if (!resp.ok) throw new Error("Drive load " + resp.status);
        const j = await resp.json();
        setStatus({ kind: "ok", msg: "Loaded from Drive" });
        return j;
      } catch (e) {
        setStatus({ kind: "bad", msg: "Load failed: " + e.message });
        return null;
      }
    } else {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) { setStatus({ kind: "idle", msg: "Local storage · empty" }); return null; }
        setStatus({ kind: "ok", msg: "Loaded locally" });
        return JSON.parse(raw);
      } catch (e) {
        setStatus({ kind: "bad", msg: "Local load failed: " + e.message });
        return null;
      }
    }
  };

  return { signedIn, signIn, signOut, status, save, load, configured: !!GOOGLE_CLIENT_ID, userEmail };
}

// ============================================================================
// SIMULATION ENGINE
// ============================================================================
// Returns the simulation result including:
//   months[], unitPriceSeries, valueSeries, totalInvested, finalValue,
//   metrics (sortino, maxDD, monthsBelow30), goldWeightSeries, etc.
//
// state required:
//   portfolio: { assets: [...], equityId, isMarket }
//   targetGoldPct: 0..1
//   data: { assetId: [{month, value}, ...] }  -- already trimmed to common window
//   seriesType: { assetId: "net"|"gross" }
//   ongoingCost: { assetId: %/yr }
//   spreads: { assetId: { buy: %, sell: % } }
//   orderFee: { fixed: EUR, pct: % }
//   tax: { rate, teilfreistellung: {assetId: %}, allowance, basiszins: {year: %} }
//   starting: EUR
//   monthly: EUR
//   rebalance: "never" | "monthly" | "yearly" | "biennial"
// months is the array of month keys for the simulation, from data.
// ============================================================================

function buildReturnsMap(data) {
  // Per asset: returns[i] = price[i]/price[i-1] - 1
  const out = {};
  for (const id of Object.keys(data)) {
    const arr = data[id];
    const r = [0];
    for (let i = 1; i < arr.length; i++) r.push(arr[i].value / arr[i - 1].value - 1);
    out[id] = r;
  }
  return out;
}

function simulatePortfolio(state) {
  const { portfolio, targetGoldPct, data, seriesType, ongoingCost, spreads, orderFee, tax, starting, monthly, rebalance } = state;
  const assets = portfolio.assets;
  const months = data[assets[0]].map(r => r.month);
  const N = months.length;
  if (N < 2) return null;

  // monthly drag for "gross"
  const monthlyDrag = {};
  for (const a of assets) monthlyDrag[a] = seriesType[a] === "gross" ? Math.pow(1 - (ongoingCost[a] / 100), 1 / 12) : 1;

  const returns = buildReturnsMap(data);
  const assetEquityId = portfolio.equityId;
  const isMarket = !!portfolio.isMarket;

  // weights
  const targets = {};
  if (isMarket) targets[assetEquityId] = 1;
  else { targets["gold"] = targetGoldPct; targets[assetEquityId] = 1 - targetGoldPct; }

  // holdings (cash value, EUR)
  const holdings = {}; for (const a of assets) holdings[a] = 0;
  // lots: gold lots track maturity; equity lots track Vorabpauschale proration
  const goldLots = [];      // {units, acqMonth, costPerUnit}
  const equityLots = {};    // equityId -> [{units, acqMonth, value (mutable mark-to-market)}]
  for (const a of assets) if (a !== "gold") equityLots[a] = [];

  // synthetic per-asset "units" so we can track price independently
  const assetUnits = {}; const assetPricePerUnit = {};
  for (const a of assets) { assetUnits[a] = 0; assetPricePerUnit[a] = 100; }

  // Unit-price of the portfolio (contribution-neutral, but reduced by costs/taxes)
  let unitPrice = 100;
  const unitPriceSeries = [];
  const valueSeries = [];
  const goldWeightSeries = [];
  let totalInvested = 0;

  // Helper: buy `eur` worth of asset a at month idx (after price applied)
  const buy = (a, eur, idx) => {
    if (eur <= 0) return 0;
    const fee = orderFee.fixed + (orderFee.pct / 100) * eur;
    const eff = eur - fee;
    if (eff <= 0) return 0;
    const effectivePrice = assetPricePerUnit[a] * (1 + (spreads[a].buy / 100));
    const units = eff / effectivePrice;
    assetUnits[a] += units;
    holdings[a] += eff / (1 + (spreads[a].buy / 100));   // value at mid-price
    if (a === "gold") {
      goldLots.push({ units, acqMonth: idx, costPerUnit: effectivePrice });
    } else {
      equityLots[a].push({ units, acqMonth: idx, valueAtYearStart: units * assetPricePerUnit[a] });
    }
    return units;
  };

  // Sell `eur` worth of gold from matured lots only (idx >= acq+12), FIFO. Returns EUR proceeds (after spread/fee).
  const sellMaturedGold = (eurTarget, idx) => {
    let need = eurTarget;
    let proceedsGross = 0;
    let unitsSold = 0;
    for (const lot of goldLots) {
      if (need <= 0.0001) break;
      if (idx - lot.acqMonth < 12) continue;
      if (lot.units <= 0) continue;
      const lotMidValue = lot.units * assetPricePerUnit.gold;
      const take = Math.min(need, lotMidValue);
      const portion = take / lotMidValue;
      const unitsTaken = lot.units * portion;
      unitsSold += unitsTaken;
      lot.units -= unitsTaken;
      proceedsGross += take;
      need -= take;
    }
    if (unitsSold === 0) return 0;
    assetUnits.gold -= unitsSold;
    holdings.gold -= proceedsGross;
    const sellPrice = assetPricePerUnit.gold * (1 - (spreads.gold.sell / 100));
    const grossEur = unitsSold * sellPrice;
    const fee = orderFee.fixed + (orderFee.pct / 100) * grossEur;
    return Math.max(0, grossEur - fee);
  };

  // -------- Month 0: invest starting allocation --------
  // initial gold lot is treated as matured: acqMonth = -12
  // We do this by special-casing: buy gold then back-date the lot.
  totalInvested += starting;
  for (const a of assets) {
    const w = targets[a] || 0;
    const eur = starting * w;
    if (eur <= 0) continue;
    const fee = orderFee.fixed + (orderFee.pct / 100) * eur;
    const eff = eur - fee;
    const effectivePrice = assetPricePerUnit[a] * (1 + (spreads[a].buy / 100));
    const units = eff / effectivePrice;
    assetUnits[a] += units;
    holdings[a] += eff / (1 + (spreads[a].buy / 100));
    if (a === "gold") {
      goldLots.push({ units, acqMonth: -12, costPerUnit: effectivePrice });   // matured at month 0
    } else {
      equityLots[a].push({ units, acqMonth: 0, valueAtYearStart: units * assetPricePerUnit[a] });
    }
  }

  unitPriceSeries.push(unitPrice);
  valueSeries.push(starting);
  goldWeightSeries.push(isMarket ? 0 : (holdings.gold || 0) / (holdings.gold + holdings[assetEquityId] || 1));

  // Track per-equity year-start basis per lot — we re-mark each Jan

      valueBefore += holdings[a];
    }

    }

        const perAssetVPTaxable = {};
        for (const a of assets) {
          if (a === "gold") continue;
          perAssetVPTaxable[a] = 0;
          const lots = equityLots[a];
          // For VP we need prices at year start and year end of Yprev

          // year-end = either December of Yprev (if month exists) or last available month within Yprev
          // we want the month index whose monthKey starts with Yprev and is the LAST one
          // simpler: find max idx in range with key.startsWith(Yprev)

          if (yEndIdx < 0) continue;

            const lotEndValEur = lot.units * yEndPrice;

            const gain = lotEndValEur - lotStartValEur;

              const monthsBefore = monthKeyToYM(months[lot.acqMonth]).m;

            }

    // 3. monthly contribution

      // direct cash to the underweight asset(s)

      } else {

        const desiredEquity = totalValue * targets[assetEquityId];

          allocation[assetEquityId] = monthly * targets[assetEquityId];
        } else {

          allocation[assetEquityId] = Math.min(equityPart, Math.max(0, gapEquity));

    goldWeightSeries.push(isMarket ? 0 : (holdings.gold || 0) / totalEnd);

    for (const a of assets) {

  // (Hoisted by JS for var; but we used const. Restructure: define before loop.)

  // Compute metrics on unit-price series
  const monthlyRets = [];
  for (let i = 1; i < unitPriceSeries.length; i++) monthlyRets.push(unitPriceSeries[i] / unitPriceSeries[i - 1] - 1);
  const downside = monthlyRets.filter(r => r < 0);
  const downsideStd = downside.length > 1
    ? Math.sqrt(downside.reduce((s, r) => s + r * r, 0) / downside.length)
    : 0;
  const meanR = monthlyRets.reduce((s, r) => s + r, 0) / Math.max(1, monthlyRets.length);
  const sortino = downsideStd > 0 ? (meanR / downsideStd) * Math.sqrt(12) : null;

  let peak = unitPriceSeries[0];
  let maxDD = 0;
  const ddSeries = [];
  let monthsBelow30 = 0;
  for (const u of unitPriceSeries) {
    peak = Math.max(peak, u);
    const dd = u / peak - 1;
    ddSeries.push(dd);
    if (dd < maxDD) maxDD = dd;
    if (dd < -0.30) monthsBelow30++;
  }

  const finalValue = valueSeries[valueSeries.length - 1];
  const finalGoldWeight = goldWeightSeries[goldWeightSeries.length - 1];
  const upi = computeUPI(ddSeries, unitPriceSeries, months, ecbChanges);

  return {
    months, unitPriceSeries, valueSeries, ddSeries, goldWeightSeries,
    totalInvested, finalValue, finalGoldWeight,
    metrics: { sortino, upi, maxDD, monthsBelow30, monthlyRets, n: monthlyRets.length },
    taxLog,
  };
}

  const N = months.length;
  if (N < 2) return null;
  const monthlyDrag = {};
  const monthlyDragCutoff = {};
  for (const a of assets) {
    monthlyDrag[a] = seriesType[a] === "gross" ? Math.pow(1 - (ongoingCost[a] / 100), 1 / 12) : 1;
    const meta = ASSETS.find(x => x.id === a);
    monthlyDragCutoff[a] = meta?.costCutoff || null;

  const isMarket = !!portfolio.isMarket;

  const targets = {};

    for (const a of assets) sw += (portfolio.weights[a] || 0);
    for (const a of assets) targets[a] = sw > 0 ? (portfolio.weights[a] || 0) / sw : 0;

    }

  const assetUnits = {}; for (const a of assets) assetUnits[a] = 0;

  const equityLots = {};
  for (const a of assets) {

    }

    // record
    const totalEnd = Object.values(holdings).reduce((s, v) => s + v, 0);
    valueSeries.push(totalEnd);
    unitPriceSeries.push(unitPrice);
    goldWeightSeries.push(isMarket ? 0 : (holdings.gold || 0) / Math.max(1e-9, totalEnd));
  }

  // metrics
  const monthlyRets = [];
  for (let i = 1; i < unitPriceSeries.length; i++) monthlyRets.push(unitPriceSeries[i] / unitPriceSeries[i - 1] - 1);
  const downside = monthlyRets.filter(r => r < 0);
  const downsideStd = downside.length > 1 ? Math.sqrt(downside.reduce((s, r) => s + r * r, 0) / downside.length) : 0;
  const meanR = monthlyRets.reduce((s, r) => s + r, 0) / Math.max(1, monthlyRets.length);
  const sortino = downsideStd > 0 ? (meanR / downsideStd) * Math.sqrt(12) : null;

  let peak = unitPriceSeries[0]; let maxDD = 0; const ddSeries = []; let monthsBelow30 = 0;
  for (const u of unitPriceSeries) {
    peak = Math.max(peak, u);
    const dd = u / peak - 1;
    ddSeries.push(dd);
    if (dd < maxDD) maxDD = dd;
    if (dd < -0.30) monthsBelow30++;
  }

  const upi = computeUPI(ddSeries, unitPriceSeries, months, ecbChanges);

  return {
    months, unitPriceSeries, valueSeries, ddSeries, goldWeightSeries,
    totalInvested, finalValue: valueSeries[valueSeries.length - 1],
    finalGoldWeight: goldWeightSeries[goldWeightSeries.length - 1],
    metrics: { sortino, upi, maxDD, monthsBelow30, monthlyRets, n: monthlyRets.length },
    taxLog,
  };
}

// Ulcer Performance Index — measures risk-adjusted return penalizing both
// drawdown depth and duration. UI = sqrt(mean(dd²)), UPI = (ann.return - rf) / UI.
// ddSeries: fractional drawdowns from peak (e.g. -0.20 = 20% below peak).
// months: month keys array. ecbChanges: ECB rate step-function for risk-free rate.
function computeUPI(ddSeries, unitPriceSeries, months, ecbChanges) {
  if (!ddSeries || ddSeries.length < 2 || !unitPriceSeries || unitPriceSeries.length < 2) return null;
  // Ulcer Index (fractional)
  const sumSqDD = ddSeries.reduce((s, d) => s + d * d, 0);
  const ulcerIndex = Math.sqrt(sumSqDD / ddSeries.length);
  if (ulcerIndex <= 0) return null;
  // Annualized return (fractional)
  const n = unitPriceSeries.length - 1; // number of monthly periods
  const totalReturn = unitPriceSeries[n] / unitPriceSeries[0];
  const annReturn = Math.pow(totalReturn, 12 / n) - 1;
  // Average risk-free rate over the period (fractional)
  let rf = 0;
  if (ecbChanges && ecbChanges.length > 0 && months && months.length > 0) {
    let sum = 0;
    for (const mk of months) {
      const t = Date.parse(mk + "-15"); // mid-month
      const rate = ecbRateAt(ecbChanges, t);
      sum += Math.max(0, rate != null ? rate / 100 : 0); // floor at 0, convert to fraction
    }
    rf = sum / months.length;
  }
  return (annReturn - rf) / ulcerIndex;
}

// Average CAGR — for each year-end in the backtest, compute the CAGR from
// inception to that point, then average. Rewards portfolios that compound
// consistently: 1→2→4→8 (avg 100%) beats 1→1→1→8 (avg 33%).
function avgYearlyCAGR(unitPriceSeries) {
  if (!unitPriceSeries || unitPriceSeries.length < 13) return null;
  const p0 = unitPriceSeries[0];
  if (p0 <= 0) return null;
  let sum = 0, count = 0;
  for (let m = 12; m < unitPriceSeries.length; m += 12) {
    const years = m / 12;
    const cagr = Math.pow(unitPriceSeries[m] / p0, 1 / years) - 1;
    sum += cagr;
    count++;
  }
  return count > 0 ? sum / count : null;
}

// Integrated risk-return score: median permutation integral.
// Extracts monthly portfolio returns, builds the real cash benchmark curve
// (ECB/CPI, fixed timeline), then shuffles the returns N times. For each
// shuffle, compounds into a new price path and computes the level-based
// integral Σ(realPortfolio[t] − realCash[t]). Returns the median integral
// divided by years. This removes path dependency: a portfolio that only
// scores well because big returns happened early gets demoted to its
// typical ordering.
function integratedRiskReturn(unitPriceSeries, ddSeries, finalRatio, months, cpiSeries, ecbChanges) {
  if (!unitPriceSeries || unitPriceSeries.length < 13 || !months || !cpiSeries) return null;
  const n = unitPriceSeries.length;
  const cpiMap = new Map(cpiSeries.map(r => [r.month, r.value]));
  const cpi0 = cpiMap.get(months[0]);
  if (!cpi0 || cpi0 <= 0) return null;
  // Extract monthly portfolio returns
  const rets = [];
  for (let i = 1; i < n; i++) {
    rets.push(unitPriceSeries[i] / unitPriceSeries[i - 1] - 1);
  }
  // Build fixed real cash benchmark curve (ECB accumulation / CPI growth)
  const realCash = [1];
  let ecbAcc = 1;
  for (let i = 1; i < n; i++) {
    const t = Date.parse(months[i] + "-15");
    const annRate = ecbChanges ? (ecbRateAt(ecbChanges, t) ?? 0) : 0;
    ecbAcc *= (1 + Math.pow(1 + Math.max(0, annRate / 100), 1 / 12) - 1);
    const cpiVal = cpiMap.get(months[i]);
    if (cpiVal == null) { realCash.push(realCash[realCash.length - 1]); continue; }
    realCash.push(ecbAcc / (cpiVal / cpi0));
  }
  // Monte Carlo: shuffle returns, build price path, compute integral
  const MC = 100;
  const integrals = [];
  // Simple seeded LCG for reproducibility
  let seed = 42;
  const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
  for (let mc = 0; mc < MC; mc++) {
    // Fisher-Yates shuffle on a copy
    const shuffled = rets.slice();
    for (let j = shuffled.length - 1; j > 0; j--) {
      const k = Math.floor(rand() * (j + 1));
      const tmp = shuffled[j]; shuffled[j] = shuffled[k]; shuffled[k] = tmp;
    }
    // Compound shuffled returns into price path, compute integral
    let level = 1;
    let integral = (1 / (cpi0 / cpi0)) - realCash[0]; // month 0: both start at 1
    for (let i = 0; i < shuffled.length; i++) {
      level *= (1 + shuffled[i]);
      const cpiVal = cpiMap.get(months[i + 1]);
      const cpiGrowth = cpiVal ? cpiVal / cpi0 : 1;
      const realPf = level / cpiGrowth;
      integral += realPf - realCash[i + 1];
    }
    const years = rets.length / 12;
    integrals.push(years > 0 ? integral / years : 0);
  }
  // Return median
  integrals.sort((a, b) => a - b);
  return integrals[Math.floor(integrals.length / 2)];
}

// Convexity-weighted excess return over real cash (ECB/CPI).
// Convexity-weighted average monthly excess return over real cash.
// w(f', f'') = 1 + α × sign(f''), where α = stdev(f'') / mean(|f''|).
// f' and f'' are computed on monthly real excess returns.
function convexityWeightedExcessReturn(unitPriceSeries, ddSeries, finalRatio, months, cpiSeries, ecbChanges) {
  if (!unitPriceSeries || unitPriceSeries.length < 15 || !months || !cpiSeries) return null;
  const n = unitPriceSeries.length;
  const cpiMap = new Map(cpiSeries.map(r => [r.month, r.value]));
  // Compute monthly real excess returns
  const exRets = [];
  for (let i = 1; i < n; i++) {
    const cpiPrev = cpiMap.get(months[i - 1]);
    const cpiCur = cpiMap.get(months[i]);
    if (cpiPrev == null || cpiCur == null || cpiPrev <= 0) { exRets.push(null); continue; }
    const rPf = unitPriceSeries[i] / unitPriceSeries[i - 1] - 1;
    const t = Date.parse(months[i] + "-15");
    const annRate = ecbChanges ? (ecbRateAt(ecbChanges, t) ?? 0) : 0;
    const rCash = Math.pow(1 + Math.max(0, annRate / 100), 1 / 12) - 1;
    const infl = cpiCur / cpiPrev - 1;
    exRets.push((1 + rPf) / (1 + infl) - 1 - ((1 + rCash) / (1 + infl) - 1));
  }
  // f' = exRets, f'' = change in exRets
  const valid = exRets.filter(v => v != null);
  if (valid.length < 12) return null;
  const fpp = [];
  for (let i = 1; i < exRets.length; i++) {
    if (exRets[i] != null && exRets[i - 1] != null) fpp.push(exRets[i] - exRets[i - 1]);
  }
  if (fpp.length < 6) return null;
  const absFpp = fpp.map(v => Math.abs(v));
  const meanAbsFpp = absFpp.reduce((s, v) => s + v, 0) / absFpp.length;
  if (meanAbsFpp <= 0) return null;
  const meanFpp = fpp.reduce((s, v) => s + v, 0) / fpp.length;
  const varFpp = fpp.reduce((s, v) => s + (v - meanFpp) ** 2, 0) / fpp.length;
  const alpha = Math.sqrt(varFpp) / meanAbsFpp;
  // Weighted sum of monthly excess returns
  let weightedSum = 0;
  let validCount = 0;
  let fppIdx = 0;
  for (let i = 0; i < exRets.length; i++) {
    if (exRets[i] == null) continue;
    // Align f'' index: fpp[j] corresponds to change from exRets[j] to exRets[j+1]
    const w = (fppIdx > 0 && fppIdx - 1 < fpp.length) ? 1 + alpha * Math.sign(fpp[fppIdx - 1]) : 1;
    weightedSum += w * exRets[i];
    validCount++;
    fppIdx++;
  }
  const years = validCount / 12;
  return years > 0 ? weightedSum / years : null;
}

// ---------- V2: rolling real-return engine + paired (return,CPI) MC ----------
// On a portfolio's UNIT-PRICE series + aligned CPI level series, compute
// per holding horizon h (years) the worst-window real CAGR/multiple, the
// 5th-percentile real CAGR, and window count. Sliding monthly.
function rollingRealReturns(unitPrice, cpiAligned, hMaxYears) {
  const N = Math.min(unitPrice.length, cpiAligned.length);
  const out = [];
  for (let h = 1; h <= hMaxYears; h++) {
    const L = h * 12;
    if (L >= N) { out.push({ h, count: 0 }); continue; }
    const cagrs = []; const mults = [];
    for (let t = 0; t + L < N; t++) {
      const nom = unitPrice[t + L] / unitPrice[t];
      const cpiR = cpiAligned[t + L] / cpiAligned[t];
      if (!isFinite(nom) || !isFinite(cpiR) || cpiR <= 0 || nom <= 0) continue;
      const real = nom / cpiR;
      cagrs.push(Math.pow(real, 1 / h) - 1);
      mults.push(real);
    }
    if (cagrs.length === 0) { out.push({ h, count: 0 }); continue; }
    const idx = cagrs.map((_, i) => i).sort((a, b) => cagrs[a] - cagrs[b]);
    const worstI = idx[0];
    const p5I = idx[Math.floor(0.05 * (idx.length - 1))];
    out.push({
      h, count: cagrs.length,
      worstRealCAGR: cagrs[worstI],
      worstRealMultiple: mults[worstI],
      p5RealCAGR: cagrs[p5I],
    });
  }
  return out;
}

// Paired block-bootstrap on (portfolio monthly return, CPI monthly return).
// Together (same start, same block) to preserve gold/inflation co-movement.
function rollingRealReturnsMC(pairedReturns, hYears, nPaths, blockLen, seed = 1) {
  if (!pairedReturns || pairedReturns.length < blockLen + 2) return null;
  let s = seed >>> 0;
  const rand = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  const horizon = hYears * 12;
  const maxStart = pairedReturns.length - blockLen;
  if (maxStart < 1) return null;
  const cagrs = [];
  for (let p = 0; p < nPaths; p++) {
    let nom = 1, cpi = 1;
    let need = horizon;
    while (need > 0) {
      const start = Math.floor(rand() * (maxStart + 1));
      const take = Math.min(blockLen, need);
      for (let i = 0; i < take; i++) {
        nom *= (1 + pairedReturns[start + i].pr);
        cpi *= (1 + pairedReturns[start + i].cr);
      }
      need -= take;
    }
    if (cpi <= 0) continue;
    const real = nom / cpi;
    if (real <= 0) continue;
    cagrs.push(Math.pow(real, 1 / hYears) - 1);
  }
  if (cagrs.length === 0) return null;
  cagrs.sort((a, b) => a - b);
  return {
    n: cagrs.length,
    worstRealCAGR: cagrs[0],
    p5RealCAGR: cagrs[Math.floor(0.05 * (cagrs.length - 1))],
  };
}

// Build a paired (portfolio return, CPI return) array aligned by month index.
function buildPairedReturns(unitPrice, cpiAligned) {
  const N = Math.min(unitPrice.length, cpiAligned.length);
  const out = [];
  for (let i = 1; i < N; i++) {
    const pr = unitPrice[i] / unitPrice[i - 1] - 1;
    const cr = cpiAligned[i] / cpiAligned[i - 1] - 1;
    if (isFinite(pr) && isFinite(cr)) out.push({ pr, cr });
  }
  return out;
}

// ---------- 200-SMA daily timing engine ----------
// Given daily risk-leg + daily signal (FTSE All-World VT or proxy), produces a
// month-end "synthetic risk-leg unit price" series with the timing rule applied:
//   each trading day d: if signal_close(d-1) > SMA200(d-1) → HOLD risk leg;
//   else → CASH (earning cash_rate/252 daily). On every switch, charge buy/sell
//   spreads + a percent order fee. Gold is never timed (handled elsewhere).
//
// CGT (quick approximation): on every risk → cash flip, if the running per-unit
// gain (current unit / unit at last entry − 1) is positive, an effective tax
// rate of taxRate × (1 − Teilfreistellung) is applied to that gain as a one-shot
// fractional drag. No FIFO lot tracking, no Sparer-Pauschbetrag, no
// Anrechnung of prior Vorabpauschale — overstates tax by a few %.
// taxLikeDebt = true (gold / lev3x ETP) skips the Teilfreistellung reduction.
//
// Output is a [{month, value}] monthly series the existing engine consumes.
function buildTimedRiskLegMonthly(riskDaily, signalDaily, cashRateAnnual, spreadBuyPct, spreadSellPct, orderFee, taxOpts, ecbChanges) {
  if (!riskDaily?.length || !signalDaily?.length) return null;
  // intersect by date (both must have a print that day)
  const sigMap = new Map(signalDaily.map(p => [p.date, p.value]));
  const joined = riskDaily.filter(p => sigMap.has(p.date));
  if (joined.length < 220) return null;
  const risk = joined.map(p => p.value);
  const sig  = joined.map(p => sigMap.get(p.date));
  // rolling 200-day SMA on signal
  const SMA = new Array(joined.length).fill(null);
  let sum = 0;
  for (let i = 0; i < joined.length; i++) {
    sum += sig[i];
    if (i >= 200) sum -= sig[i - 200];
    if (i >= 199) SMA[i] = sum / 200;
  }
  // If ECB step-changes are supplied, the cash rate is the latest change ≤ each
  // day, floored at 0. Otherwise it's the static cashRateAnnual.
  const useEcb = ecbChanges && ecbChanges.length > 0;
  const staticDailyCash = Math.pow(1 + (cashRateAnnual || 0) / 100, 1 / 252) - 1;
  const dailyCashAt = (i) => {
    if (!useEcb) return staticDailyCash;
    const rate = ecbRateAt(ecbChanges, joined[i].t);
    const eff = Math.max(0, rate == null ? 0 : rate);   // floor at 0
    return Math.pow(1 + eff / 100, 1 / 252) - 1;
  };
  const buyDrag   = 1 - (spreadBuyPct  || 0) / 100;
  const sellDrag  = 1 - (spreadSellPct || 0) / 100;
  // Per-flip percent fee. The fixed-EUR fee doesn't translate cleanly into
  // unit-price space — fixed fees are typically a fraction of a percent of
  // a flip, so we fold them in as an additional fixed bp drag.
  const fixedFeeBpDrag = orderFee?.fixed > 0 ? 0.9998 : 1;   // ~2 bp per flip as approximation
  const feePctDrag = 1 - (orderFee?.pct || 0) / 100;

  // CGT approximation params
  const taxRate = (taxOpts?.rate || 0) / 100;                       // 0.26375
  const tfPct   = (taxOpts?.teilfreistellung || 0) / 100;           // 0 if debt-like
  const effTax  = taxOpts?.taxLikeDebt
    ? taxRate                                                       // gold/lev3x ETP — no TF
    : taxRate * (1 - tfPct);                                        // UCITS funds — TF applies
  const taxOn = !!taxOpts && taxRate > 0;

  let unit = 100;
  let prevPos = null;
  let entryUnit = null;   // unit price at entry into current risk position (cost basis proxy)
  let flips = 0;
  let cgtPaid = 0;        // total CGT drag in unit terms, for diagnostics
  const monthEnd = new Map();
  const startIdx = 200;   // first day where SMA[i-1] = SMA[199] is available
  for (let i = startIdx; i < joined.length; i++) {
    const pos = (sig[i - 1] > SMA[i - 1]) ? "risk" : "cash";
    if (prevPos !== null && pos !== prevPos) {
      let drag = 1;
      if (prevPos === "risk") drag *= sellDrag * feePctDrag * fixedFeeBpDrag;
      if (pos === "risk")     drag *= buyDrag  * feePctDrag * fixedFeeBpDrag;
      unit *= drag;
      // CGT on risk → cash: tax the realized gain (if any) since entry
      if (taxOn && prevPos === "risk" && entryUnit != null && unit > entryUnit) {
        const gainPerUnit = unit - entryUnit;
        const tax = gainPerUnit * effTax;
        const before = unit;
        unit -= tax;
        cgtPaid += tax;
        if (unit < 1e-9) unit = 1e-9;
      }
      flips++;
      // Update cost basis when entering a new risk position
      if (pos === "risk") entryUnit = unit;
      if (pos === "cash") entryUnit = null;
    } else if (prevPos === null && pos === "risk") {
      entryUnit = unit;
    }
    if (pos === "risk") {
      const r = risk[i] / risk[i - 1] - 1;
      if (isFinite(r)) unit *= (1 + r);
    } else {
      unit *= (1 + dailyCashAt(i));
    }
    prevPos = pos;
    const mk = joined[i].date.slice(0, 7);
    monthEnd.set(mk, unit);
  }
  const months = [...monthEnd.keys()].sort();
  return {
    series: months.map(m => ({ month: m, value: monthEnd.get(m) })),
    flips,
    cgtPaidUnit: cgtPaid,
    coveredFromDate: joined[startIdx]?.date,
    taxApplied: taxOn,
    effTaxRate: effTax,
  };
}

// ---------- Linear regression (OLS) ----------
function regress(y, x) {
  const n = Math.min(y.length, x.length);
  if (n < 5) return null;
  let sx = 0, sy = 0, sxy = 0, sxx = 0, syy = 0;
  for (let i = 0; i < n; i++) { sx += x[i]; sy += y[i]; sxy += x[i] * y[i]; sxx += x[i] * x[i]; syy += y[i] * y[i]; }
  const mx = sx / n, my = sy / n;
  const beta = (sxy - n * mx * my) / (sxx - n * mx * mx);
  const alpha = my - beta * mx;
  // R²
  const ssTot = syy - n * my * my;
  let ssRes = 0;
  for (let i = 0; i < n; i++) { const e = y[i] - (alpha + beta * x[i]); ssRes += e * e; }
  const r2 = ssTot > 0 ? 1 - ssRes / ssTot : 0;
  return { beta, alpha, alphaAnnualized: alpha * 12, r2, n };
}
