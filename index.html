  const [upperLimits, setUpperLimits] = useState(() => Object.fromEntries(ASSETS.filter(a => a.holdable).map(a => [a.id, 100])));
  const [bulkLimit, setBulkLimit] = useState(40);

  const [selectedPortfolios, setSelectedPortfolios] = useState(["user", "bench_coIQ", "bench_market"]);
  const [goldWeights, setGoldWeights] = useState({ gold_coIQ: 30, gold_momentum: 30 });

  // --- v2: planning horizon derived from MC horizon ---

  // --- v2: per-portfolio 200-SMA timing toggle (daily engine).
  //         The 2x leveraged options default to ON — the 200-SMA "stay out of
  //         the worst" rule is what makes daily-2x viable; without it they
  //         decay through any prolonged bear and the request explicitly asks
  //         to compute them WITH the SMA.
  const [portfolioTiming, setPortfolioTiming] = useState({
    gold_coIQ: false, gold_momentum: false,
  });

  // --- v2: optional "own native history" toggle (per-portfolio full window
  //         instead of common intersection — explicitly NOT COMPARABLE).
  const [ownNativeHistory, setOwnNativeHistory] = useState(false);

  // --- monte carlo ---
  const [mc, setMc] = useState({ paths: 500, horizon: 120, block: 6 });

  // (Cost/spread defaults are now applied via lazy init above — no useEffect needed.)

  // v3: resolve a portfolio definition. For pid === "user", we override the
  // stub PORTFOLIOS entry with a dynamic def built from state.userWeights —
  // non-zero entries become its assets, weights normalize to sum-1, and
  // equityId is the first non-gold asset for fallbacks.
  const userPortfolio = useMemo(() => {
    const w = userWeights || {};
    const assets = Object.keys(w).filter(a => (w[a] || 0) > 0);
    const sum = assets.reduce((s, a) => s + w[a], 0);
    const weights = {};
    assets.forEach(a => { weights[a] = sum > 0 ? w[a] / sum : 0; });
    const equityId = assets.find(a => a !== "gold") || "coIQ";
    return {
      id: "user", name: "My Portfolio",
      assets, weights, equityId,
      isMarket: false, fixedWeights: true, dynamic: true,
    };
  }, [userWeights]);

  // The total of user weights (raw, before normalization) — shown in UI.
  const userWeightTotal = useMemo(() => {
    return Object.values(userWeights || {}).reduce((s, v) => s + (v || 0), 0);
  }, [userWeights]);

  const getPF = useCallback((pid) => {
    if (pid === "user") return userPortfolio;
    return PORTFOLIOS.find(p => p.id === pid);
  }, [userPortfolio]);
  const collectState = useCallback(() => ({
    csvText, series, seriesDaily, spreads, orderFee,
    taxRate, allowance, teilfreistellung, basiszins,
    starting, monthly, rebalance, selectedPortfolios, goldWeights,
    portfolioTiming, ownNativeHistory, mc,
  }), [csvText, series, seriesDaily, spreads, orderFee, taxRate, allowance, teilfreistellung, basiszins, starting, monthly, rebalance, selectedPortfolios, goldWeights, portfolioTiming, ownNativeHistory, mc]);

  const applyState = (s) => {
    if (!s) return;
    // CSV text: merge instead of replace, so a stale "Save" snapshot doesn't
    // wipe out user uploads made after that save. Only fill keys where the
    // saved value is non-empty AND the current state is empty / equal.
    if (s.csvText && typeof s.csvText === "object") {
      setCsvText(prev => {
        const merged = { ...prev };
        for (const k of Object.keys(s.csvText)) {
          const saved = s.csvText[k];
          if (typeof saved === "string" && saved.trim().length > 0) {
            // If current state is empty OR matches saved, take saved.
            // If current state is a different non-empty value (likely a fresh
            // upload), keep current. We compare lengths as a fast proxy.
            if (!prev[k] || prev[k].length === 0) merged[k] = saved;
          }
        }
        return merged;
      });
      // Reparse any field we just updated. Easiest: rerun onCsvChange for
      // each non-empty saved field — it's idempotent.
      for (const k of Object.keys(s.csvText)) {
        const v = s.csvText[k];
        if (typeof v === "string" && v.trim().length > 0) {
          // Defer to next tick so the merged state lands first.
          setTimeout(() => onCsvChange(k, v), 0);
        }
      }
    }
    if (s.series) setSeries(prev => ({ ...prev, ...Object.fromEntries(Object.entries(s.series).filter(([, v]) => v != null && Array.isArray(v) && v.length > 0)) }));
    if (s.seriesDaily) setSeriesDaily(prev => ({ ...prev, ...Object.fromEntries(Object.entries(s.seriesDaily).filter(([, v]) => v != null && Array.isArray(v) && v.length > 0)) }));
    if (s.spreads) setSpreads(s.spreads);
    if (s.orderFee) setOrderFee(s.orderFee);
    if (s.taxRate != null) setTaxRate(s.taxRate);
    if (s.allowance != null) setAllowance(s.allowance);
    if (s.teilfreistellung) setTeilfreistellung(s.teilfreistellung);
    if (s.basiszins) setBasiszins(s.basiszins);
    if (s.starting != null) setStarting(s.starting);
    if (s.monthly != null) setMonthly(s.monthly);
    if (s.rebalance) setRebalance(s.rebalance);
    if (s.selectedPortfolios) {
      // Union with defaults — any newly-added portfolio IDs (new app version)
      // appear automatically even when older saved state didn't know them.
      const known = new Set(PORTFOLIOS.map(p => p.id));
      const restored = s.selectedPortfolios.filter(id => known.has(id));
      const fresh = PORTFOLIOS.map(p => p.id).filter(id => !s.selectedPortfolios.includes(id));
      setSelectedPortfolios([...restored, ...fresh]);
    }
    if (s.goldWeights) {
      // Merge so new portfolios pick up their defaultGold.
      const merged = { ...s.goldWeights };
      for (const pf of PORTFOLIOS) if (!(pf.id in merged) && !pf.isMarket) merged[pf.id] = pf.defaultGold;
      setGoldWeights(merged);
    }
    if (s.portfolioTiming) {
      // Merge so timing defaults from the current app version apply to any
      // portfolio ID the saved state didn't know about.
      const merged = { ...s.portfolioTiming };
      setPortfolioTiming(merged);
    }
    if (s.ownNativeHistory != null) setOwnNativeHistory(s.ownNativeHistory);
    if (s.mc) setMc(s.mc);
  };

  // auto-load on mount (local) and on sign-in (drive)
  useEffect(() => {
    (async () => {
      const s = await storage.load();
      if (s) applyState(s);
    })();
    // eslint-disable-next-line
  }, [storage.signedIn]);

  // Derive Basiszins from ECB rate data whenever ECB series changes.
  // BMF-published values for 2018+ are authoritative overrides.
  useEffect(() => {
    if (!series.ecb || series.ecb.length === 0) return;
    const derived = deriveBasiszinsFromEcb(series.ecb);
    setBasiszins(prev => {
      const merged = { ...derived };
      // Keep BMF-published values for 2018+ as overrides
      for (const [y, v] of Object.entries(DEFAULT_BASISZINS)) merged[y] = v;
      // Keep any manual user overrides already in state
      for (const [y, v] of Object.entries(prev)) {
        if (Number(y) >= 2018) merged[y] = v;
      }
      return merged;
    });
  }, [series.ecb]);

  const handleSave = async () => { await storage.save(collectState()); };

  // ---- CSV handling ----
  const onCsvChange = (id, text) => {
    setCsvText(prev => ({ ...prev, [id]: text }));
    if (!text || !text.trim()) {
      setSeries(prev => ({ ...prev, [id]: null }));
      setSeriesDaily(prev => ({ ...prev, [id]: null }));
      setSeriesError(p => ({ ...p, [id]: null }));
      return;
    }
    try {
      // ECB is a step-function (list of {t,rate}), not a price series — parsed
      // separately. We store the parsed step list in series.ecb (NOT a
      // [{month, value}] series) so the rest of the engine never confuses it
      // with a holdable asset's price.
      if (id === "ecb") {
        const changes = parseEcbRateChanges(text);
        setSeries(prev => ({ ...prev, ecb: changes }));
        setSeriesError(p => ({ ...p, ecb: null }));
        return;
      }
      const monthly = parseCsvToMonthly(text);
      setSeries(prev => ({ ...prev, [id]: monthly }));
      setSeriesError(p => ({ ...p, [id]: null }));
      if (id !== "cpi") {
        try {
          const daily = parseCsvToDaily(text);
          setSeriesDaily(prev => ({ ...prev, [id]: daily }));
        } catch { /* daily parse is best-effort; monthly is authoritative */ }
      }
    } catch (e) {
      setSeries(prev => ({ ...prev, [id]: null }));
      setSeriesDaily(prev => ({ ...prev, [id]: null }));
      setSeriesError(p => ({ ...p, [id]: e.message }));
    }
  };
  const onFileLoad = (id, file) => {
    const r = new FileReader();
    r.onload = (e) => onUserCsvChange(id, e.target.result);
    r.readAsText(file);
  };

  // Per-asset user-uploaded flag. We persist ONLY assets the user explicitly
  // uploaded/pasted/typed (not assets just populated by the same-origin
  // committed-CSV bootstrap).
  const [userUploadedIds, setUserUploadedIds] = useState(() => {
    try {
      const raw = localStorage.getItem("backtester-uploaded-ids.json");
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch { return new Set(); }
  });
  useEffect(() => {
    try { localStorage.setItem("backtester-uploaded-ids.json", JSON.stringify([...userUploadedIds])); } catch {}
  }, [userUploadedIds]);

  // User-initiated CSV change: marks the asset as user-uploaded (persists
  // across reloads). All UI entry points (textarea typing, file upload,
  // Clear button) route through this wrapper.
  const onUserCsvChange = (id, text) => {
    setUserUploadedIds(prev => {
      const next = new Set(prev);
      if (text && text.trim()) next.add(id);
      else next.delete(id);
      return next;
    });
    onCsvChange(id, text);
  };

  // Ref-mirror of userUploadedIds so reloadAsset (called by the bootstrap
  // effect) can read the CURRENT value, not a stale closure capture.
  const userUploadedIdsRef = useRef(userUploadedIds);
  useEffect(() => { userUploadedIdsRef.current = userUploadedIds; }, [userUploadedIds]);

  const reloadAsset = async (asset) => {
    // Skip if the user has uploaded their own CSV for this asset — their
    // version always wins over the committed-CSV bootstrap. Use the ref so
    // we read the live value (not the closure-captured one).
    if (userUploadedIdsRef.current.has(asset.id)) {
      setFetchStatus(s => ({ ...s, [asset.id]: { kind: "info", msg: "user upload preserved" } }));
      return;
    }
    setFetchStatus(s => ({ ...s, [asset.id]: { kind: "info", msg: "loading\u2026" } }));
    try {
      const csv = await loadCommittedCsv(asset);
      onCsvChange(asset.id, csv);
      setFetchStatus(s => ({ ...s, [asset.id]: { kind: "ok", msg: `loaded ./data/${asset.file}` } }));
    } catch (e) {
      const is404 = /HTTP 404|empty/.test(e.message);
      setFetchStatus(s => ({
        ...s,
        [asset.id]: { kind: is404 ? "idle" : "bad", msg: is404 ? "no data yet \u2014 do Setup steps 2\u20135" : `./data/${asset.file}: ${e.message}` }
      }));
    }
  };

  const reloadAll = async () => {
    const m = await loadManifest();
    setManifest(m);
    await Promise.all([...ASSETS, CPI_ASSET].map(a => reloadAsset(a)));
  };

  // bootstrap: same-origin load of committed CSVs + manifest, once on mount.
  // User-uploaded CSVs are restored synchronously via the lazy-init of
  // csvText / series / seriesDaily; reloadAsset will skip any asset that's
  // marked as user-uploaded (via userUploadedIdsRef), so the user's data
  // is never clobbered by the committed bootstrap.
  const bootstrappedRef = useRef(false);
  useEffect(() => {
    if (bootstrappedRef.current) return;
    bootstrappedRef.current = true;
    reloadAll();
    // eslint-disable-next-line
  }, []);

  // Auto-persist user-uploaded CSV text to localStorage so it survives reload.
  // Persists ONLY the assets in userUploadedIds.
  useEffect(() => {
    try {
      const out = {};
      for (const id of userUploadedIds) {
        const t = csvText[id];
        if (typeof t === "string" && t.trim().length > 0) out[id] = t;
      }
      const serialized = JSON.stringify(out);
      if (serialized.length < 4_000_000) {
        localStorage.setItem("backtester-uploaded-csvs.json", serialized);
      }
    } catch {}
  }, [csvText, userUploadedIds]);

  // ---- compute common window for selected portfolios ----
  // ---- per-portfolio monthly series (with optional 200-SMA timing applied
  //      to the risk leg). Gold series is always the raw monthly. -------------
  const pfAssetSeries = useMemo(() => {
    const out = {};
    for (const pid of selectedPortfolios) {
      const pf = getPF(pid);
      if (!pf) continue;
      const map = {};
      const timed = !!portfolioTiming[pid];
      for (const a of pf.assets) {
        // Synthetic asset (e.g. coIQ_t): always built from its sourceAsset's
        // daily series with SMA timing applied. Cash rate is ECB − 0.25 %.
        const meta = ASSETS.find(x => x.id === a);
        if (meta?.synthetic && meta.sourceAsset) {
          const src = meta.sourceAsset;
          const eqDaily = seriesDaily[src];
          // v3.6: each asset is its own SMA signal — no external VT series.
          const sigDaily = eqDaily;
          const sp = spreads[src] || { buy: 0, sell: 0 };
          const taxOpts = {
            rate: taxRate,
            teilfreistellung: teilfreistellung[src] ?? 0,
            taxLikeDebt: DEBT_TAX_IDS.has(src),
          };
          if (eqDaily && sigDaily) {
            const cash = 0;  // fallback; overridden by time-varying ECB DFR when loaded
            const res = buildTimedRiskLegMonthly(eqDaily, sigDaily, cash, sp.buy, sp.sell, orderFee, taxOpts, series.ecb || null);
            if (res && res.series.length >= 12) {
              map[a] = res.series;
              map.__synthetic = { id: a, src, cashRate: 0, res };
              continue;
            }
          }
          // Fallback: use the source's raw monthly series; flag it so the UI
          // can warn that the SMA-timed leg is degraded to buy-and-hold.
          map[a] = series[src];
          map.__syntheticFallback = a;
          continue;
        }
        // v3: per-asset SMA for the user portfolio (userSMA[a]); legacy
        // behaviour for the predefined portfolios (single portfolioTiming flag
        // applied to pf.equityId).
        const shouldTime = pid === "user"
          ? (!!userSMA[a])
          : (a === pf.equityId && timed);
        if (shouldTime) {
          const eqDaily = seriesDaily[a];
          // v3.6: each asset is its own SMA signal.
          const sigDaily = eqDaily;
          const sp = spreads[a] || { buy: 0, sell: 0 };
          const taxOpts = {
            rate: taxRate,
            teilfreistellung: teilfreistellung[a] ?? 0,
            taxLikeDebt: DEBT_TAX_IDS.has(a),
          };
          if (eqDaily && sigDaily) {
            const res = buildTimedRiskLegMonthly(eqDaily, sigDaily, 0, sp.buy, sp.sell, orderFee, taxOpts, series.ecb || null);
            if (res && res.series.length >= 12) { map[a] = res.series; map.__timed = res; continue; }
          }
          // fall back to raw monthly with a flag so UI can flag it
          map[a] = series[a];
          map.__timedFallback = true;
        } else {
          map[a] = series[a];
        }
      }
      out[pid] = map;
    }
    return out;
  }, [selectedPortfolios, portfolioTiming, userSMA, seriesDaily, series, spreads, orderFee, taxRate, teilfreistellung, getPF, series.ecb]);

  // ---- per-portfolio windows (each portfolio's own intersection) ----------
  // If ECB rate data is loaded, constrain the backtest window to start no
  // earlier than the first ECB data point (price data before that is still
  // used for 200-day SMA warmup, but the simulated NAV begins at ECB start).
  const ecbFloorMonth = useMemo(() => {
    if (!series.ecb || series.ecb.length === 0) return null;
    const d = new Date(series.ecb[0].t);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }, [series.ecb]);

  const perPortfolioWindow = useMemo(() => {
    const out = {};
    for (const pid of selectedPortfolios) {
      const pf = getPF(pid);
      if (!pf) continue;
      const map = pfAssetSeries[pid];
      if (!map) { out[pid] = { ok: false }; continue; }
      const arrs = pf.assets.map(a => map[a]);
      if (arrs.some(a => !a || a.length === 0)) {
        out[pid] = { ok: false, missing: pf.assets.filter(a => !map[a]) };
        continue;
      }
      const sets = arrs.map(a => new Set(a.map(r => r.month)));
      let all = [...sets[0]].filter(m => sets.every(s => s.has(m))).sort();
      // Apply ECB floor: no backtest month before ECB data begins
      if (ecbFloorMonth) all = all.filter(m => m >= ecbFloorMonth);
      if (all.length < 12) { out[pid] = { ok: false, tooShort: true, n: all.length }; continue; }
      out[pid] = { ok: true, months: all, start: all[0], end: all[all.length - 1] };
    }
    return out;
  }, [selectedPortfolios, pfAssetSeries, ecbFloorMonth]);

  // ---- common window (intersection across portfolios OR per-portfolio when
  //      ownNativeHistory is ON) -----------------------------------------------
  const commonWindow = useMemo(() => {
    if (selectedPortfolios.length === 0) return null;
    const winList = selectedPortfolios.map(pid => perPortfolioWindow[pid]);
    if (winList.some(w => !w?.ok)) {
      // surface a useful message
      const missing = [];
      for (const pid of selectedPortfolios) {
        const pf = getPF(pid);
        const map = pfAssetSeries[pid] || {};
        for (const a of pf.assets) if (!map[a]) {
          const meta = ASSETS.find(x => x.id === a);
          missing.push(meta?.synthetic ? `${a} (needs ${meta.sourceAsset} daily)` : a);
        }
        if (portfolioTiming[pid] && !seriesDaily[pf.equityId]) missing.push(pf.equityId + " (daily for SMA)");
        if (pf.builtInTiming) {
          for (const a of pf.assets) {
            const meta = ASSETS.find(x => x.id === a);
            if (meta?.synthetic && !seriesDaily[meta.sourceAsset]) missing.push(meta.sourceAsset + " (daily for built-in SMA)");
          }
        }
      }
      const tooShort = winList.find(w => w && !w.ok && w.tooShort);
      if (tooShort) return { ok: false, tooShort: true, n: tooShort.n };
      return { ok: false, missing: [...new Set(missing)] };
    }
    if (ownNativeHistory) {
      const all = new Set();
      winList.forEach(w => w.months.forEach(m => all.add(m)));
      const months = [...all].sort();
      return { ok: true, months, start: months[0], end: months[months.length - 1], perPortfolio: true };
    }
    const sets = winList.map(w => new Set(w.months));
    const all = [...sets[0]].filter(m => sets.every(s => s.has(m))).sort();
    if (all.length < 12) return { ok: false, tooShort: true, n: all.length };
    return { ok: true, months: all, start: all[0], end: all[all.length - 1] };
  }, [selectedPortfolios, perPortfolioWindow, pfAssetSeries, portfolioTiming, seriesDaily, ownNativeHistory]);

  // build per-portfolio trimmed data (uses pfAssetSeries with timing applied)
  const buildPortfolioData = useCallback((pf, months, assetMap) => {
    const d = {};
    const set = new Set(months);
    const map = assetMap || {};
    for (const a of pf.assets) {
      const arr = map[a];
      if (!arr) return null;
      d[a] = arr.filter(r => set.has(r.month));
      if (d[a].length === 0) return null;
    }
    return d;
  }, []);

  // ---- run simulations ----
  const simResults = useMemo(() => {
    if (!commonWindow || !commonWindow.ok) return null;
    const out = {};
    for (const pid of selectedPortfolios) {
      const pf = getPF(pid);
      const months = ownNativeHistory ? perPortfolioWindow[pid]?.months : commonWindow.months;
      if (!months) continue;
      const data = buildPortfolioData(pf, months, pfAssetSeries[pid]);
      if (!data) continue;
      const targetGoldPct = pf.isMarket ? 0 : pid === "user" ? (pf.weights.gold || 0) : (goldWeights[pid] || 0) / 100;
      // For timed risk legs we feed the synthetic monthly series directly; the
      // "gross" ongoing-cost drag is suppressed for that asset because the
      // daily engine already compounds at the underlying daily-price level
      // (and we are not double-charging ETF ongoing cost on cash days).
      const state = {
        portfolio: pf, targetGoldPct, data,
        seriesType, ongoingCost, spreads, orderFee,
        tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
        starting, monthly, rebalance,
        ecbChanges: series.ecb || null,
        // For the user portfolio, pass per-asset rebalance flags. The engine
        // then ignores the legacy `rebalance` string and runs annually only
        // for assets whose flag is true. For predefined portfolios this stays
        // undefined → legacy gold-only behaviour preserved.
        rebalanceFlags: pid === "user" ? userRebalance : undefined,
      };
      out[pid] = runSim(state);
      if (out[pid] && pfAssetSeries[pid]?.__timed) {
        out[pid].timing = { flips: pfAssetSeries[pid].__timed.flips, since: pfAssetSeries[pid].__timed.coveredFromDate };
      }
    }
    return out;
  }, [commonWindow, perPortfolioWindow, pfAssetSeries, selectedPortfolios, goldWeights, spreads, orderFee, taxRate, teilfreistellung, allowance, basiszins, starting, monthly, rebalance, buildPortfolioData, ownNativeHistory, portfolioTiming, userRebalance, series.ecb]);

  // ---- optimal gold sweep per two-asset portfolio (in-sample) ----
  const [sweepResults, setSweepResults] = useState({});
  const [sweepRunning, setSweepRunning] = useState(false);

  // ---- v3: efficient frontier (random Dirichlet sampling on the chosen basket)
  //
  // Performance notes — why this used to hang:
  //   N samples × 30 horizons × 500 MC paths × ~60 months = ~1B path-iterations
  //   for the default 1500 samples, all on the main thread with no yields. The
  //   browser appeared frozen for 30–90 seconds and the spinner never updated.
  //
  // Fix: chunk the work — process ~25 samples per setTimeout slice, update
  // progress state, and surface a Cancel button. Also drop the default sample
  // count to 500 (still plenty for picking winners) and the per-sample MC paths
  // to 200 (h* is robust at that level).
  const [efRunning, setEfRunning] = useState(false);
  const [efProgress, setEfProgress] = useState({ done: 0, total: 0 });
  const efCancelRef = useRef(false);
  const [efSamples, setEfSamples] = useState(500);
  const [efIncludeUserSMA, setEfIncludeUserSMA] = useState(true);
  // v3.5: single 5%-step grid + pure-asset benchmarks (ACWI, coIQ).
  const [efResults, setEfResults] = useState(null);   // {samples, benchmarks, winners, includesUserSMA, basket}

  const cancelEfficientFrontier = () => { efCancelRef.current = true; };

  const runEfficientFrontier = () => {
    if (!commonWindow || !commonWindow.ok || userPortfolio.assets.length < 2) return;
    setEfRunning(true);
    efCancelRef.current = false;
    setEfProgress({ done: 0, total: efSamples + 1 });

    const basket = userPortfolio.assets.slice();
    const months = commonWindow.months;
    const cpiMap = series.cpi ? new Map(series.cpi.map(r => [r.month, r.value])) : null;
    const cpiAligned = cpiMap ? months.map(m => cpiMap.get(m)) : null;
    let cutCPI = months.length;
    if (cpiAligned) { for (let i = 0; i < months.length; i++) if (cpiAligned[i] == null) { cutCPI = i; break; } }

    // v3.3: run BOTH grids in one pass, then dedupe.
    //   (a) "step5"    — every weight vector where each share is a multiple of
    //                    5% and shares sum to 100. Falls back to 10% steps
    // v3.5: ONE grid — every 5%-step composition of n basket assets that
    // sums to 100. Falls back to 10% steps on baskets larger than ~6 assets
    // to keep runtime sane. Doubling grid removed.
    // Two BENCHMARK portfolios (pure ACWI, pure coIQ) are always evaluated
    // separately — they aren't basket-mixes, just reference comparisons.
    // The user's current weights are always sample 0.
    const STEP_PCT = 5;
    const userSample = basket.map(a => userPortfolio.weights[a] || 0);
    const grid = new Map();
    const keyOf = (vec) => vec.map(v => Math.round(v * 10000) / 10000).join("|");
    const push = (vec) => {
      const s = vec.reduce((a, b) => a + b, 0);
      if (s <= 0) return;
      const norm = vec.map(v => v / s);
      const k = keyOf(norm);
      if (!grid.has(k)) grid.set(k, norm);
    };
    push(userSample);

    const n = basket.length;

    // 5%-step grid: integer compositions of 100/STEP_PCT into n parts.
    {
      const STEPS = Math.round(100 / STEP_PCT);
      const buildSteps = (idx, remaining, acc) => {
        if (idx === n - 1) { acc.push(remaining); push(acc.map(v => v * STEP_PCT / 100)); acc.pop(); return; }
        for (let v = 0; v <= remaining; v++) {
          acc.push(v);
          buildSteps(idx + 1, remaining - v, acc);
          acc.pop();
        }
      };
      const combosA = (() => {
        let num = 1, den = 1;
        for (let i = 1; i <= n - 1; i++) { num *= STEPS + i; den *= i; }
        return Math.round(num / den);
      })();
      if (combosA <= 50000) buildSteps(0, STEPS, []);
      else {
        const STEPS_COARSE = 10;
        const STEP_PCT_COARSE = 10;
        const buildStepsCoarse = (idx, remaining, acc) => {
          if (idx === n - 1) { acc.push(remaining); push(acc.map(v => v * STEP_PCT_COARSE / 100)); acc.pop(); return; }
          for (let v = 0; v <= remaining; v++) {
            acc.push(v);
            buildStepsCoarse(idx + 1, remaining - v, acc);
            acc.pop();
          }
        };
        buildStepsCoarse(0, STEPS_COARSE, []);
      }
    }

    // Materialize, with the user sample first.
    const userKey = (() => {
      const s = userSample.reduce((a, b) => a + b, 0);
      return s > 0 ? keyOf(userSample.map(v => v / s)) : null;
    })();
    const samplesWeights = [];
    if (userKey && grid.has(userKey)) { samplesWeights.push(grid.get(userKey)); grid.delete(userKey); }
    else samplesWeights.push(userSample.map(v => v / Math.max(1e-12, userSample.reduce((a, b) => a + b, 0))));
    for (const v of grid.values()) samplesWeights.push(v);
    setEfProgress({ done: 0, total: samplesWeights.length + 2 });

    const liveMap = pfAssetSeries.user || {};
    const seriesMap = {};
    for (const a of basket) seriesMap[a] = efIncludeUserSMA && liveMap[a] ? liveMap[a] : series[a];
    const dataBase = {};
    const monthSet = new Set(months);
    for (const a of basket) {
      const arr = seriesMap[a];
      if (!arr) { setEfRunning(false); return; }
      dataBase[a] = arr.filter(r => monthSet.has(r.month));
      if (dataBase[a].length === 0) { setEfRunning(false); return; }
    }
    const effSeriesType = { ...seriesType };
    for (const a of basket) if (efIncludeUserSMA && userSMA[a]) effSeriesType[a] = "net";

    // Pure-asset benchmark portfolios (independent of basket). Always 100%
    // of the named asset over the common window. They need their own data
    // map because the named asset may not be in basket.
    const benchmarkDef = (assetId, label) => {
      const arr = series[assetId];
      if (!arr) return null;
      const data = { [assetId]: arr.filter(r => monthSet.has(r.month)) };
      if (data[assetId].length === 0) return null;
      return { assetId, label, data };
    };
    const benchmarks = [
      benchmarkDef("coIQ",   "100% coIQ"),
      benchmarkDef("world",  "100% Prime ACWI"),
    ].filter(Boolean);

    const H_MAX_EF = 30;
    const MC_PATHS_EF = 200;   // light MC — enough for picking winners on h*
    const CHUNK = 25;          // samples processed per animation frame
    const results = [];

    const processChunk = (start) => {
      if (efCancelRef.current) {
        setEfResults({ basket, samples: results, winners: computeWinners(results), includesUserSMA: efIncludeUserSMA, cancelled: true });
        setEfRunning(false);
        return;
      }
      const end = Math.min(start + CHUNK, samplesWeights.length);
      for (let idx = start; idx < end; idx++) {
        const wv = samplesWeights[idx];
        // Skip if any asset exceeds its upper limit
        let skip = false;
        for (let ai = 0; ai < basket.length; ai++) {
          const limit = (upperLimits[basket[ai]] ?? 100) / 100;
          if (wv[ai] > limit + 1e-9) { skip = true; break; }
        }
        if (skip) continue;
        const wmap = {};
        basket.forEach((a, i) => { wmap[a] = wv[i]; });
        const dynPf = {
          id: "ef_sample", name: "EF sample", assets: basket, weights: wmap,
          equityId: basket.find(a => a !== "gold") || basket[0], fixedWeights: true, dynamic: true,
        };
        const r = runSim({
          portfolio: dynPf, targetGoldPct: wmap.gold || 0, data: dataBase,
          seriesType: effSeriesType, ongoingCost, spreads, orderFee,
          tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
          starting, monthly, rebalance, rebalanceFlags: userRebalance,
          ecbChanges: series.ecb || null,
        });
        if (!r || !r.metrics) continue;
        const avgCAGR = avgYearlyCAGR(r.unitPriceSeries);
        let irrScore = integratedRiskReturn(r.unitPriceSeries, r.ddSeries, r.finalValue / r.totalInvested, r.months, series.cpi, series.ecb);
        // Quick historical h* for Pareto analysis: find smallest horizon where
        // ALL rolling windows have non-negative real return. O(H×n) per sample.
        let sampleHStar = null;
        if (series.cpi) {
          const ups = r.unitPriceSeries;
          const mths = r.months;
          const cpMap = new Map(series.cpi.map(x => [x.month, x.value]));
          for (let hy = 1; hy * 12 < ups.length; hy++) {
            const hm = hy * 12;
            let allOk = true;
            for (let j = 0; j + hm < ups.length; j++) {
              const cpiA = cpMap.get(mths[j]), cpiB = cpMap.get(mths[j + hm]);
              if (cpiA && cpiB && cpiA > 0) {
                if ((ups[j + hm] / ups[j]) / (cpiB / cpiA) < 1) { allOk = false; break; }
              }
            }
            if (allOk) { sampleHStar = hy; break; }
          }
        }
        results.push({
          weights: wv,
          sortino: r.metrics.sortino,
          upi: r.metrics.upi,
          maxDD: r.metrics.maxDD,
          finalRatio: r.finalValue / r.totalInvested,
          finalValue: r.finalValue,
          avgCAGR,
          irrScore,
          histHStar: sampleHStar, // historical h* for Pareto knee
          hStar: null, // MC h* computed post-grid for winners
        });
      }
      setEfProgress({ done: end, total: samplesWeights.length + benchmarks.length });
      if (end < samplesWeights.length) {
        setTimeout(() => processChunk(end), 0);
      } else {
        // After the grid: run pure-asset benchmarks (independent portfolios).
        const benchResults = [];
        for (const bm of benchmarks) {
          const benchPf = {
            id: "ef_bench_" + bm.assetId, name: bm.label, assets: [bm.assetId],
            weights: { [bm.assetId]: 1 }, equityId: bm.assetId,
            isMarket: true, fixedWeights: true, dynamic: true,
          };
          const r = runSim({
            portfolio: benchPf, targetGoldPct: 0, data: bm.data,
            seriesType: { ...seriesType, [bm.assetId]: "net" },
            ongoingCost, spreads, orderFee,
            tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
            starting, monthly, rebalance,
            ecbChanges: series.ecb || null,
          });
          if (!r || !r.metrics) continue;
          benchResults.push({
            label: bm.label, assetId: bm.assetId,
            sortino: r.metrics.sortino, upi: r.metrics.upi, maxDD: r.metrics.maxDD,
            finalRatio: r.finalValue / r.totalInvested,
            finalValue: r.finalValue,
            avgCAGR: avgYearlyCAGR(r.unitPriceSeries),
            irrScore: integratedRiskReturn(r.unitPriceSeries, r.ddSeries, r.finalValue / r.totalInvested, r.months, series.cpi, series.ecb),
            hStar: null, _unitPrice: r.unitPriceSeries,
          });
        }
        setEfProgress({ done: samplesWeights.length + benchResults.length, total: samplesWeights.length + benchmarks.length });
        const winners = computeWinners(results);

        // Compute h* only for the table rows: winners + user + benchmarks
        // Also store the combined winner's full simulation for the chart.
        let winnerSim = null;
        const computeHStarForRow = (row, isWinner) => {
          if (!row) return;
          const wv = row.weights;
          const wmap = {}; basket.forEach((a, i) => { wmap[a] = wv[i]; });
          const dynPf = { id: "ef_h", name: "h*", assets: basket, weights: wmap, equityId: basket.find(a => a !== "gold") || basket[0], fixedWeights: true, dynamic: true };
          const r = runSim({ portfolio: dynPf, targetGoldPct: wmap.gold || 0, data: dataBase, seriesType: effSeriesType, ongoingCost, spreads, orderFee, tax: { rate: taxRate, teilfreistellung, allowance, basiszins }, starting, monthly, rebalance, rebalanceFlags: userRebalance, ecbChanges: series.ecb || null });
          if (!r) return;
          if (isWinner) winnerSim = { unitPriceSeries: r.unitPriceSeries, months: r.months };
          if (!cpiAligned || cutCPI < 13) return;
          const upTrunc = r.unitPriceSeries.slice(0, cutCPI);
          const cpiTrunc = cpiAligned.slice(0, cutCPI);
          const paired = buildPairedReturns(upTrunc, cpiTrunc);
          const curve = [];
          for (let h = 1; h <= H_MAX_EF; h++) { const mcPt = rollingRealReturnsMC(paired, h, MC_PATHS_EF, mc.block, 77777 + h); curve.push(mcPt ? mcPt.worstRealCAGR : null); }
          for (let i = 0; i < curve.length; i++) { let ok = true; for (let j = i; j < curve.length; j++) { if (curve[j] == null || curve[j] < 0) { ok = false; break; } } if (ok) { row.hStar = i + 1; break; } }
        };
        const allWinnerRows = [winners.riskOptimal, winners.combined, winners.gainAvg, winners.sortino, winners.upiPure, winners.avgPure, winners.finalReturn, winners.user].filter(Boolean);
        const seen = new Set();
        const keyOf = (row) => row.weights.map(w => w.toFixed(4)).join(",");
        for (const row of allWinnerRows) {
          const k = keyOf(row);
          const isWinner = row === winners.combined;
          if (seen.has(k)) {
            const donor = allWinnerRows.find(r => r && keyOf(r) === k && r.hStar != null);
            if (donor) row.hStar = donor.hStar;
            if (isWinner && !winnerSim) computeHStarForRow(row, true); // still need the sim for chart
            continue;
          }
          seen.add(k);
          computeHStarForRow(row, isWinner);
        }
        // h* for benchmarks (use stored unitPriceSeries)
        for (const bm of benchResults) {
          if (!bm._unitPrice || !cpiAligned || cutCPI < 13) continue;
          const upTrunc = bm._unitPrice.slice(0, cutCPI);
          const cpiTrunc = cpiAligned.slice(0, cutCPI);
          const paired = buildPairedReturns(upTrunc, cpiTrunc);
          const curve = [];
          for (let h = 1; h <= H_MAX_EF; h++) { const mcPt = rollingRealReturnsMC(paired, h, MC_PATHS_EF, mc.block, 999 + bm.assetId.length + h); curve.push(mcPt ? mcPt.worstRealCAGR : null); }
          for (let i = 0; i < curve.length; i++) { let ok = true; for (let j = i; j < curve.length; j++) { if (curve[j] == null || curve[j] < 0) { ok = false; break; } } if (ok) { bm.hStar = i + 1; break; } }
          delete bm._unitPrice; // free memory
        }

        setEfResults({ basket, samples: results, benchmarks: benchResults, winners, winnerSim, includesUserSMA: efIncludeUserSMA });
        setEfRunning(false);
      }
    };

    const computeWinners = (rs) => {
      if (rs.length === 0) return { sortino: null, upiPure: null, avgPure: null, combined: null, riskOptimal: null, gainAvg: null, finalReturn: null, hStar: null, user: null };
      let bs = rs[0], bup = rs[0], bap = rs[0], bc = rs[0], bga = rs[0], br = rs[0], bh = null;
      let bcScore = -Infinity, bgaScore = -Infinity;
      for (const r of rs) {
        if ((r.sortino ?? -Infinity) > (bs.sortino ?? -Infinity)) bs = r;
        if ((r.upi ?? -Infinity) > (bup.upi ?? -Infinity)) bup = r;
        if ((r.avgCAGR ?? -Infinity) > (bap.avgCAGR ?? -Infinity)) bap = r;
        // Combined: net real return over real cash — permutation median
        const cs = r.irrScore ?? -Infinity;
        if (cs > bcScore) { bc = r; bcScore = cs; }
        // gain × avgCAGR
        const ga = Math.max(0, r.finalRatio - 1) * Math.max(0, r.avgCAGR ?? 0);
        if (ga > bgaScore) { bga = r; bgaScore = ga; }
        if (r.finalRatio > br.finalRatio) br = r;
        if (r.hStar != null && (bh == null || r.hStar < bh.hStar)) bh = r;
      }
      // Pareto knee: among samples with valid histHStar and positive irrScore,
      // find the point with max perpendicular distance from the frontier diagonal.
      // Lower h* = better risk, higher score = better return.
      let riskOpt = null;
      const candidates = rs.filter(r => r.histHStar != null && r.irrScore != null && r.irrScore > 0);
      if (candidates.length >= 2) {
        // Normalize h* and score to [0,1]
        const minH = Math.min(...candidates.map(c => c.histHStar));
        const maxH = Math.max(...candidates.map(c => c.histHStar));
        const minS = Math.min(...candidates.map(c => c.irrScore));
        const maxS = Math.max(...candidates.map(c => c.irrScore));
        const rangeH = maxH - minH || 1;
        const rangeS = maxS - minS || 1;
        // Line from worst (maxH, minS) to best (minH, maxS) in normalized space
        // Point A = (1, 0) [worst risk, worst return], B = (0, 1) [best risk, best return]
        // Distance from point P = (hNorm, sNorm) to line AB:
        // AB direction = (-1, 1), normal = (1, 1)/√2
        // dist = |(hNorm + sNorm - 1)| / √2 — but we want the point ABOVE the line
        // so dist = (sNorm - hNorm - (1-1)) ... let me use the standard formula
        // Line: from A(1,0) to B(0,1) → equation: x + y = 1
        // Signed distance = (hNorm + sNorm - 1) / √2  (positive = above line = good)
        let bestDist = -Infinity;
        for (const c of candidates) {
          const hNorm = (c.histHStar - minH) / rangeH; // 0 = best (lowest h*), 1 = worst
          const sNorm = (c.irrScore - minS) / rangeS;   // 0 = worst, 1 = best
          const dist = (sNorm - hNorm); // maximize: high score, low h*
          if (dist > bestDist) { riskOpt = c; bestDist = dist; }
        }
      } else if (candidates.length === 1) {
        riskOpt = candidates[0];
      }
      return { sortino: bs, upiPure: bup, avgPure: bap, combined: bc, riskOptimal: riskOpt, gainAvg: bga, finalReturn: br, hStar: bh, user: rs[0] };
    };

    setTimeout(() => processChunk(0), 30);
  };


  const runSweep = () => {
    if (!commonWindow || !commonWindow.ok) return;
    setSweepRunning(true);
    setTimeout(() => {
      const cpiMap = series.cpi ? new Map(series.cpi.map(r => [r.month, r.value])) : null;
      const mcPaths = Math.min(500, mc.paths);   // keep sweep tolerable

      const out = {};
      for (const pid of selectedPortfolios) {
        const pf = getPF(pid);
        if (pf.isMarket) continue;
        if (pf.dynamic) continue;   // user portfolio has no single gold weight
        const pfMonths = ownNativeHistory ? perPortfolioWindow[pid]?.months : commonWindow.months;
        if (!pfMonths) continue;
        const cpiAligned = cpiMap ? pfMonths.map(m => cpiMap.get(m)) : null;
        const cpiOk = !!cpiMap && cpiAligned && cpiAligned.some(v => v != null);
        const data = buildPortfolioData(pf, pfMonths, pfAssetSeries[pid]);
        if (!data) continue;
        let best = { w: pf.defaultGold, sortino: -Infinity };
        const samples = [];
        for (let pct = 0; pct <= 100; pct += 1) {
          const effectiveType = { ...seriesType };
          if (portfolioTiming[pid]) effectiveType[pf.equityId] = "net";
          const state = {
            portfolio: pf, targetGoldPct: pct / 100, data, seriesType: effectiveType, ongoingCost, spreads, orderFee,
            tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
            starting, monthly, rebalance,
            ecbChanges: series.ecb || null,
          };
          const r = runSim(state);
          if (!r || !r.metrics) continue;
          const s = r.metrics.sortino;
          if (s != null && s > best.sortino) best = { w: pct, sortino: s };

          let realCurve = null;
          if (cpiOk) {
            // Same truncation as in realResults: drop tail months without CPI.
            let cut = pfMonths.length;
            for (let i = 0; i < pfMonths.length; i++) {
              if (cpiAligned[i] == null) { cut = i; break; }
            }
            if (cut >= 13) {
              const upTrunc = r.unitPriceSeries.slice(0, cut);
              const cpiTrunc = cpiAligned.slice(0, cut);
              const paired = buildPairedReturns(upTrunc, cpiTrunc);
              realCurve = [];
              for (let h = 1; h <= H_MAX; h++) {
                const mcPt = rollingRealReturnsMC(paired, h, mcPaths, mc.block, 91 + pid.length * 31 + pct * 7 + h);
                if (mcPt) realCurve.push({ h, kind: "mc", worstRealCAGR: mcPt.worstRealCAGR });
                else realCurve.push({ h, kind: "none", worstRealCAGR: null });
              }
            }
          }
          samples.push({ w: pct, sortino: s, upi: r.metrics.upi, finalValue: r.finalValue, maxDD: r.metrics.maxDD, realCurve });
        }

        // w_safe(h), w_return(h)
        const perH = {};
        if (cpiOk) {
          for (let h = 1; h <= H_MAX; h++) {
            let bestW = null, bestVal = -Infinity;
            let returnW = null, returnVal = null;
            for (const sample of samples) {
              if (!sample.realCurve) continue;
              const pt = sample.realCurve.find(x => x.h === h);
              if (!pt || pt.worstRealCAGR == null) continue;
              if (pt.worstRealCAGR > bestVal) { bestVal = pt.worstRealCAGR; bestW = sample.w; }
              if (pt.worstRealCAGR >= 0 && returnW == null) { returnW = sample.w; returnVal = pt.worstRealCAGR; }
            }
            perH[h] = {
              w_safe: bestW != null ? { w: bestW, worst: bestVal } : null,
              w_return: returnW != null ? { w: returnW, worst: returnVal } : null,
              kind: "mc",
            };
          }
        }
        out[pid] = { ...best, samples, perH, cpiOk };
      }
      setSweepResults(out);
      setSweepRunning(false);
    }, 30);
  };

  const H_MAX = 30;

  // ---- drawdown-period correlation matrix (selected assets) ----
  // Computes pairwise Pearson correlations of monthly returns, filtered to
  // months where the equal-weight basket is below its running peak (the months
  // that drive UPI). Shows how much diversification you actually get in pain.
  const ddCorrelation = useMemo(() => {
    const basket = userPortfolio?.assets?.filter(a => !ASSETS.find(x => x.id === a)?.synthetic);
    if (!basket || basket.length < 2) return null;
    // Build monthly return arrays per asset, aligned to common months
    const maps = {};
    for (const a of basket) {
      const src = ASSETS.find(x => x.id === a)?.sourceAsset || a;
      const s = series[src];
      if (!s || s.length < 6) return null;
      const m = new Map();
      for (let i = 1; i < s.length; i++) {
        if (monthsBetween(s[i - 1].month, s[i].month) === 1) {
          m.set(s[i].month, s[i].value / s[i - 1].value - 1);
        }
      }
      maps[a] = m;
    }
    // Find common months
    const allMonths = [...maps[basket[0]].keys()].filter(m => basket.every(a => maps[a].has(m))).sort();
    if (allMonths.length < 12) return null;
    // Build equal-weight index to identify drawdown months
    let eqPeak = 1, eqLevel = 1;
    const isDDMonth = [];
    let ddCount = 0;
    for (const m of allMonths) {
      const avgRet = basket.reduce((s, a) => s + maps[a].get(m), 0) / basket.length;
      eqLevel *= (1 + avgRet);
      eqPeak = Math.max(eqPeak, eqLevel);
      const inDD = eqLevel < eqPeak * 0.999; // 0.1% threshold to avoid noise
      isDDMonth.push(inDD);
      if (inDD) ddCount++;
    }
    if (ddCount < 6) return null;
    // Extract returns for drawdown months only
    const ddReturns = {};
    for (const a of basket) {
      ddReturns[a] = allMonths.filter((_, i) => isDDMonth[i]).map(m => maps[a].get(m));
    }
    // Pairwise Pearson correlation
    const pearson = (x, y) => {
      const n = x.length;
      let sx = 0, sy = 0, sxy = 0, sxx = 0, syy = 0;
      for (let i = 0; i < n; i++) { sx += x[i]; sy += y[i]; sxy += x[i] * y[i]; sxx += x[i] * x[i]; syy += y[i] * y[i]; }
      const num = n * sxy - sx * sy;
      const den = Math.sqrt((n * sxx - sx * sx) * (n * syy - sy * sy));
      return den > 0 ? num / den : 0;
    };
    const matrix = {};
    for (const a of basket) {
      matrix[a] = {};
      for (const b of basket) {
        matrix[a][b] = a === b ? 1.0 : pearson(ddReturns[a], ddReturns[b]);
      }
    }
    const shortName = (id) => ASSETS.find(x => x.id === id)?.shortName || id;
    return { basket, matrix, shortName, ddMonths: ddCount, totalMonths: allMonths.length };
  }, [series, userPortfolio]);

  // Fill unallocated weight with assets that minimize total portfolio drawdown correlation.
  // Called on button click — takes current weights as fixed, distributes the remainder.
  const fillMinCorrelation = () => {
    const holdable = ASSETS.filter(a => a.holdable && series[a.id] && series[a.id].length >= 12);
    if (holdable.length < 2) return;
    const ids = holdable.map(a => a.id);
    const currentTotal = Object.values(userWeights).reduce((s, v) => s + (v || 0), 0);
    const remaining = 100 - currentTotal;
    if (remaining < 5) return; // nothing to fill
    // Build monthly returns + drawdown correlation matrix
    const maps = {};
    for (const a of ids) {
      const s = series[a]; const m = new Map();
      for (let i = 1; i < s.length; i++) { if (monthsBetween(s[i - 1].month, s[i].month) === 1) m.set(s[i].month, s[i].value / s[i - 1].value - 1); }
      maps[a] = m;
    }
    const allMonths = [...maps[ids[0]].keys()].filter(m => ids.every(a => maps[a].has(m))).sort();
    if (allMonths.length < 12) return;
    let eqPeak = 1, eqLevel = 1; const isDDMonth = []; let ddCount = 0;
    for (const m of allMonths) { const avgRet = ids.reduce((s, a) => s + maps[a].get(m), 0) / ids.length; eqLevel *= (1 + avgRet); eqPeak = Math.max(eqPeak, eqLevel); isDDMonth.push(eqLevel < eqPeak * 0.999); if (eqLevel < eqPeak * 0.999) ddCount++; }
    if (ddCount < 6) return;
    const ddReturns = {}; for (const a of ids) ddReturns[a] = allMonths.filter((_, i) => isDDMonth[i]).map(m => maps[a].get(m));
    const pearson = (x, y) => { const n = x.length; let sx=0,sy=0,sxy=0,sxx=0,syy=0; for (let i=0;i<n;i++){sx+=x[i];sy+=y[i];sxy+=x[i]*y[i];sxx+=x[i]*x[i];syy+=y[i]*y[i];} const num=n*sxy-sx*sy,den=Math.sqrt((n*sxx-sx*sx)*(n*syy-sy*sy)); return den>0?num/den:0; };
    const corr = {}; for (const a of ids) { corr[a] = {}; for (const b of ids) corr[a][b] = a === b ? 1 : pearson(ddReturns[a], ddReturns[b]); }
    // Grid search: fix current weights, distribute remaining in 5% steps
    const n = ids.length;
    const STEP = 5;
    const baseSteps = ids.map(a => Math.round((userWeights[a] || 0) / STEP));
    const remSteps = Math.round(remaining / STEP);
    let bestScore = Infinity, bestAdd = null;
    const search = (idx, rem, acc) => {
      if (idx === n - 1) {
        acc[idx] = rem;
        const total = baseSteps.map((b, i) => b + acc[i]);
        const totalPct = total.reduce((s, v) => s + v, 0);
        if (totalPct === 0) { acc[idx] = 0; return; }
        let score = 0;
        for (let i = 0; i < n; i++) { if (total[i] === 0) continue; for (let j = i + 1; j < n; j++) { if (total[j] === 0) continue; score += (total[i] / totalPct) * (total[j] / totalPct) * corr[ids[i]][ids[j]]; } }
        if (score < bestScore) { bestScore = score; bestAdd = acc.slice(); }
        acc[idx] = 0; return;
      }
      for (let v = 0; v <= rem; v++) { acc[idx] = v; search(idx + 1, rem - v, acc); }
      acc[idx] = 0;
    };
    search(0, remSteps, new Array(n).fill(0));
    if (!bestAdd) return;
    const newWeights = { ...userWeights };
    for (let i = 0; i < n; i++) {
      const add = bestAdd[i] * STEP;
      if (add > 0) newWeights[ids[i]] = (newWeights[ids[i]] || 0) + add;
    }
    setUserWeights(newWeights);
  };

  useEffect(() => { try { localStorage.setItem("bt:arivaBoerse", arivaBoerse); } catch {} }, [arivaBoerse]);

  useEffect(() => { try { localStorage.setItem("bt:arivaGoldSecu", arivaGoldSecu); } catch {} }, [arivaGoldSecu]);
  useEffect(() => { try { localStorage.setItem("bt:arivaGoldBoerse", arivaGoldBoerse); } catch {} }, [arivaGoldBoerse]);

  // Accept either `user/repo` or a full https://github.com/user/repo URL.
  const parsedRepo = useMemo(() => {
    const s = (repoSlug || "").trim();
    if (!s) return null;
    let m = s.match(/^https?:\/\/github\.com\/([\w.-]+)\/([\w.-]+?)(?:\.git)?\/?$/i);
    if (m) return `${m[1]}/${m[2]}`;

    const blob = await zip.generateAsync({ type: "blob" });

    const a = document.createElement("a");

    document.body.appendChild(a); a.click(); a.remove();

    setZipStatus(failed.length ? `done · ${failed.length} files missing` : "done");

                          </tbody>
                        </table>
                        <div className="footnote" style={{ marginTop: 6, fontSize: 10.5 }}>
                          {efResults.samples.length} weight vectors on basket: {efResults.basket.map(a => ASSETS.find(x => x.id === a)?.shortName || a).join(" \u00b7 ")}.
                          {efResults.includesUserSMA ? " SMA toggles applied." : " SMA off — all legs buy-and-hold."}
                        </div>
                      </div>
                    </>
                  );
                })()}
              </div>
            </div>

          </>
        )}
      </div>

      {/* footnotes */}
      <div className="panel" style={{ marginTop: 26 }}>
        <div className="panel-h"><h2>Definitions · Assumptions · Caveats</h2></div>
        <div className="panel-body footnote">
          <p><strong>Unit price</strong> — the contribution-neutral NAV per unit. Contributions and matured-gold rebalances issue/redeem units at NAV without moving price. Ongoing-cost drag, Vorabpauschale tax, and SMA flip costs do move price. All risk metrics (Sortino, UPI, max DD) are computed on this series.</p>
          <p><strong>Sortino ratio</strong> — <code>(mean monthly return ÷ downside deviation) × √12</code>. MAR = 0. Downside deviation uses all months as denominator (Sortino's original definition), not just negative-month count.</p>
          <p><strong>Ulcer Performance Index (UPI)</strong> — <code>(annualized return − risk-free) ÷ Ulcer Index</code> (Martin &amp; McCann, 1989). Ulcer Index = <code>√(mean(dd²))</code> where dd is each month's fractional drawdown from peak. Penalizes both drawdown depth and duration — a shallow but prolonged underwater period scores worse than a sharp drop with fast recovery. Risk-free rate = average ECB DFR (floored at 0%) over the backtest window.</p>
          <p><strong>Maximum drawdown</strong> — largest peak-to-trough decline of the unit-price series. <strong>Months &lt;−30%</strong> counts months where the running drawdown from peak exceeds −30%.</p>
          <p><strong>Money-weighted return</strong> — final EUR value ÷ total EUR invested. This is what a brokerage account shows; the unit-price series is the comparable risk surface.</p>
          <hr style={{ margin: "12px 0" }} />
          <p><strong>ECB Deposit Facility Rate</strong> — loaded as a changes-only CSV. The rate in effect at each date drives two things: (1) SMA cash-period returns (floored at 0%), (2) Vorabpauschale Basiszins for pre-2018 years (ECB rate at Jan 1 as proxy). If the CSV header contains "lending" (marginal lending facility), rates are auto-converted to estimated DFR by subtracting 0.75 pp. The backtest window cannot begin before the first ECB data point.</p>
          <p><strong>Vorabpauschale</strong> — for each calendar year with non-zero Basiszins: <code>Basisertrag = startValue × Basiszins × 0.70</code>; <code>VP = max(0, min(Basisertrag, gain))</code>; intra-year lots prorated by months held; <code>taxable = VP × (1 − Teilfreistellung)</code>. Tax is deducted in January of the following year. Basiszins 2018+ = BMF-published values; earlier years = ECB DFR at Jan 1 (proxy).</p>
          <p><strong>Gold &amp; silver tax (§23 EStG)</strong> — EUWAX Gold II and iShares Physical Silver are Inhaberschuldverschreibungen: no Vorabpauschale, no Teilfreistellung. Tax-free after 12-month Spekulationsfrist. Each buy creates a FIFO lot; rebalancing sells only matured lots. If matured gold &lt; rebalance target, the portfolio stays overweight gold (one-way constraint). The month-0 starting lot is backdated as already matured.</p>
          <p><strong>Equity rebalancing</strong> — equity positions are never sold (CGT liability). Rebalancing toward equity is done by selling matured gold or directing new contributions. Rebalancing toward gold is via contributions only. This one-way constraint mirrors real German CGT friction.</p>
          <p><strong>200-SMA daily timing</strong> — when toggled ON: if close(d−1) &gt; SMA200(d−1), hold equity on day d; else park in cash earning the time-varying ECB DFR (floored at 0%). Each flip incurs spread + order fees. Each risk→cash flip charges approximate CGT: <code>{taxRate.toFixed(2)}% × (1 − TF)</code> on the running gain. This is approximate — no FIFO lots, no Pauschbetrag, no VP credit — and overstates tax by a few %. Gold is never timed. Daily series is resampled to month-end for all metrics.</p>
          <p><strong>Costs</strong> — all price series are net (fund costs already embedded in CSV prices). Buy/sell spreads and per-order fees apply to every transaction including month-0 purchases.</p>
          <hr style={{ margin: "12px 0" }} />
          <p><strong>Backtest window</strong> — intersection of available monthly data across all assets in all selected portfolios, floored at the first ECB data point. Price data before the window start is used for 200-day SMA warmup but not for NAV simulation.</p>
          <p><strong>Real-preservation (h*)</strong> — a portfolio is "real-admissible at horizon h" if its worst rolling h-year real CAGR ≥ 0. Real returns = nominal portfolio growth ÷ CPI growth per window. CPI series: <em>{(manifest?.assets?.cpi?.source) || "manual upload"}</em>{series.cpi ? <> · last point <code>{series.cpi[series.cpi.length - 1].month}</code></> : null}. h* = smallest h where all windows from h onward stay real-positive. Beyond available history, curves are extended via Monte Carlo paired bootstrap (portfolio return + CPI jointly resampled).</p>
          <p><strong>Efficient frontier</strong> — exhaustive 5%-step grid (10% for &gt;6 assets) over the weight simplex. Each vector runs the full engine. Winners: largest Sortino, largest UPI, shortest h*, largest absolute return. "Add h*" computes h* incrementally on stored weights without rerunning the grid.</p>
          <p><strong>Not modelled</strong> — slippage beyond configured spreads; withholding-tax leakage beyond Teilfreistellung; broker order minima; FX risk (all series EUR-denominated); fund-level taxation under pre-2018 InvStG regime.</p>
        </div>
      </div>

      <div style={{ marginTop: 28, fontSize: 11, color: "var(--ink-mute)", textAlign: "center" }}>
        Single-file React. Hostable on GitHub Pages. {GOOGLE_CLIENT_ID ? "Drive sync enabled." : "Set GOOGLE_CLIENT_ID at the top of the file to enable Drive sync."}
      </div>
    </div>
  );
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function StatusPill({ status }) {
  const kind = status.kind === "ok" ? "ok" : status.kind === "bad" ? "bad" : status.kind === "warn" ? "warn" : status.kind === "info" ? "info" : "idle";
  return <span className={"tag " + kind} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
    {status.kind === "info" && <span className="spin"></span>}
    {status.msg}
  </span>;
}

function NumField({ label, value, onChange, step = 1 }) {
  return (
    <label className="field">
      <span className="lbl">{label}</span>
      <input type="number" step={step} value={value ?? 0} onChange={e => onChange(+e.target.value)} />
    </label>
  );
}

function Empty({ msg, kind }) {
  return <div className="panel" style={{ padding: 24, textAlign: "center", color: "var(--ink-soft)" }}>
    <span className={"tag " + (kind || "idle")} style={{ marginRight: 8 }}>info</span>{msg}
  </div>;
}

function CsvCard({ asset, text, data, error, fetchStatus, manifestEntry, onReload, onText, onFile }) {
  const fileRef = useRef(null);
  const n = data?.length || 0;
  const isEcb = n > 0 && data[0].t != null && data[0].rate != null;
  const fmtDate = (t) => { const d = new Date(t); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const range = n > 0
    ? isEcb ? `${fmtDate(data[0].t)} → ${fmtDate(data[n - 1].t)}` : `${data[0].month} → ${data[n - 1].month}`
    : "";
  const lastVal = n > 0 ? (isEcb ? data[n - 1].rate : data[n - 1].value) : null;
  const lastLabel = isEcb ? "last rate" : "last value";
  const fs = fetchStatus;
  const busy = fs?.kind === "info";
  return (
    <div className={"csv-card" + (n > 0 ? " loaded" : "")}>
      <div>
        <h3>{asset.label}</h3>
        <div className="id">{asset.isin}</div>
      </div>
      <div className="ctrl">
        <button className="btn btn-xs" onClick={() => fileRef.current?.click()}>Upload CSV…</button>
        {asset.sourceUrl && <a href={asset.sourceUrl} target="_blank" rel="noopener noreferrer" className="btn btn-xs btn-ghost" style={{ textDecoration: "none" }}>Source ↗</a>}
        <input ref={fileRef} type="file" accept=".csv,text/csv" style={{ display: "none" }}
               onChange={e => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value = ""; }} />
        <button className="btn btn-xs btn-ghost" onClick={() => onText("")}>Clear</button>
        {n > 0 && <span className="tag ok">{isEcb ? n + " changes" : n + " months"}</span>}
        {!n && !error && <span className="tag idle">no data</span>}
        {error && <span className="tag bad">parse error</span>}
        {manifestEntry && <span className="tag info mono">as of {manifestEntry.lastDate}</span>}
        {fs && fs.kind !== "ok" && <span className={"tag " + (fs.kind === "bad" ? "bad" : "idle")}>{fs.msg}</span>}
      </div>
      {n > 0 && <div className="meta">{range} · {lastLabel} {fmtNum(lastVal, isEcb ? 2 : 4)}{isEcb ? "%" : ""}</div>}
      {error && <div className="meta" style={{ color: "var(--neg)" }}>{error}</div>}
      {manifestEntry?.warnings?.length > 0 && (
        <div className="meta" style={{ color: "oklch(0.4 0.13 60)" }}>⚠ {manifestEntry.warnings.join(" · ")}</div>
      )}
    </div>
  );
}

function ManifestPill({ manifest }) {
  if (!manifest) return <span className="tag idle">no manifest</span>;
  const fetched = manifest.fetchedAt ? new Date(manifest.fetchedAt) : null;
  const ageDays = fetched ? Math.floor((Date.now() - fetched.getTime()) / 86400000) : null;
  const stale = ageDays != null && ageDays > 14;
  return <span className={"tag " + (stale ? "warn" : "info") + " mono"}>
    {fetched ? `fetched ${fetched.toISOString().slice(0, 10)}` : "fetched ?"} {stale && "· STALE"}
  </span>;
}

function SweepRow({ pid, chosen, sweep }) {
  const pf = PORTFOLIOS.find(p => p.id === pid);
  return (
    <div style={{ padding: "10px 0", borderTop: "1px solid var(--line)" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
        <strong style={{ fontSize: 12.5 }}>{pf.name}</strong>
        <span className="dim mono" style={{ fontSize: 11 }}>your weight {chosen}%</span>
        <span style={{ flex: 1 }}></span>
        {sweep
          ? <span className="tag info mono">optimal {sweep.w}% · Sortino {fmtNum(sweep.sortino, 3)}</span>
          : <span className="tag idle">not run</span>}
      </div>
      {sweep && <SweepBar chosen={chosen} optimal={sweep.w} samples={sweep.samples} />}
    </div>
  );
}

function SweepBar({ chosen, optimal, samples }) {
  // mini bar showing Sortino across 0..100% gold
  const max = Math.max(...samples.map(s => s.sortino || -Infinity));
  const min = Math.min(...samples.map(s => s.sortino || Infinity));
  const range = (max - min) || 1;
  return (
    <div style={{ marginTop: 8, position: "relative", height: 38 }}>
      <svg width="100%" height="38" preserveAspectRatio="none" viewBox="0 0 100 38">
        {samples.map((s, i) => {
          const h = ((s.sortino - min) / range) * 30 + 2;
          const fill = s.w === optimal ? "var(--accent)" : s.w === chosen ? "var(--ink)" : "var(--line-strong)";
          return <rect key={i} x={s.w} y={36 - h} width={0.85} height={h} fill={fill} />;
        })}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--ink-mute)", fontFamily: "JetBrains Mono, monospace", marginTop: 2 }}>
        <span>0% gold</span><span>50%</span><span>100% gold</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
