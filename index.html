    const r = new FileReader();
    r.onload = (e) => onUserCsvChange(id, e.target.result);
    r.readAsText(file);
  };

  // Per-asset user-uploaded flag. We persist ONLY assets the user explicitly
  // uploaded/pasted/typed (not assets just populated by the same-origin
  // committed-CSV bootstrap).
  const [userUploadedIds, setUserUploadedIds] = useState(() => {
    try {
      const raw = localStorage.getItem("backtester-uploaded-ids.json");
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch { return new Set(); }
  });
  useEffect(() => {
    try { localStorage.setItem("backtester-uploaded-ids.json", JSON.stringify([...userUploadedIds])); } catch {}
  }, [userUploadedIds]);

  // User-initiated CSV change: marks the asset as user-uploaded (persists
  // across reloads). All UI entry points (textarea typing, file upload,
  // Clear button) route through this wrapper.
  const onUserCsvChange = (id, text) => {
    setUserUploadedIds(prev => {
      const next = new Set(prev);
      if (text && text.trim()) next.add(id);
      else next.delete(id);
      return next;
    });
    onCsvChange(id, text);
  };

  // Ref-mirror of userUploadedIds so reloadAsset (called by the bootstrap
  // effect) can read the CURRENT value, not a stale closure capture.
  const userUploadedIdsRef = useRef(userUploadedIds);
  useEffect(() => { userUploadedIdsRef.current = userUploadedIds; }, [userUploadedIds]);

  const reloadAsset = async (asset) => {
    // Skip if the user has uploaded their own CSV for this asset — their
    // version always wins over the committed-CSV bootstrap. Use the ref so
    // we read the live value (not the closure-captured one).
    if (userUploadedIdsRef.current.has(asset.id)) {
      setFetchStatus(s => ({ ...s, [asset.id]: { kind: "info", msg: "user upload preserved" } }));
      return;
    }
    setFetchStatus(s => ({ ...s, [asset.id]: { kind: "info", msg: "loading\u2026" } }));
    try {
      const csv = await loadCommittedCsv(asset);
      onCsvChange(asset.id, csv);
      setFetchStatus(s => ({ ...s, [asset.id]: { kind: "ok", msg: `loaded ./data/${asset.file}` } }));
    } catch (e) {
      const is404 = /HTTP 404|empty/.test(e.message);
      setFetchStatus(s => ({
        ...s,
        [asset.id]: { kind: is404 ? "idle" : "bad", msg: is404 ? "no data yet \u2014 do Setup steps 2\u20135" : `./data/${asset.file}: ${e.message}` }
      }));
    }
  };

  const reloadAll = async () => {
    const m = await loadManifest();
    setManifest(m);
    await Promise.all([...ASSETS, CPI_ASSET].map(a => reloadAsset(a)));
  };

  // bootstrap: same-origin load of committed CSVs + manifest, once on mount.
  // User-uploaded CSVs are restored synchronously via the lazy-init of
  // csvText / series / seriesDaily; reloadAsset will skip any asset that's
  // marked as user-uploaded (via userUploadedIdsRef), so the user's data
  // is never clobbered by the committed bootstrap.
  const bootstrappedRef = useRef(false);
  useEffect(() => {
    if (bootstrappedRef.current) return;
    bootstrappedRef.current = true;
    reloadAll();
    // eslint-disable-next-line
  }, []);

  // Auto-persist user-uploaded CSV text to localStorage so it survives reload.
  // Persists ONLY the assets in userUploadedIds.
  useEffect(() => {
    try {
      const out = {};
      for (const id of userUploadedIds) {
        const t = csvText[id];
        if (typeof t === "string" && t.trim().length > 0) out[id] = t;
      }
      const serialized = JSON.stringify(out);
      if (serialized.length < 4_000_000) {
        localStorage.setItem("backtester-uploaded-csvs.json", serialized);
      }
    } catch {}
  }, [csvText, userUploadedIds]);

  // ---- compute common window for selected portfolios ----
  // ---- per-portfolio monthly series (with optional 200-SMA timing applied
  //      to the risk leg). Gold series is always the raw monthly. -------------
  const pfAssetSeries = useMemo(() => {
    const out = {};
    for (const pid of selectedPortfolios) {
      const pf = getPF(pid);
      if (!pf) continue;
      const map = {};
      const timed = !!portfolioTiming[pid];
      for (const a of pf.assets) {
        // Synthetic asset (e.g. coIQ_t): always built from its sourceAsset's
        // daily series with SMA timing applied. Cash rate is ECB − 0.25 %.
        const meta = ASSETS.find(x => x.id === a);
        if (meta?.synthetic && meta.sourceAsset) {
          const src = meta.sourceAsset;
          const eqDaily = seriesDaily[src];
          // v3.6: each asset is its own SMA signal — no external VT series.
          const sigDaily = eqDaily;
          const sp = spreads[src] || { buy: 0, sell: 0 };
          const taxOpts = {
            rate: taxRate,
            teilfreistellung: teilfreistellung[src] ?? 0,
            taxLikeDebt: DEBT_TAX_IDS.has(src),
          };
          if (eqDaily && sigDaily) {
            const cash = Math.max(0, (ecbRate || 0) - 0.25);
            const res = buildTimedRiskLegMonthly(eqDaily, sigDaily, cash, sp.buy, sp.sell, orderFee, taxOpts, series.ecb || null);
            if (res && res.series.length >= 12) {
              map[a] = res.series;
              map.__synthetic = { id: a, src, cashRate: cash, res };
              continue;
            }
          }
          // Fallback: use the source's raw monthly series; flag it so the UI
          // can warn that the SMA-timed leg is degraded to buy-and-hold.
          map[a] = series[src];
          map.__syntheticFallback = a;
          continue;
        }
        // v3: per-asset SMA for the user portfolio (userSMA[a]); legacy
        // behaviour for the predefined portfolios (single portfolioTiming flag
        // applied to pf.equityId).
        const shouldTime = pid === "user"
          ? (!!userSMA[a])
          : (a === pf.equityId && timed);
        if (shouldTime) {
          const eqDaily = seriesDaily[a];
          // v3.6: each asset is its own SMA signal.
          const sigDaily = eqDaily;
          const sp = spreads[a] || { buy: 0, sell: 0 };
          const taxOpts = {
            rate: taxRate,
            teilfreistellung: teilfreistellung[a] ?? 0,
            taxLikeDebt: DEBT_TAX_IDS.has(a),
          };
          if (eqDaily && sigDaily) {
            const res = buildTimedRiskLegMonthly(eqDaily, sigDaily, cashRate, sp.buy, sp.sell, orderFee, taxOpts, series.ecb || null);
            if (res && res.series.length >= 12) { map[a] = res.series; map.__timed = res; continue; }
          }
          // fall back to raw monthly with a flag so UI can flag it
          map[a] = series[a];
          map.__timedFallback = true;
        } else {
          map[a] = series[a];
        }
      }
      out[pid] = map;
    }
    return out;
  }, [selectedPortfolios, portfolioTiming, userSMA, seriesDaily, series, cashRate, ecbRate, spreads, orderFee, taxRate, teilfreistellung, getPF, series.ecb]);

  // ---- per-portfolio windows (each portfolio's own intersection) ----------
  const perPortfolioWindow = useMemo(() => {
    const out = {};
    for (const pid of selectedPortfolios) {
      const pf = getPF(pid);
      if (!pf) continue;
      const map = pfAssetSeries[pid];
      if (!map) { out[pid] = { ok: false }; continue; }
      const arrs = pf.assets.map(a => map[a]);
      if (arrs.some(a => !a || a.length === 0)) {
        out[pid] = { ok: false, missing: pf.assets.filter(a => !map[a]) };
        continue;
      }
      const sets = arrs.map(a => new Set(a.map(r => r.month)));
      const all = [...sets[0]].filter(m => sets.every(s => s.has(m))).sort();
      if (all.length < 12) { out[pid] = { ok: false, tooShort: true, n: all.length }; continue; }
      out[pid] = { ok: true, months: all, start: all[0], end: all[all.length - 1] };
    }
    return out;
  }, [selectedPortfolios, pfAssetSeries]);

  // ---- common window (intersection across portfolios OR per-portfolio when
  //      ownNativeHistory is ON) -----------------------------------------------
  const commonWindow = useMemo(() => {
    if (selectedPortfolios.length === 0) return null;
    const winList = selectedPortfolios.map(pid => perPortfolioWindow[pid]);
    if (winList.some(w => !w?.ok)) {
      // surface a useful message
      const missing = [];
      for (const pid of selectedPortfolios) {
        const pf = getPF(pid);
        const map = pfAssetSeries[pid] || {};
        for (const a of pf.assets) if (!map[a]) {
          const meta = ASSETS.find(x => x.id === a);
          missing.push(meta?.synthetic ? `${a} (needs ${meta.sourceAsset} daily)` : a);
        }
        if (portfolioTiming[pid] && !seriesDaily[pf.equityId]) missing.push(pf.equityId + " (daily for SMA)");
        if (pf.builtInTiming) {
          for (const a of pf.assets) {
            const meta = ASSETS.find(x => x.id === a);
            if (meta?.synthetic && !seriesDaily[meta.sourceAsset]) missing.push(meta.sourceAsset + " (daily for built-in SMA)");
          }
        }
      }
      const tooShort = winList.find(w => w && !w.ok && w.tooShort);
      if (tooShort) return { ok: false, tooShort: true, n: tooShort.n };
      return { ok: false, missing: [...new Set(missing)] };
    }
    if (ownNativeHistory) {
      const all = new Set();
      winList.forEach(w => w.months.forEach(m => all.add(m)));
      const months = [...all].sort();
      return { ok: true, months, start: months[0], end: months[months.length - 1], perPortfolio: true };
    }
    const sets = winList.map(w => new Set(w.months));
    const all = [...sets[0]].filter(m => sets.every(s => s.has(m))).sort();
    if (all.length < 12) return { ok: false, tooShort: true, n: all.length };
    return { ok: true, months: all, start: all[0], end: all[all.length - 1] };
  }, [selectedPortfolios, perPortfolioWindow, pfAssetSeries, portfolioTiming, seriesDaily, ownNativeHistory]);

  // build per-portfolio trimmed data (uses pfAssetSeries with timing applied)
  const buildPortfolioData = useCallback((pf, months, assetMap) => {
    const d = {};
    const set = new Set(months);
    const map = assetMap || {};
    for (const a of pf.assets) {
      const arr = map[a];
      if (!arr) return null;
      d[a] = arr.filter(r => set.has(r.month));
      if (d[a].length === 0) return null;
    }
    return d;
  }, []);

  // ---- run simulations ----
  const simResults = useMemo(() => {
    if (!commonWindow || !commonWindow.ok) return null;
    const out = {};
    for (const pid of selectedPortfolios) {
      const pf = getPF(pid);
      const months = ownNativeHistory ? perPortfolioWindow[pid]?.months : commonWindow.months;
      if (!months) continue;
      const data = buildPortfolioData(pf, months, pfAssetSeries[pid]);
      if (!data) continue;
      const targetGoldPct = pf.isMarket ? 0 : (goldWeights[pid] || 0) / 100;
      // For timed risk legs we feed the synthetic monthly series directly; the
      // "gross" ongoing-cost drag is suppressed for that asset because the
      // daily engine already compounds at the underlying daily-price level
      // (and we are not double-charging ETF ongoing cost on cash days).
      const effectiveType = { ...seriesType };
      if (portfolioTiming[pid]) effectiveType[pf.equityId] = "net";
      const state = {
        portfolio: pf, targetGoldPct, data,
        seriesType: effectiveType, ongoingCost, spreads, orderFee,
        tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
        starting, monthly, rebalance,
        // For the user portfolio, pass per-asset rebalance flags. The engine
        // then ignores the legacy `rebalance` string and runs annually only
        // for assets whose flag is true. For predefined portfolios this stays
        // undefined → legacy gold-only behaviour preserved.
        rebalanceFlags: pid === "user" ? userRebalance : undefined,
      };
      out[pid] = runSim(state);
      if (out[pid] && pfAssetSeries[pid]?.__timed) {
        out[pid].timing = { flips: pfAssetSeries[pid].__timed.flips, since: pfAssetSeries[pid].__timed.coveredFromDate };
      }
    }
    return out;
  }, [commonWindow, perPortfolioWindow, pfAssetSeries, selectedPortfolios, goldWeights, seriesType, ongoingCost, spreads, orderFee, taxRate, teilfreistellung, allowance, basiszins, starting, monthly, rebalance, buildPortfolioData, ownNativeHistory, portfolioTiming, userRebalance]);

  // ---- optimal gold sweep per two-asset portfolio (in-sample) ----
  const [sweepResults, setSweepResults] = useState({});
  const [sweepRunning, setSweepRunning] = useState(false);

  // ---- v3: efficient frontier (random Dirichlet sampling on the chosen basket)
  //
  // Performance notes — why this used to hang:
  //   N samples × 30 horizons × 500 MC paths × ~60 months = ~1B path-iterations
  //   for the default 1500 samples, all on the main thread with no yields. The
  //   browser appeared frozen for 30–90 seconds and the spinner never updated.
  //
  // Fix: chunk the work — process ~25 samples per setTimeout slice, update
  // progress state, and surface a Cancel button. Also drop the default sample
  // count to 500 (still plenty for picking winners) and the per-sample MC paths
  // to 200 (h* is robust at that level).
  const [efRunning, setEfRunning] = useState(false);
  const [efProgress, setEfProgress] = useState({ done: 0, total: 0 });
  const efCancelRef = useRef(false);
  const [efSamples, setEfSamples] = useState(500);
  const [efIncludeUserSMA, setEfIncludeUserSMA] = useState(true);
  const [efComputeHStar, setEfComputeHStar] = useState(true);
  // v3.5: single 5%-step grid + pure-asset benchmarks (ACWI, coIQ).
  const [efResults, setEfResults] = useState(null);   // {samples, benchmarks, winners, includesUserSMA, basket}

  const cancelEfficientFrontier = () => { efCancelRef.current = true; };

  const runEfficientFrontier = () => {
    if (!commonWindow || !commonWindow.ok || userPortfolio.assets.length < 2) return;
    setEfRunning(true);
    efCancelRef.current = false;
    setEfProgress({ done: 0, total: efSamples + 1 });

    const basket = userPortfolio.assets.slice();
    const months = commonWindow.months;
    const cpiMap = series.cpi ? new Map(series.cpi.map(r => [r.month, r.value])) : null;
    const cpiAligned = cpiMap ? months.map(m => cpiMap.get(m)) : null;
    let cutCPI = months.length;
    if (cpiAligned) { for (let i = 0; i < months.length; i++) if (cpiAligned[i] == null) { cutCPI = i; break; } }

    // v3.3: run BOTH grids in one pass, then dedupe.
    //   (a) "step5"    — every weight vector where each share is a multiple of
    //                    5% and shares sum to 100. Falls back to 10% steps
    // v3.5: ONE grid — every 5%-step composition of n basket assets that
    // sums to 100. Falls back to 10% steps on baskets larger than ~6 assets
    // to keep runtime sane. Doubling grid removed.
    // Two BENCHMARK portfolios (pure ACWI, pure coIQ) are always evaluated
    // separately — they aren't basket-mixes, just reference comparisons.
    // The user's current weights are always sample 0.
    const STEP_PCT = 5;
    const userSample = basket.map(a => userPortfolio.weights[a] || 0);
    const grid = new Map();
    const keyOf = (vec) => vec.map(v => Math.round(v * 10000) / 10000).join("|");
    const push = (vec) => {
      const s = vec.reduce((a, b) => a + b, 0);
      if (s <= 0) return;
      const norm = vec.map(v => v / s);
      const k = keyOf(norm);
      if (!grid.has(k)) grid.set(k, norm);
    };
    push(userSample);

    const n = basket.length;

    // 5%-step grid: integer compositions of 100/STEP_PCT into n parts.
    {
      const STEPS = Math.round(100 / STEP_PCT);
      const buildSteps = (idx, remaining, acc) => {
        if (idx === n - 1) { acc.push(remaining); push(acc.map(v => v * STEP_PCT / 100)); acc.pop(); return; }
        for (let v = 0; v <= remaining; v++) {
          acc.push(v);
          buildSteps(idx + 1, remaining - v, acc);
          acc.pop();
        }
      };
      const combosA = (() => {
        let num = 1, den = 1;
        for (let i = 1; i <= n - 1; i++) { num *= STEPS + i; den *= i; }
        return Math.round(num / den);
      })();
      if (combosA <= 50000) buildSteps(0, STEPS, []);
      else {
        const STEPS_COARSE = 10;
        const STEP_PCT_COARSE = 10;
        const buildStepsCoarse = (idx, remaining, acc) => {
          if (idx === n - 1) { acc.push(remaining); push(acc.map(v => v * STEP_PCT_COARSE / 100)); acc.pop(); return; }
          for (let v = 0; v <= remaining; v++) {
            acc.push(v);
            buildStepsCoarse(idx + 1, remaining - v, acc);
            acc.pop();
          }
        };
        buildStepsCoarse(0, STEPS_COARSE, []);
      }
    }

    // Materialize, with the user sample first.
    const userKey = (() => {
      const s = userSample.reduce((a, b) => a + b, 0);
      return s > 0 ? keyOf(userSample.map(v => v / s)) : null;
    })();
    const samplesWeights = [];
    if (userKey && grid.has(userKey)) { samplesWeights.push(grid.get(userKey)); grid.delete(userKey); }
    else samplesWeights.push(userSample.map(v => v / Math.max(1e-12, userSample.reduce((a, b) => a + b, 0))));
    for (const v of grid.values()) samplesWeights.push(v);
    setEfProgress({ done: 0, total: samplesWeights.length + 2 });

    const liveMap = pfAssetSeries.user || {};
    const seriesMap = {};
    for (const a of basket) seriesMap[a] = efIncludeUserSMA && liveMap[a] ? liveMap[a] : series[a];
    const dataBase = {};
    const monthSet = new Set(months);
    for (const a of basket) {
      const arr = seriesMap[a];
      if (!arr) { setEfRunning(false); return; }
      dataBase[a] = arr.filter(r => monthSet.has(r.month));
      if (dataBase[a].length === 0) { setEfRunning(false); return; }
    }
    const effSeriesType = { ...seriesType };
    for (const a of basket) if (efIncludeUserSMA && userSMA[a]) effSeriesType[a] = "net";

    // Pure-asset benchmark portfolios (independent of basket). Always 100%
    // of the named asset over the common window. They need their own data
    // map because the named asset may not be in basket.
    const benchmarkDef = (assetId, label) => {
      const arr = series[assetId];
      if (!arr) return null;
      const data = { [assetId]: arr.filter(r => monthSet.has(r.month)) };
      if (data[assetId].length === 0) return null;
      return { assetId, label, data };
    };
    const benchmarks = [
      benchmarkDef("coIQ",   "100% coIQ"),
      benchmarkDef("world",  "100% Prime ACWI"),
    ].filter(Boolean);

    const H_MAX_EF = 30;
    const MC_PATHS_EF = 200;   // light MC — enough for picking winners on h*
    const CHUNK = 25;          // samples processed per animation frame
    const results = [];

    const processChunk = (start) => {
      if (efCancelRef.current) {
        setEfResults({ basket, samples: results, winners: computeWinners(results), includesUserSMA: efIncludeUserSMA, cancelled: true });
        setEfRunning(false);
        return;
      }
      const end = Math.min(start + CHUNK, samplesWeights.length);
      for (let idx = start; idx < end; idx++) {
        const wv = samplesWeights[idx];
        const wmap = {};
        basket.forEach((a, i) => { wmap[a] = wv[i]; });
        const dynPf = {
          id: "ef_sample", name: "EF sample", assets: basket, weights: wmap,
          equityId: basket.find(a => a !== "gold") || basket[0], fixedWeights: true, dynamic: true,
        };
        const r = runSim({
          portfolio: dynPf, targetGoldPct: wmap.gold || 0, data: dataBase,
          seriesType: effSeriesType, ongoingCost, spreads, orderFee,
          tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
          starting, monthly, rebalance,
        });
        if (!r || !r.metrics) continue;
        let hStar = null;
        if (efComputeHStar && cpiAligned && cutCPI >= 13) {
          const upTrunc = r.unitPriceSeries.slice(0, cutCPI);
          const cpiTrunc = cpiAligned.slice(0, cutCPI);
          const paired = buildPairedReturns(upTrunc, cpiTrunc);
          const curve = [];
          for (let h = 1; h <= H_MAX_EF; h++) {
            const mcPt = rollingRealReturnsMC(paired, h, MC_PATHS_EF, mc.block, 12345 + idx * 7 + h);
            curve.push(mcPt ? mcPt.worstRealCAGR : null);
          }
          for (let i = 0; i < curve.length; i++) {
            let allOk = true;
            for (let j = i; j < curve.length; j++) { if (curve[j] == null || curve[j] < 0) { allOk = false; break; } }
            if (allOk) { hStar = i + 1; break; }
          }
        }
        results.push({
          weights: wv,
          sortino: r.metrics.sortino,
          maxDD: r.metrics.maxDD,
          finalRatio: r.finalValue / r.totalInvested,
          finalValue: r.finalValue,
          hStar,
        });
      }
      setEfProgress({ done: end, total: samplesWeights.length + benchmarks.length });
      if (end < samplesWeights.length) {
        setTimeout(() => processChunk(end), 0);
      } else {
        // After the grid: run pure-asset benchmarks (independent portfolios).
        const benchResults = [];
        for (const bm of benchmarks) {
          const benchPf = {
            id: "ef_bench_" + bm.assetId, name: bm.label, assets: [bm.assetId],
            weights: { [bm.assetId]: 1 }, equityId: bm.assetId,
            isMarket: true, fixedWeights: true, dynamic: true,
          };
          const r = runSim({
            portfolio: benchPf, targetGoldPct: 0, data: bm.data,
            seriesType: { ...seriesType, [bm.assetId]: "net" },
            ongoingCost, spreads, orderFee,
            tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
            starting, monthly, rebalance,
          });
          if (!r || !r.metrics) continue;
          let hStar = null;
          if (efComputeHStar && cpiAligned && cutCPI >= 13) {
            const upTrunc = r.unitPriceSeries.slice(0, cutCPI);
            const cpiTrunc = cpiAligned.slice(0, cutCPI);
            const paired = buildPairedReturns(upTrunc, cpiTrunc);
            const curve = [];
            for (let h = 1; h <= H_MAX_EF; h++) {
              const mcPt = rollingRealReturnsMC(paired, h, MC_PATHS_EF, mc.block, 999 + bm.assetId.length + h);
              curve.push(mcPt ? mcPt.worstRealCAGR : null);
            }
            for (let i = 0; i < curve.length; i++) {
              let allOk = true;
              for (let j = i; j < curve.length; j++) { if (curve[j] == null || curve[j] < 0) { allOk = false; break; } }
              if (allOk) { hStar = i + 1; break; }
            }
          }
          benchResults.push({
            label: bm.label, assetId: bm.assetId,
            sortino: r.metrics.sortino, maxDD: r.metrics.maxDD,
            finalRatio: r.finalValue / r.totalInvested,
            finalValue: r.finalValue,
            hStar,
          });
        }
        setEfProgress({ done: samplesWeights.length + benchResults.length, total: samplesWeights.length + benchmarks.length });
        setEfResults({ basket, samples: results, benchmarks: benchResults, winners: computeWinners(results), includesUserSMA: efIncludeUserSMA });
        setEfRunning(false);
      }
    };

    const computeWinners = (rs) => {
      if (rs.length === 0) return { sortino: null, finalReturn: null, hStar: null, user: null };
      let bs = rs[0], br = rs[0], bh = null;
      for (const r of rs) {
        if ((r.sortino ?? -Infinity) > (bs.sortino ?? -Infinity)) bs = r;
        if (r.finalRatio > br.finalRatio) br = r;
        if (r.hStar != null && (bh == null || r.hStar < bh.hStar)) bh = r;
      }
      return { sortino: bs, finalReturn: br, hStar: bh, user: rs[0] };
    };

    setTimeout(() => processChunk(0), 30);
  };

  const runSweep = () => {
    if (!commonWindow || !commonWindow.ok) return;
    setSweepRunning(true);
    setTimeout(() => {
      const cpiMap = series.cpi ? new Map(series.cpi.map(r => [r.month, r.value])) : null;
      const mcPaths = Math.min(500, mc.paths);   // keep sweep tolerable

      const out = {};
      for (const pid of selectedPortfolios) {
        const pf = getPF(pid);
        if (pf.isMarket) continue;
        if (pf.dynamic) continue;   // user portfolio has no single gold weight
        const pfMonths = ownNativeHistory ? perPortfolioWindow[pid]?.months : commonWindow.months;
        if (!pfMonths) continue;
        const cpiAligned = cpiMap ? pfMonths.map(m => cpiMap.get(m)) : null;
        const cpiOk = !!cpiMap && cpiAligned && cpiAligned.some(v => v != null);
        const data = buildPortfolioData(pf, pfMonths, pfAssetSeries[pid]);
        if (!data) continue;
        let best = { w: pf.defaultGold, sortino: -Infinity };
        const samples = [];
        for (let pct = 0; pct <= 100; pct += 1) {
          const effectiveType = { ...seriesType };
          if (portfolioTiming[pid]) effectiveType[pf.equityId] = "net";
          const state = {
            portfolio: pf, targetGoldPct: pct / 100, data, seriesType: effectiveType, ongoingCost, spreads, orderFee,
            tax: { rate: taxRate, teilfreistellung, allowance, basiszins },
            starting, monthly, rebalance,
          };
          const r = runSim(state);
          if (!r || !r.metrics) continue;
          const s = r.metrics.sortino;
          if (s != null && s > best.sortino) best = { w: pct, sortino: s };

          let realCurve = null;
          if (cpiOk) {
            // Same truncation as in realResults: drop tail months without CPI.
            let cut = pfMonths.length;
            for (let i = 0; i < pfMonths.length; i++) {
              if (cpiAligned[i] == null) { cut = i; break; }
            }
            if (cut >= 13) {
              const upTrunc = r.unitPriceSeries.slice(0, cut);
              const cpiTrunc = cpiAligned.slice(0, cut);
              const paired = buildPairedReturns(upTrunc, cpiTrunc);
              realCurve = [];
              for (let h = 1; h <= H_MAX; h++) {
                const mcPt = rollingRealReturnsMC(paired, h, mcPaths, mc.block, 91 + pid.length * 31 + pct * 7 + h);
                if (mcPt) realCurve.push({ h, kind: "mc", worstRealCAGR: mcPt.worstRealCAGR });
                else realCurve.push({ h, kind: "none", worstRealCAGR: null });
              }
            }
          }
          samples.push({ w: pct, sortino: s, finalValue: r.finalValue, maxDD: r.metrics.maxDD, realCurve });
        }

        // w_safe(h), w_return(h)
        const perH = {};
        if (cpiOk) {
          for (let h = 1; h <= H_MAX; h++) {
            let bestW = null, bestVal = -Infinity;
            let returnW = null, returnVal = null;
            for (const sample of samples) {
              if (!sample.realCurve) continue;
              const pt = sample.realCurve.find(x => x.h === h);
              if (!pt || pt.worstRealCAGR == null) continue;
              if (pt.worstRealCAGR > bestVal) { bestVal = pt.worstRealCAGR; bestW = sample.w; }
              if (pt.worstRealCAGR >= 0 && returnW == null) { returnW = sample.w; returnVal = pt.worstRealCAGR; }
            }
            perH[h] = {
              w_safe: bestW != null ? { w: bestW, worst: bestVal } : null,
              w_return: returnW != null ? { w: returnW, worst: returnVal } : null,
              kind: "mc",
            };
          }
        }
        out[pid] = { ...best, samples, perH, cpiOk };
      }
      setSweepResults(out);
      setSweepRunning(false);
    }, 30);
  };

  // ---- monte carlo per portfolio ----
  const mcResults = useMemo(() => {
    if (!simResults) return null;
    const out = {};
    for (const pid of Object.keys(simResults)) {
      const r = simResults[pid];
      if (!r) continue;
      out[pid] = monteCarloMaxDD(r.metrics.monthlyRets, mc.horizon, mc.block, mc.paths, 12345 + pid.length);
    }
    return out;
  }, [simResults, mc]);

  // ---- V2: real-preservation curves per portfolio (historical + MC extension) ----
  // For each portfolio, align CPI to its window. Compute rolling real returns
  // at h=1..30 years; mark each h as historical (count>=6) or MC-only. For MC
  // h's, paired-bootstrap (unit-price return, CPI return) together.
  const H_MAX = 30;
  const realResults = useMemo(() => {
    if (!simResults || !series.cpi) return null;
    const cpiMap = new Map(series.cpi.map(r => [r.month, r.value]));
    const out = {};
    for (const pid of Object.keys(simResults)) {
      const r = simResults[pid];
      if (!r) continue;
      // Truncate to the prefix of months that have CPI data. Tail months
      // missing because CPI publishes with a 2-4 month lag are dropped.
      let cut = r.months.length;
      for (let i = 0; i < r.months.length; i++) {
        if (!cpiMap.has(r.months[i])) { cut = i; break; }
      }
      const months = r.months.slice(0, cut);
      const upTrunc = r.unitPriceSeries.slice(0, cut);
      const cpiAligned = months.map(m => cpiMap.get(m));
      if (cut < 13 || cpiAligned.some(v => v == null)) {
        out[pid] = { error: cut < 13 ? "CPI window too short for rolling 1y returns" : "CPI alignment failed" };
        continue;
      }
      const droppedTail = r.months.length - cut;
      const paired = buildPairedReturns(upTrunc, cpiAligned);
      // Always MC (per request): drop the in-sample worst-window line, which
      // is overfit on this short bear-market-free window. MC is the only
      // robust signal at any horizon.
      const curve = [];
      for (let h = 1; h <= H_MAX; h++) {
        const mcPt = rollingRealReturnsMC(paired, h, mc.paths, mc.block, 78901 + pid.length * 31 + h);
        if (mcPt) curve.push({ h, kind: "mc", count: mcPt.n, worstRealCAGR: mcPt.worstRealCAGR, worstRealMultiple: null, p5RealCAGR: mcPt.p5RealCAGR });
        else curve.push({ h, kind: "none" });
      }
      // h* = smallest h beyond which worstRealCAGR stays >= 0 for all subsequent h
      let hStar = null;
      for (let i = 0; i < curve.length; i++) {
        let allOk = true;
        for (let j = i; j < curve.length; j++) {
          const v = curve[j].worstRealCAGR;
          if (v == null || v < 0) { allOk = false; break; }
        }
        if (allOk) { hStar = curve[i].h; break; }
      }
      out[pid] = { curve, hStar, droppedTail };
    }
    return out;
  }, [simResults, series.cpi, mc]);

  // ---- coIQ ↔ momentum regression ----
  const regression = useMemo(() => {
    const c = series.coIQ, m = series.momentum;
    if (!c || !m) return null;
    const mapM = new Map(m.map(r => [r.month, r.value]));
    const overlap = c.filter(r => mapM.has(r.month));
    if (overlap.length < 6) return null;
    const cr = []; const mr = [];
    for (let i = 1; i < overlap.length; i++) {
      const key = overlap[i].month;
      const prevKey = overlap[i - 1].month;
      if (monthsBetween(prevKey, key) !== 1) continue;
      cr.push(overlap[i].value / overlap[i - 1].value - 1);
      mr.push(mapM.get(key) / mapM.get(prevKey) - 1);
    }
    return regress(cr, mr);
  }, [series.coIQ, series.momentum]);

  // ---- aggregated chart data (overlay unit prices) ----
  const chartData = useMemo(() => {
    if (!simResults || !commonWindow || !commonWindow.ok) return null;
    const months = commonWindow.months;
    // Per-portfolio map: month -> {unit, dd}. Handles ownNativeHistory where
    // each portfolio's series can span a different range of months.
    const pfMaps = {};
    for (const pid of Object.keys(simResults)) {
      const r = simResults[pid];
      if (!r || !r.months) continue;
      const m = new Map();
      for (let i = 0; i < r.months.length; i++) {
        m.set(r.months[i], { unit: r.unitPriceSeries[i], dd: r.ddSeries[i] * 100 });
      }
      pfMaps[pid] = m;
    }
    const rows = months.map((m) => {
      const row = { month: m, label: m };
      for (const pid of Object.keys(pfMaps)) {
        const pt = pfMaps[pid].get(m);
        if (pt) { row[pid] = pt.unit; row[pid + "_dd"] = pt.dd; }
      }
      return row;
    });
    return rows;
  }, [simResults, commonWindow]);

  const [chartMode, setChartMode] = useState("unit");   // "unit" | "dd"

  // ---- winners ----
  const winners = useMemo(() => {
    if (!simResults) return null;
    const rows = Object.entries(simResults).filter(([_, r]) => r);
    if (rows.length === 0) return null;
    const bySortino = [...rows].sort((a, b) => (b[1].metrics.sortino || -Infinity) - (a[1].metrics.sortino || -Infinity))[0];
    const byMoney = [...rows].sort((a, b) => (b[1].finalValue / b[1].totalInvested) - (a[1].finalValue / a[1].totalInvested))[0];
    return { sortino: bySortino, money: byMoney };
  }, [simResults]);

  const windowDates = commonWindow?.ok
    ? { start: commonWindow.start, end: commonWindow.end, months: commonWindow.months.length }
    : null;
  const shortRegime = windowDates && windowDates.months < 120;

  // ---- UI ----
  // Persisted: GitHub repo URL/slug + paste-buffer for cookie + ariva IDs.
  // These never get sent anywhere; they live only in *your* browser's
  // localStorage and provide one-click handoffs to GitHub.
  const [repoSlug, setRepoSlug] = useState("");
  const [stooqCookie, setStooqCookie] = useState("");
  const [stooqApiKey, setStooqApiKey] = useState("");
  const [arivaSecu, setArivaSecu] = useState("");
  const [arivaBoerse, setArivaBoerse] = useState("");
  const [arivaCookie, setArivaCookie] = useState("");
  const [arivaGoldSecu, setArivaGoldSecu] = useState("");
  const [arivaGoldBoerse, setArivaGoldBoerse] = useState("");
  const [copyMsg, setCopyMsg] = useState("");

  useEffect(() => {
    try {
      setRepoSlug(localStorage.getItem("bt:repoSlug") || "");
      setStooqCookie(localStorage.getItem("bt:stooqCookie") || "");
      setStooqApiKey(localStorage.getItem("bt:stooqApiKey") || "");
      setArivaSecu(localStorage.getItem("bt:arivaSecu") || "");
      setArivaBoerse(localStorage.getItem("bt:arivaBoerse") || "");
      setArivaCookie(localStorage.getItem("bt:arivaCookie") || "");
      setArivaGoldSecu(localStorage.getItem("bt:arivaGoldSecu") || "");
      setArivaGoldBoerse(localStorage.getItem("bt:arivaGoldBoerse") || "");
      // Best-effort first-time guess from GitHub Pages URL.
      if (!localStorage.getItem("bt:repoSlug")) {
        const host = location.host, path = location.pathname;
        if (host.endsWith(".github.io")) {
          const user = host.replace(/\.github\.io$/, "");
          const repo = path.split("/").filter(Boolean)[0];
          if (user && repo) setRepoSlug(`${user}/${repo}`);
        }
      }
    } catch {}
  }, []);
  useEffect(() => { try { localStorage.setItem("bt:repoSlug", repoSlug); } catch {} }, [repoSlug]);
  useEffect(() => { try { localStorage.setItem("bt:stooqCookie", stooqCookie); } catch {} }, [stooqCookie]);
  useEffect(() => { try { localStorage.setItem("bt:stooqApiKey", stooqApiKey); } catch {} }, [stooqApiKey]);
  useEffect(() => { try { localStorage.setItem("bt:arivaSecu", arivaSecu); } catch {} }, [arivaSecu]);
  useEffect(() => { try { localStorage.setItem("bt:arivaBoerse", arivaBoerse); } catch {} }, [arivaBoerse]);
  useEffect(() => { try { localStorage.setItem("bt:arivaCookie", arivaCookie); } catch {} }, [arivaCookie]);
  useEffect(() => { try { localStorage.setItem("bt:arivaGoldSecu", arivaGoldSecu); } catch {} }, [arivaGoldSecu]);
  useEffect(() => { try { localStorage.setItem("bt:arivaGoldBoerse", arivaGoldBoerse); } catch {} }, [arivaGoldBoerse]);

  // Accept either `user/repo` or a full https://github.com/user/repo URL.
  const parsedRepo = useMemo(() => {
    const s = (repoSlug || "").trim();
    if (!s) return null;
    let m = s.match(/^https?:\/\/github\.com\/([\w.-]+)\/([\w.-]+?)(?:\.git)?\/?$/i);
    if (m) return `${m[1]}/${m[2]}`;
    if (/^[\w.-]+\/[\w.-]+$/.test(s)) return s;
    return null;
  }, [repoSlug]);
  const repoBase = parsedRepo ? `https://github.com/${parsedRepo}` : null;
  const stooqOk  = manifest && ["momentum", "gold", "market"].every(k => manifest.assets?.[k]?.lastDate);
  const arivaOk  = manifest && !!manifest.assets?.coiq?.lastDate;

  const copyToClipboard = async (text, label) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopyMsg(`copied ${label}`);
      setTimeout(() => setCopyMsg(""), 1800);
    } catch {
      setCopyMsg("clipboard blocked — select & copy manually");
      setTimeout(() => setCopyMsg(""), 2500);
    }
  };

  // GitHub no longer supports `?value=` prefill on /new/ routes (removed for
  // security in 2022). Only `?filename=` works. So we prefill the filename and
  // surface the JSON next to a copy-to-clipboard button + a file download so
  // the user can paste/upload it on the GitHub page.
  const arivaJsonContent = JSON.stringify({ secu: arivaSecu.trim(), boerse_id: arivaBoerse.trim() }, null, 2) + "\n";
  const arivaNewFileUrl = repoBase
    ? `${repoBase}/new/main?filename=data%2Fariva.json`
    : null;
  const downloadArivaJson = () => {
    const blob = new Blob([arivaJsonContent], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "ariva.json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const arivaGoldJsonContent = JSON.stringify({ secu: arivaGoldSecu.trim(), boerse_id: arivaGoldBoerse.trim() }, null, 2) + "\n";
  const arivaGoldNewFileUrl = repoBase
    ? `${repoBase}/new/main?filename=data%2Fariva-gold.json`
    : null;
  const downloadArivaGoldJson = () => {
    const blob = new Blob([arivaGoldJsonContent], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "ariva-gold.json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // Bundle all the project files into a zip the user can upload to GitHub.
  // We fetch each known path same-origin from the deployed site. Files that
  // fail to fetch are skipped (with a note in the resulting zip).
  const [zipStatus, setZipStatus] = useState("");
  const downloadProjectZip = async () => {
    if (!window.JSZip) { setZipStatus("JSZip failed to load"); return; }
    setZipStatus("bundling…");
    const paths = [
      "index.html",
      "README.md",
      ".gitignore",
      ".github/workflows/update-data.yml",
      "scripts/fetch_data.py",
      "data/manifest.json",
    ];
    const zip = new window.JSZip();
    const failed = [];
    for (const p of paths) {
      try {
        const r = await fetch("./" + p, { cache: "no-store" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        zip.file(p, await r.blob());
      } catch (e) { failed.push(p); }
    }
    // Include ariva.json if both IDs are filled
    if (arivaSecu && arivaBoerse) zip.file("data/ariva.json", arivaJsonContent);

    if (failed.length) zip.file("_MISSING_FILES.txt",
      "These files could not be fetched from the current deployment:\n  - " + failed.join("\n  - ") +
      "\nGet them from the source repo or re-export the project.\n");

    const blob = await zip.generateAsync({ type: "blob" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "portfolio-backtest.zip";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    setZipStatus(failed.length ? `done · ${failed.length} files missing` : "done");
    setTimeout(() => setZipStatus(""), 2500);
  };

  const bootstrapReadmeUrl = repoBase
    ? `${repoBase}/new/main?filename=README.md`
    : null;

  return (
    <div className="shell">
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark"></div>
          <div>
            <h1>Portfolio Backtest</h1>
            <div className="sub">German tax-aware · DCA · lot-tracked gold · Monte Carlo</div>
          </div>
        </div>
        <div className="topbar-right">
          <StatusPill status={storage.status} />
          {storage.configured && !storage.signedIn && <button className="btn" onClick={storage.signIn}>Sign in with Google</button>}
          {storage.configured && storage.signedIn && <button className="btn btn-ghost" onClick={storage.signOut}>Sign out</button>}
          <button className="btn btn-primary" onClick={handleSave}>Save</button>
        </div>
      </div>

      
      <div className="grid grid-2">
        <div className="panel">
          <div className="panel-h">
            <h2>1 · Data — weekly auto-update</h2>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <ManifestPill manifest={manifest} />
              <button className="btn btn-accent btn-xs" onClick={reloadAll}>Reload from /data</button>
            </div>
          </div>
          <div className="panel-body">
            <div className="grid grid-2" style={{ gap: 12 }}>
              {ASSETS.map(a =>
                <CsvCard
                  key={a.id}
                  asset={a}
                  text={csvText[a.id] || ""}
                  data={series[a.id]}
                  error={seriesError[a.id]}
                  seriesType={seriesType[a.id]}
                  fetchStatus={fetchStatus[a.id]}
                  manifestEntry={manifest?.assets?.[a.manifestKey]}
                  onReload={() => reloadAsset(a)}
                  onSetType={(t) => setSeriesType(p => ({ ...p, [a.id]: t }))}
                  onText={(t) => onUserCsvChange(a.id, t)}
                  onFile={(f) => onFileLoad(a.id, f)}
                />
              )}
              <CsvCard
                key="cpi"
                asset={CPI_ASSET}
                text={csvText.cpi || ""}
                data={series.cpi}
                error={seriesError.cpi}
                seriesType={null}
                fetchStatus={fetchStatus.cpi}
                manifestEntry={manifest?.assets?.cpi}
                onReload={() => reloadAsset(CPI_ASSET)}
                onSetType={null}
                onText={(t) => onUserCsvChange("cpi", t)}
                onFile={(f) => onFileLoad("cpi", f)}
              />
              <CsvCard
                key="ecb"
                asset={ECB_ASSET}
                text={csvText.ecb || ""}
                data={series.ecb}
                error={seriesError.ecb}
                seriesType={null}
                fetchStatus={fetchStatus.ecb}
                manifestEntry={manifest?.assets?.ecb}
                onReload={() => reloadAsset(ECB_ASSET)}
                onSetType={null}
                onText={(t) => onUserCsvChange("ecb", t)}
                onFile={(f) => onFileLoad("ecb", f)}
              />
            </div>
            <div className="small-note" style={{ marginTop: 10 }}>
              CSVs are committed weekly by a GitHub Action (<code>.github/workflows/update-data.yml</code>) into <code>./data/</code> and served same-origin — no CORS, no proxies, no rate limits. Each asset tries <strong>Stooq → yfinance</strong> in turn; coIQ uses ariva (no fallback). Manual upload/paste per asset overrides the committed file if you want fresher numbers.
              See <code>README.md</code> for setup (including how to add the optional <code>STOOQ_COOKIE</code> repo secret).
            </div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-h"><h2>2 · Portfolio + Cashflow</h2><span className="h-meta">v2 horizon · cash rate · 200-SMA per portfolio</span></div>
          <div className="panel-body">
            <div className="grid grid-2" style={{ gap: 14 }}>
              <NumField label="Starting investment (EUR)" value={starting} onChange={setStarting} step={500} />
              <NumField label="Monthly contribution (EUR)" value={monthly} onChange={setMonthly} step={50} />
            </div>
            <div className="grid grid-2" style={{ gap: 14, marginTop: 12 }}>
              <NumField label="Planning horizon H_plan (years)" value={hPlan} step={1} onChange={v => setHPlan(Math.max(1, Math.min(30, v)))} />
              <NumField label="Cash rate (%/yr — 200-SMA risk-off leg)" value={cashRate} step={0.1} onChange={setCashRate} />
            </div>
            <div className="grid grid-2" style={{ gap: 14, marginTop: 12 }}>
              <NumField label="ECB rate (%/yr — triple coIQ portfolio cash leg = ECB−0.25%)" value={ecbRate} step={0.05} onChange={setEcbRate} />
              <div></div>
            </div>
            <div style={{ marginTop: 14 }}>
              <div className="lbl"  style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 6 }}>Rebalancing frequency</div>
              <div className="seg">
                {["never", "monthly", "yearly", "biennial"].map(r =>
                  <button key={r} className={rebalance === r ? "on" : ""} onClick={() => setRebalance(r)}>
                    {r === "biennial" ? "every 2 years" : r}
                  </button>)}
              </div>
            </div>
            <div style={{ marginTop: 14, display: "flex", alignItems: "center", gap: 10 }}>
              <span
                className={"chip" + (ownNativeHistory ? " on" : "")}
                onClick={() => setOwnNativeHistory(v => !v)}
                title="Run each portfolio on its OWN full series instead of the common-intersection window."
              >
                <span className="dot"></span>own native history
              </span>
              {ownNativeHistory && <span className="tag warn">curves NOT comparable — different bear-market exposure</span>}
            </div>

            <hr style={{ margin: "18px 0" }} />
            <div className="lbl" style={{ fontSize: 11, color: "var(--ink-soft)", marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span>My portfolio &middot; set a % share per asset &middot; total must = 100 &middot; SMA = daily 200-SMA timing of that leg</span>
              <span className="mono" style={{ fontSize: 11.5, padding: "2px 8px", borderRadius: 4, background: userWeightTotal === 100 ? "oklch(0.94 0.04 155)" : userWeightTotal === 0 ? "var(--hover)" : "oklch(0.95 0.06 60)", color: userWeightTotal === 100 ? "oklch(0.32 0.07 155)" : userWeightTotal === 0 ? "var(--ink-mute)" : "oklch(0.40 0.13 60)" }}>
                Σ = {userWeightTotal}% {userWeightTotal === 100 ? "✓" : userWeightTotal > 100 ? "(over)" : "(under)"}
              </span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 76px 60px 60px", gap: "4px 10px", alignItems: "center", fontSize: 11.5, marginTop: 6 }}>
              <div className="dim" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 0.06, color: "var(--ink-mute)" }}>asset</div>
              <div className="dim" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 0.06, color: "var(--ink-mute)", textAlign: "right" }}>weight %</div>
              <div className="dim" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 0.06, color: "var(--ink-mute)", textAlign: "center" }}>SMA</div>
              <div className="dim" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 0.06, color: "var(--ink-mute)", textAlign: "center" }} title="Sell this asset annually when it overperforms, redistribute proceeds to underperforming assets (subject to spreads, fees, and tax).">REB</div>
              {ASSETS.filter(a => a.holdable).map(a => {
                const w = userWeights[a.id] ?? 0;
                const canSMA = true;   // gold + silver SMA now supported
                const sma = !!userSMA[a.id];
                const reb = !!userRebalance[a.id];
                return (
                  <React.Fragment key={a.id}>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontWeight: w > 0 ? 500 : 400, color: w > 0 ? "var(--ink)" : "var(--ink-soft)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                        {a.label}
                      </div>
                      <div className="dim mono" style={{ fontSize: 10 }}>{a.isin}</div>

      {/* footnotes */}
      <div className="panel" style={{ marginTop: 26 }}>
        <div className="panel-h"><h2>Definitions · Assumptions · Caveats</h2></div>
        <div className="panel-body footnote">
          <p><strong>Sortino ratio</strong> — annualized: mean monthly unit-price return ÷ monthly downside deviation × √12. MAR (minimum acceptable return) is 0. Downside deviation = √(Σ min(r,0)² / k), k = count of months in the series (using k matches Sortino's original definition; some toolkits use only downside-month count — we follow the original).</p>
          <p><strong>Maximum drawdown</strong> — max peak-to-trough decline of the <em>unit-price</em> series. Months &lt;−30% count months whose drawdown from the running peak is worse than −30%. <strong>Unit price</strong> is contribution-neutral: contributions and matured-gold rebalances issue/redeem units at NAV and do not move price; ongoing-cost drag and Vorabpauschale tax do move price.</p>
          <p><strong>Money-weighted return</strong> — final EUR value ÷ total EUR invested (starting + contributions). This is what your account number actually shows; the unit-price series is the cleanly-comparable risk surface.</p>
          <p><strong>Gold lots, Spekulationsfrist (§23 EStG)</strong> — every gold buy creates a lot. Lots become CGT-free 12 months after purchase. The month-0 starting gold lot is backdated as already-matured. At a rebalance, gold sells only matured lots, FIFO. Equity (coIQ / momentum / market) is never sold. A rebalance is therefore <em>partial</em> whenever matured gold &lt; the amount needed — the portfolio is allowed to remain overweight gold. This mirrors the real one-way constraint.</p>
          <p><strong>Vorabpauschale</strong> — for each calendar year Y ≥ 2018 and each equity lot: <code>Basisertrag = startValue × Basiszins(Y) × 0.70</code>; <code>Vorabpauschale = max(0, min(Basisertrag, endValue − startValue))</code>; intra-year lots are prorated by (12 − monthsBeforeAcq)/12; <code>taxable = VP × (1 − Teilfreistellung)</code>. Summed across equity lots, allowance is subtracted, the remainder is taxed at the CGT rate, and the cash is pulled from the generating equity holding in <em>January</em> of year Y+1. This flows through the unit price like a cost.</p>
          <p><strong>Gold tax treatment</strong> — EUWAX Gold II is an Inhaberschuldverschreibung, not a fund: no Vorabpauschale, no Teilfreistellung. Modelled here only via the §23 12-month rule on actual sales. Pre-2018 fund taxation regime is <em>not modelled</em> (legacy InvStG / equity ratios). If the window starts before 2018, the years before 2018 have no fund-level tax applied.</p>
          <p><strong>Costs</strong> — Ongoing fund cost applies as a monthly drag <code>(1 − cost)^(1/12)</code> <em>only</em> for assets toggled to <code>gross</code> (index series). For <code>net</code> series the cost is already inside the data. Buy/sell spreads and per-order fees are applied to every transaction including month-0 purchases.</p>
          <p><strong>Window</strong> — the common window is the intersection of available monthly data across <em>all assets used by all selected portfolios</em>. Selecting any portfolio with coIQ caps the window at ~Feb 2022–present. Short-window comparisons (&lt; 10 years) get a single-regime warning.</p>
          <p><strong>Beyond modelled</strong> — frictionless beyond explicit costs/taxes; no slippage beyond modelled spreads; no withholding-tax leakage at the fund layer beyond Teilfreistellung; no broker order minima; FX risk is assumed zero (series are EUR-denominated).</p>
          <hr style={{ margin: "12px 0" }} />
          <p><strong>v2 · Real-preservation verdict</strong> — a portfolio is "real-admissible at horizon h" if its worst-window real CAGR ≥ 0 at h. Real returns are computed by dividing nominal portfolio growth by CPI growth over each h-year window. The CPI series used is <em>{(manifest?.assets?.cpi?.source) || "manual upload"}</em>{series.cpi ? <> · last point <code>{series.cpi[series.cpi.length - 1].month}</code></> : null}. Recommended series: German CPI (Destatis Verbraucherpreisindex / FRED DEUCPIALLMINMEI).</p>
          <p><strong>v2 · Gold-share optimizer</strong> — <code>w_safe(h)</code> = gold weight maximizing worst real CAGR at h (buffer-maximizing, unstable on this short bear-market-free sample — read as a range, not a point). <code>w_return(h)</code> = smallest gold weight whose worst real CAGR stays ≥ 0 (least gold to remain real-admissible). w_return is the decision-relevant line; w_safe is overfit to a single worst path.</p>
          <p><strong>v2 · ⅓ coIQ + ⅓ coIQ-SMA + ⅓ Gold</strong> — a three-leg test of the "half-Permanent half-tactical" hybrid: gold and an untimed coIQ sleeve hold for the long run; a parallel coIQ sleeve runs the 200-SMA daily rule and parks in cash earning <strong>ECB − 0.25 %</strong> (<code>{(ecbRate - 0.25).toFixed(2)} % / yr</code> at the current ECB setting of {ecbRate.toFixed(2)} %) until the signal flips back. Weights are fixed at exactly ⅓ each — the in-app Gold % slider is hidden for this portfolio. Gold rebalancing follows the same CGT-gated §23-respecting rule as every other gold-bearing portfolio (matured lots only, FIFO; remains overweight gold when matured lots run out); CGT on every SMA risk→cash flip uses the same approximation as elsewhere (configured rate × (1 − Teilfreistellung), no FIFO lots, no Sparer-Pauschbetrag, no VP credit). Vorabpauschale is applied to both coIQ sleeves by the outer engine — for the SMA-timed sleeve it's computed on the post-flip synthetic unit price, which slightly double-counts during cash periods.</p>
          <p><strong>v2 · 200-SMA daily timing</strong> — when toggled ON for a portfolio, the risk leg is simulated day-by-day: if its OWN daily close(d−1) &gt; SMA200(d−1) the risk leg is HELD on day d, else it is in CASH earning <code>{cashRate}%/yr</code>. Every flip charges the risk leg's buy/sell spread + per-order fee. On every <strong>risk → cash</strong> flip we also charge an approximate German CGT of <code>{taxRate.toFixed(2)}% × (1 − Teilfreistellung)</code> on the running per-unit gain since the last entry (no tax on losses; for gold and silver the Teilfreistellung is 0 so the full rate applies). This is a <em>quick approximation</em>: no FIFO lot accounting, no Sparer-Pauschbetrag allowance, no Anrechnung of prior-year Vorabpauschale against the realized gain — overstates tax by a few %. The GOLD leg is never timed. Daily unit-price is resampled to month-end; all v2 metrics then run on that monthly series. <strong>Caveat:</strong> a favorable 200-SMA = ON result for Gold+coIQ / Gold+Momentum is <em>exploratory only</em> and does NOT endorse adding market timing to the strategic core — that contradicts the Permanent / no-drift design.</p>
          <p><strong>v2 · Equal Weight + Silver</strong> — <strong>Invesco MSCI World Equal Weight UCITS ETF Acc</strong> (IE000OEF25S1, WKN A40G12, Xetra <code>MWEQ</code>) is a UCITS fund taxed normally (VP + 30 % TF). <strong>iShares Physical Silver ETC</strong> (IE00B4NCWG09, WKN A1KWPR, Xetra <code>SSLN</code>) is physically-backed silver in ETC form — treated like gold for tax (Inhaberschuldverschreibung, §23 EStG, no VP / TF; tax-free if held &gt;12 months). The engine treats silver identically to gold in the rebalance gate: matured lots only, FIFO, partial rebalance when matured holdings run out.</p>
          <p><strong>v2 · 100% Bitcoin (§23 EStG)</strong> — under German tax law, Bitcoin is a "private sale" asset (Privates Veräußerungsgeschäft, §23 EStG), not a financial instrument: <strong>held &gt;12 months it is fully tax-free</strong>; held &lt;12 months gains are taxed at your <strong>personal income tax rate</strong> (NOT the 25 % Abgeltungsteuer — anything up to 45 % + Soli). When 200-SMA timing is ON, every risk→cash flip realizes the running gain inside the 12-month window, so the engine charges CGT at the configured tax rate × (1 − Teilfreistellung), with Teilfreistellung = 0 (no fund-level exemption applies to crypto). <strong>For accuracy, set the CGT rate to your marginal income-tax rate</strong> (e.g. 30–42 % + 5.5 % Soli) — the default 26.375 % is Abgeltungsteuer and understates it. When 200-SMA is OFF the simulation never sells, so no tax event fires — consistent with §23's 12-month exemption on actual buy-and-hold. <strong>ILLUSTRATIVE ONLY:</strong> Bitcoin has had −80 % drawdowns; a 200-SMA fitted to a bullish sample dodges them in-sample but cannot defend against the next one.</p>
          <p><strong>v2 · "Own native history" toggle</strong> — when ON, each portfolio runs over its own full series instead of the common-intersection window. The CPI real-preservation test is absolute, so this is a legitimate exercise — but the resulting curves are <em>not comparable</em>: factor ETFs and Prime ACWI include 2018 / 2020 / 2022 drawdowns that coIQ never saw.</p>
          <p><strong>v2 · Single-regime caveat</strong> — the default common window (~2022 onward) contains no equity bear market. Every historical worst-case figure is optimistic, coIQ most of all. Beyond h ≈ 3 years all curves are Monte Carlo, paired-bootstrapped on the same short sample, so they inherit the same blind spot.</p>
        </div>
      </div>

      <div style={{ marginTop: 28, fontSize: 11, color: "var(--ink-mute)", textAlign: "center" }}>
        Single-file React. Hostable on GitHub Pages. {GOOGLE_CLIENT_ID ? "Drive sync enabled." : "Set GOOGLE_CLIENT_ID at the top of the file to enable Drive sync."}
      </div>
    </div>
  );
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function StatusPill({ status }) {
  const kind = status.kind === "ok" ? "ok" : status.kind === "bad" ? "bad" : status.kind === "warn" ? "warn" : status.kind === "info" ? "info" : "idle";
  return <span className={"tag " + kind} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
    {status.kind === "info" && <span className="spin"></span>}
    {status.msg}
  </span>;
}

function NumField({ label, value, onChange, step = 1 }) {
  return (
    <label className="field">
      <span className="lbl">{label}</span>
      <input type="number" step={step} value={value ?? 0} onChange={e => onChange(+e.target.value)} />
    </label>
  );
}

function Empty({ msg, kind }) {
  return <div className="panel" style={{ padding: 24, textAlign: "center", color: "var(--ink-soft)" }}>
    <span className={"tag " + (kind || "idle")} style={{ marginRight: 8 }}>info</span>{msg}
  </div>;
}

function CsvCard({ asset, text, data, error, seriesType, fetchStatus, manifestEntry, onReload, onSetType, onText, onFile }) {
  const fileRef = useRef(null);
  const n = data?.length || 0;
  const range = n > 0 ? `${data[0].month} → ${data[n - 1].month}` : "";
  const fs = fetchStatus;
  const busy = fs?.kind === "info";
  return (
    <div className={"csv-card" + (n > 0 ? " loaded" : "")}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div>
          <h3>{asset.label}</h3>
          <div className="id">{asset.isin}</div>
        </div>
        {onSetType && (
          <div className="seg">
            <button className={seriesType === "net" ? "on" : ""} onClick={() => onSetType("net")}>net</button>
            <button className={seriesType === "gross" ? "on" : ""} onClick={() => onSetType("gross")}>gross</button>
          </div>
        )}
      </div>
      <textarea rows={3} placeholder="date,value&#10;2020-01-31,100.00&#10;2020-02-29,101.34&#10;…" value={text} onChange={e => onText(e.target.value)} />
      <div className="ctrl">
        <button className="btn btn-xs btn-accent" disabled={busy} onClick={onReload}>
          {busy && <span className="spin"></span>} Reload
        </button>
        <button className="btn btn-xs" onClick={() => fileRef.current?.click()}>Upload CSV…</button>
        <input ref={fileRef} type="file" accept=".csv,text/csv" style={{ display: "none" }}
               onChange={e => { const f = e.target.files?.[0]; if (f) onFile(f); e.target.value = ""; }} />
        <button className="btn btn-xs btn-ghost" onClick={() => onText("")}>Clear</button>
        {n > 0 && <span className="tag ok">{n} months</span>}
        {!n && !error && <span className="tag idle">no data</span>}
        {error && <span className="tag bad">parse error</span>}
        {manifestEntry && <span className="tag info mono">as of {manifestEntry.lastDate}</span>}
        {fs && fs.kind !== "ok" && <span className={"tag " + (fs.kind === "bad" ? "bad" : "idle")}>{fs.msg}</span>}
      </div>
      {n > 0 && <div className="meta">{range} · last value {fmtNum(data[n - 1].value, 4)}</div>}
      {error && <div className="meta" style={{ color: "var(--neg)" }}>{error}</div>}
      {manifestEntry?.warnings?.length > 0 && (
        <div className="meta" style={{ color: "oklch(0.4 0.13 60)" }}>⚠ {manifestEntry.warnings.join(" · ")}</div>
      )}
    </div>
  );
}

function ManifestPill({ manifest }) {
  if (!manifest) return <span className="tag idle">no manifest</span>;
  const fetched = manifest.fetchedAt ? new Date(manifest.fetchedAt) : null;
  const ageDays = fetched ? Math.floor((Date.now() - fetched.getTime()) / 86400000) : null;
  const stale = ageDays != null && ageDays > 14;
  return <span className={"tag " + (stale ? "warn" : "info") + " mono"}>
    {fetched ? `fetched ${fetched.toISOString().slice(0, 10)}` : "fetched ?"} {stale && "· STALE"}
  </span>;
}

function SweepRow({ pid, chosen, sweep }) {
  const pf = PORTFOLIOS.find(p => p.id === pid);
  return (
    <div style={{ padding: "10px 0", borderTop: "1px solid var(--line)" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
        <strong style={{ fontSize: 12.5 }}>{pf.name}</strong>
        <span className="dim mono" style={{ fontSize: 11 }}>your weight {chosen}%</span>
        <span style={{ flex: 1 }}></span>
        {sweep
          ? <span className="tag info mono">optimal {sweep.w}% · Sortino {fmtNum(sweep.sortino, 3)}</span>
          : <span className="tag idle">not run</span>}
      </div>
      {sweep && <SweepBar chosen={chosen} optimal={sweep.w} samples={sweep.samples} />}
    </div>
  );
}

function SweepBar({ chosen, optimal, samples }) {
  // mini bar showing Sortino across 0..100% gold
  const max = Math.max(...samples.map(s => s.sortino || -Infinity));
  const min = Math.min(...samples.map(s => s.sortino || Infinity));
  const range = (max - min) || 1;
  return (
    <div style={{ marginTop: 8, position: "relative", height: 38 }}>
      <svg width="100%" height="38" preserveAspectRatio="none" viewBox="0 0 100 38">
        {samples.map((s, i) => {
          const h = ((s.sortino - min) / range) * 30 + 2;
          const fill = s.w === optimal ? "var(--accent)" : s.w === chosen ? "var(--ink)" : "var(--line-strong)";
          return <rect key={i} x={s.w} y={36 - h} width={0.85} height={h} fill={fill} />;
        })}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--ink-mute)", fontFamily: "JetBrains Mono, monospace", marginTop: 2 }}>
        <span>0% gold</span><span>50%</span><span>100% gold</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
